function drawTitleBG(){
  // ステージ1と同じ空グラデ
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#5ab8e8'); sky.addColorStop(0.55,'#9adaef'); sky.addColorStop(1,'#c8f0c0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 雲（固定位置、selectAnim でゆっくり流れる）
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[90,48],[260,34],[430,60],[600,40],[740,56]].forEach(([bx,by])=>{
    const x=((bx - selectAnim*12)%(W+220)+W+220)%(W+220)-110;
    ctx.beginPath();
    ctx.arc(x,by,28,0,Math.PI*2);
    ctx.arc(x+22,by-9,20,0,Math.PI*2);
    ctx.arc(x+44,by,24,0,Math.PI*2);
    ctx.fill();
  });

  // 簡易木（cam.x なし・固定）
  const GT=GROUND_TOP;
  const treeData=[
    [50,100,0],[160,80,1],[290,115,2],[420,90,0],[540,105,1],[660,88,2],[770,112,0]
  ];
  treeData.forEach(([tx,th,type])=>{
    ctx.save(); ctx.globalAlpha=0.6;
    const tw=14;
    ctx.fillStyle='#5a3018';
    ctx.fillRect(tx-tw/2, GT+42-th, tw, th);
    if(type===0){
      ctx.fillStyle='#2a6018';
      ctx.beginPath(); ctx.arc(tx,GT+42-th-26,36,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#369020';
      ctx.beginPath(); ctx.arc(tx-10,GT+42-th-44,26,0,Math.PI*2); ctx.fill();
    } else if(type===1){
      ctx.fillStyle='#288018';
      ctx.beginPath();
      ctx.moveTo(tx,GT+42-th-88);
      ctx.lineTo(tx-40,GT+42-th);
      ctx.lineTo(tx+40,GT+42-th);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#369820';
      ctx.beginPath();
      ctx.moveTo(tx,GT+42-th-115);
      ctx.lineTo(tx-30,GT+42-th-30);
      ctx.lineTo(tx+30,GT+42-th-30);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle='#c03030';
      ctx.beginPath(); ctx.arc(tx,GT+42-th-16,30,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)';
      [[-10,-6],[9,-12],[5,7],[-3,11],[13,1]].forEach(([dx,dy])=>{
        ctx.beginPath(); ctx.arc(tx+dx,GT+42-th-16+dy,5,0,Math.PI*2); ctx.fill();
      });
    }
    ctx.globalAlpha=1; ctx.restore();
  });

  // 地面（ステージ1と同トーン）
  ctx.fillStyle='#5aaa30';
  ctx.fillRect(0,GT+40,W,H-(GT+40));
  ctx.fillStyle='#3a8020';
  ctx.fillRect(0,GT+54,W,H-(GT+54));
}

function drawSelectScreen(){
  selectAnim+=0.04;
  drawTitleBG();

  // タイトル（共通）
  ctx.save();
  const ts=1+Math.sin(selectAnim)*0.025;
  ctx.translate(W/2,0); ctx.scale(ts,ts);
  ctx.font='bold 40px Arial'; ctx.textAlign='center';
  ctx.strokeStyle='#FF1493'; ctx.lineWidth=5;
  ctx.strokeText('アイドルうさぎ大冒険！',0,72);
  ctx.fillStyle='#FFD700'; ctx.fillText('アイドルうさぎ大冒険！',0,72);
  ctx.restore();

  // ステップインジケーター
  ctx.save();
  ctx.textAlign='center'; ctx.font='bold 15px Arial';
  [[1,'キャラクター選択',selectStep==='char'],[2,'ステージ選択',selectStep==='stage']].forEach(([n,lbl,active],i)=>{
    const x=W/2+(i===0?-130:130);
    ctx.fillStyle=active?'#FFD700':'#666';
    ctx.beginPath(); ctx.arc(x,104,13,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=active?'#222':'#999';
    ctx.font='bold 13px Arial'; ctx.fillText(n,x,109);
    ctx.fillStyle=active?'#FFD700':'#555';
    ctx.font=`${active?'bold ':''}13px Arial`;
    ctx.fillText(lbl,x,128);
  });
  // ステップ間の線
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2-116,104); ctx.lineTo(W/2+116,104); ctx.stroke();
  ctx.restore();

  // 浮遊する音符
  for(let i=0;i<5;i++){
    ctx.save();
    ctx.translate(80+i*160,160+Math.sin(selectAnim*2+i)*12);
    ctx.rotate(Math.sin(selectAnim+i)*0.3);
    drawNote(0,0,7,`rgba(255,215,0,${0.25+Math.abs(Math.sin(selectAnim+i))*0.4})`);
    ctx.restore();
  }

  if(selectStep==='char'){
    // ── ステップ１：キャラクター選択 ──
    ctx.save();
    ctx.font='20px Arial'; ctx.textAlign='center'; ctx.fillStyle='#FFB6C1';
    ctx.fillText('キャラクターを選んでね！',W/2,158);
    ctx.restore();

    const drawPanel=(cx,type,label,sub,selected)=>{
      ctx.save();
      ctx.translate(cx,310);
      if(selected){
        ctx.shadowColor=type==='pink'?'#FF69B4':'#87CEEB'; ctx.shadowBlur=35;
        ctx.fillStyle=type==='pink'?'rgba(255,105,180,0.18)':'rgba(135,206,235,0.18)';
        ctx.beginPath(); ctx.arc(0,0,80,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      }
      const fn=type==='pink'?drawPink:drawWhite;
      fn(0,18,1,selectAnim,false,selected,selectAnim);
      ctx.font='bold 20px Arial'; ctx.textAlign='center';
      ctx.fillStyle=selected?(type==='pink'?'#FF69B4':'#87CEEB'):'#ccc';
      ctx.fillText(label,0,90);
      ctx.font='14px Arial'; ctx.fillStyle='#bbb'; ctx.fillText(sub,0,110);
      if(selected){ ctx.font='bold 15px Arial'; ctx.fillStyle='#FFD700'; ctx.fillText('★ SELECT ★',0,132); }
      ctx.restore();
    };
    drawPanel(220,'pink','ぴな','元気いっぱい！',charType==='pink');
    drawPanel(580,'white','うしゃい','ふわふわ上品！',charType==='white');

    // 矢印ヒント
    const ab=Math.sin(selectAnim*4)*5;
    ctx.fillStyle='#FFD700'; ctx.font='28px Arial'; ctx.textAlign='center';
    ctx.fillText('◄                          ►',W/2,310+ab);

    // 決定ボタン案内
    const pulse=0.75+Math.abs(Math.sin(selectAnim*3))*0.25;
    ctx.save(); ctx.globalAlpha=pulse;
    const bw=220,bh=44; const bx=W/2-bw/2,by=456;
    const bg=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
    bg.addColorStop(0,'#FF1493'); bg.addColorStop(1,'#FF69B4');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,22); ctx.fill();
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,22); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.fillText(isTouchDevice?'タップして決定！':'Aボタン / Space で決定！',W/2,by+28);
    ctx.restore();

  } else {
    // ── ステップ２：ステージ選択 ──
    ctx.save();
    ctx.font='20px Arial'; ctx.textAlign='center'; ctx.fillStyle='#FFB6C1';
    ctx.fillText('ステージを選んでね！',W/2,158);
    ctx.restore();

    const stageLabels=[
      {n:1,label:'STAGE 1',sub:'アイドルの道～ダンスホール'},
      {n:2,label:'STAGE 2',sub:'スターシューター'},
      {n:3,label:'STAGE 3',sub:'爆弾迷路'},
      {n:4,label:'STAGE 4',sub:'ドンキーコング'},
      {n:5,label:'STAGE 5',sub:'音ゲー'},
    ];
    const sw=118,sh=62,gap=8;
    const totalW=stageLabels.length*(sw+gap)-gap;
    const sx0=W/2-totalW/2;
    stageLabels.forEach(({n,label,sub},i)=>{
      const bx=sx0+i*(sw+gap),by=200;
      const sel=startStage===n;
      ctx.save();
      if(sel){
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
        const sg=ctx.createLinearGradient(bx,by,bx,by+sh);
        sg.addColorStop(0,'#FF1493'); sg.addColorStop(1,'#C0006A');
        ctx.fillStyle=sg;
      } else { ctx.fillStyle='rgba(255,255,255,0.10)'; }
      ctx.beginPath(); ctx.roundRect(bx,by,sw,sh,12); ctx.fill();
      ctx.strokeStyle=sel?'#FFD700':'#666'; ctx.lineWidth=sel?2.5:1.5;
      ctx.beginPath(); ctx.roundRect(bx,by,sw,sh,12); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle=sel?'#FFD700':'#ddd';
      ctx.font=`bold ${sel?17:15}px Arial`; ctx.textAlign='center';
      ctx.fillText(label,bx+sw/2,by+24);
      ctx.fillStyle=sel?'#FFB6C1':'#aaa'; ctx.font='12px Arial';
      ctx.fillText(sub,bx+sw/2,by+44);
      if(sel){
        ctx.fillStyle='#FFD700'; ctx.font='bold 11px Arial';
        ctx.fillText('▼ 選択中',bx+sw/2,by+sh+16);
      }
      ctx.restore();
    });

    // 選択中ステージの大きな説明カード
    const cur=stageLabels[startStage-1];
    ctx.save();
    const cy=340, cw=360, ch=80;
    const cg=ctx.createLinearGradient(W/2-cw/2,cy,W/2+cw/2,cy+ch);
    cg.addColorStop(0,'rgba(255,20,147,0.25)'); cg.addColorStop(1,'rgba(192,0,106,0.25)');
    ctx.fillStyle=cg; ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.roundRect(W/2-cw/2,cy,cw,ch,18); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#FFD700'; ctx.font='bold 26px Arial'; ctx.textAlign='center';
    ctx.fillText(cur.label,W/2,cy+34);
    ctx.fillStyle='#FFB6C1'; ctx.font='16px Arial';
    ctx.fillText(cur.sub,W/2,cy+60);
    ctx.restore();

    // 左右矢印
    const ab=Math.sin(selectAnim*4)*5;
    ctx.fillStyle='#FFD700'; ctx.font='30px Arial'; ctx.textAlign='center';
    ctx.fillText('◄',W/2-200,340+ab);
    ctx.fillText('►',W/2+200,340+ab);

    // 決定ボタン案内
    const pulse=0.75+Math.abs(Math.sin(selectAnim*3))*0.25;
    ctx.save(); ctx.globalAlpha=pulse;
    const bw=220,bh=44; const bx=W/2-bw/2,by=440;
    const bg=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
    bg.addColorStop(0,'#FF1493'); bg.addColorStop(1,'#FF69B4');
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,22); ctx.fill();
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,22); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle='#fff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.fillText(isTouchDevice?'タップしてスタート！':'Aボタン / Space でスタート！',W/2,by+28);
    ctx.restore();

    // 戻るヒント
    ctx.fillStyle='#888'; ctx.font='13px Arial'; ctx.textAlign='center';
    ctx.fillText(isTouchDevice?'':'← Escape でキャラ選択に戻る',W/2,496);
  }
}

// キャラより先に描く: ステージ下からのスポットライト
function drawDanceSpots(){
  const elapsed = 90 - danceTimer;
  const spotDefs = [
    { x: W/2-130, col: [255,105,180] },
    { x: W/2,     col: [255,215,0]   },
    { x: W/2+130, col: [135,206,235] },
  ];
  spotDefs.forEach(({x, col}, i) => {
    const pulse = 0.5 + 0.5 * Math.sin(elapsed * 0.2 + i * 2.1);
    const alpha = (0.12 + 0.10 * pulse).toFixed(2);
    const g = ctx.createRadialGradient(x, H + 20, 5, x, H * 0.3, 350);
    g.addColorStop(0, `rgba(${col},${alpha})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  });
}

// キャラより後に描く: 回転リング・テキスト
function drawDanceOverlay(){
  const elapsed = 90 - danceTimer;
  const px = P.x - cam.x + P.w/2;
  const py = P.y + P.h/2;

  // ── フェーズ1〜3: キャラ周囲を回る星リング
  if(elapsed < 75){
    const count = elapsed < 20 ? 6 : elapsed < 50 ? 10 : 8;
    const r = elapsed < 20
      ? 50 + elapsed * 1.5
      : elapsed < 50 ? 68 + Math.sin(elapsed * 0.25) * 12
      : 55 - (elapsed - 50) * 1.2;
    for(let i = 0; i < count; i++){
      const a = i / count * Math.PI * 2 + elapsed * 0.13;
      const sx = px + Math.cos(a) * r;
      const sy = py + Math.sin(a) * r * 0.55;
      const sz = 6 + Math.sin(elapsed * 0.3 + i) * 2;
      ctx.save();
      ctx.globalAlpha = 0.85;
      drawStar(sx, sy, sz, ['#FFD700','#FF69B4','#87CEEB','#FF1493'][i % 4]);
      ctx.restore();
    }
  }

  // ── フェーズ3: 足元に波紋
  if(elapsed >= 50 && elapsed < 72){
    const t3 = elapsed - 50;
    const rr = t3 * 3.5;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 0.5 - t3 / 22 * 0.5);
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(px, P.y + P.h + 4, rr, rr * 0.3, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // ── フェーズ4: 最終ポーズ光輪
  if(elapsed >= 72){
    const t4 = elapsed - 72;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 0.7 - t4 / 18 * 0.7);
    const rg = ctx.createRadialGradient(px, py, 10, px, py, 65);
    rg.addColorStop(0, 'rgba(255,215,0,0.9)');
    rg.addColorStop(1, 'transparent');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(px, py, 65, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── テキスト (上部にのみ表示、キャラに被らない)
  if(elapsed < 68){
    const sc = 1 + Math.sin(elapsed * 0.28) * 0.06;
    ctx.save();
    ctx.translate(W/2, 82); ctx.scale(sc, sc);
    ctx.font = 'bold 58px Arial'; ctx.textAlign = 'center';
    ctx.shadowColor = '#FF1493'; ctx.shadowBlur = 22;
    ctx.strokeStyle = '#FF1493'; ctx.lineWidth = 7;
    ctx.strokeText('ダンス！', 0, 0);
    ctx.fillStyle = '#FFD700'; ctx.fillText('ダンス！', 0, 0);
    ctx.shadowBlur = 0;
    ctx.font = 'bold 24px Arial'; ctx.fillStyle = '#FFB6C1';
    ctx.fillText('♪ ♩ ♫ ♬', 0, 42);
    ctx.restore();
  }

  // ── フェーズ4バースト (一度だけ)
  if(elapsed === 73){
    const cols = ['#FF69B4','#FFD700','#87CEEB','#FF1493','#98FB98'];
    for(let i = 0; i < 45; i++)
      spawnParticles(P.x + P.w/2 + cam.x, P.y + P.h/2, cols[i % 5], 1, 'star');
  }
}

  [[0,1],[W,-1]].forEach(([cx2,dir])=>{
    for(let fold=0;fold<4;fold++){
      const fx=dir*(fold*26);
      const cg=ctx.createLinearGradient(cx2+fx,0,cx2+fx+dir*24,0);
      cg.addColorStop(0,'#7a0010'); cg.addColorStop(0.5,'#cc001e'); cg.addColorStop(1,'#7a0010');

      ctx.beginPath();
      ctx.moveTo(cx2+fx,0); ctx.lineTo(cx2+fx+dir*26,0);
      ctx.lineTo(cx2+fx+dir*18,stageY); ctx.lineTo(cx2+fx-dir*4,stageY);
      ctx.closePath(); ctx.fill();
    }
  });

  // ステージ床（木目）
  const floorG=ctx.createLinearGradient(0,stageY,0,H);
  floorG.addColorStop(0,'#9B7320'); floorG.addColorStop(1,'#6B4E10');
  ctx.fillStyle=floorG; ctx.fillRect(0,stageY,W,H-stageY);
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1.5;
  for(let lx=0;lx<W;lx+=36){
    ctx.beginPath(); ctx.moveTo(lx,stageY); ctx.lineTo(lx+18,H); ctx.stroke();
  }
  // ステージ前縁（光るライン）
  const edgeG=ctx.createLinearGradient(0,stageY,0,stageY+10);

    ctx.fillStyle=c; ctx.globalAlpha=pulse*0.8;
    ctx.beginPath(); ctx.arc(lx,stageY+5,5,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // 紙吹雪（丸・短冊・星を混合）上限120粒に抑えてスロー防止
  const cc=['#FF69B4','#FFD700','#87CEEB','#FF1493','#ffffff','#FF8C00','#98FB98','#DDA0DD','#00FFFF','#FFFF00'];
  if(particles.length < 120){
    // 毎フレーム4枚
    for(let i=0;i<4;i++){
      const kinds=['circle','rect','rect','star'];
      const kind=kinds[Math.floor(Math.random()*kinds.length)];
      particles.push({
        x:Math.random()*W, y:-16,
        vx:(Math.random()-0.5)*3.5, vy:1.2+Math.random()*2.5,
        life:1, dec:0.005,
        color:cc[Math.floor(Math.random()*cc.length)],
        sz:5+Math.random()*9, kind,
        rot:Math.random()*Math.PI*2, rotv:(Math.random()-0.5)*0.28
      });
    }
  }
  // ジャンプ着地タイミングで紙吹雪バースト（totalCycle=200固定）
  const cyc2=winTimer%200;
  if(cyc2===100||cyc2===150){
    for(let i=0;i<18;i++){
      const ang=Math.random()*Math.PI*2, spd=4+Math.random()*6;
      particles.push({
        x:W/2+(Math.random()-0.5)*160, y:stageY-12,
        vx:Math.cos(ang)*spd, vy:-Math.abs(Math.sin(ang))*spd-3,
        life:1, dec:0.014,
        color:cc[Math.floor(Math.random()*cc.length)],
        sz:6+Math.random()*8, kind:['rect','circle','star'][Math.floor(Math.random()*3)],
        rot:Math.random()*Math.PI*2, rotv:(Math.random()-0.5)*0.35
      });
    }
  }
  updateFX(); drawFX();

  // ── キャラクターアニメーション（ウォークイン→2ジャンプをループ）──
  const baseY=stageY+6;
  const walkDur=100, jumpDur=50, totalCycle=walkDur+jumpDur*2; // 200フレームで1周
  const pinaTargetX=W/2-64, ushaiTargetX=W/2+30;
  const jumpHeight=62;

  const cyc=winTimer%totalCycle; // 0-199でループ
  let pinaX, ushaiX, pinaJumpY=0, ushaiJumpY=0, pinaWt=0, ushaiWt=0;

  if(cyc<walkDur){
    // ウォークイン

    pinaWt=ushaiWt=winTimer*0.06;
  }
  const isJumping=pinaJumpY>4;
  drawPink (pinaX,  baseY-pinaJumpY,  1, pinaWt,  isJumping, false, 0);
  drawWhite(ushaiX, baseY-ushaiJumpY,-1, ushaiWt, isJumping, false, 0);

  ctx.fillText('♪ パディントンを撃破！ アイドルショー大成功！ ♪',W/2,118);

    ctx.fillText('Space でタイトルへ！',W/2,H-52);
  }
  ctx.restore();
  winTimer++;
}

function triggerDance(){
  noteCount=0; state='dance_flash'; danceTimer=90;
  danceAnchorX=P.x; danceAnchorY=P.y;
  P.dancing=true; P.danceT=0;
  P.invTimer=0; // ダンス中は draw() 側で点滅を完全スキップするので不要
  P.vx=0; P.vy=0;
  score+=300;
  sfxDance();
  const cols=['#FF69B4','#FFD700','#87CEEB','#FF1493','#98FB98'];
  for(let i=0;i<28;i++) spawnParticles(P.x+P.w/2+cam.x,P.y+P.h/2,cols[i%5],1,'star');
  spawnText(P.x+P.w/2+cam.x,P.y-50,'ダンス！ +300','#FFD700');
}

function triggerWin(){
  if(goalReached) return;
  goalReached=true;
  if(currentStage===1||currentStage===2||currentStage===3||currentStage===4||currentStage===6){
    state='stage_clear'; stageClearTimer=0;
    stopBGM(); sfxFanfare();
  } else {
    state='win'; winTimer=0; winDance=0;
    stopBGM(); sfxFanfare();
    if(currentStage===5){
      setTimeout(()=>sfxWin6(), 600);
    } else {
      setTimeout(()=>startBGMWin(), 800);
    }
  }
}

function loseLife(){
  sfxHurt(); lives--;
  if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
  else {
    P.x=Math.max(80,cam.x+80); P.y=200;
    P.vx=0; P.vy=0; P.invTimer=130;
    spawnParticles(P.x+P.w/2+cam.x,P.y+P.h/2,'#FF69B4',12,'circle');
  }
}

function update(){
  // ── ポーズ制御（セレクトボタン / Escape） ──────────────
  const _pauseable = (state==='play'||state==='dance_flash'||state==='song_select'||state==='song_clear');
  if(just['Escape'] && _pauseable){
    if(!paused){
      paused=true; pauseMenuIdx=0; pauseScreen='menu'; pauseStageIdx=currentStage;
      if(bgmStage===3){ const _a3=document.getElementById('bgm3'); if(_a3) _a3.pause(); }
      else             { const _a=getBGM(); if(_a) _a.pause(); }
    } else if(pauseScreen!=='menu'){
      pauseScreen='menu'; // サブ画面からメインメニューへ戻る
    } else {
      paused=false; _resumeBGM(); // メインメニューでEsc→再開
    }
  }

  if(paused){
    // ── メインポーズメニュー ─────────────────────────
    if(pauseScreen==='menu'){
      const N=4;
      if(just['ArrowUp']||just['KeyW'])   pauseMenuIdx=(pauseMenuIdx+N-1)%N;
      if(just['ArrowDown']||just['KeyS']) pauseMenuIdx=(pauseMenuIdx+1)%N;
      if(just['Space']||just['Enter']){
        if(pauseMenuIdx===0){                    // 再開
          paused=false; _resumeBGM();
        } else if(pauseMenuIdx===1){             // ステージ選択
          pauseScreen='stage_select'; pauseStageIdx=currentStage;
        } else if(pauseMenuIdx===2){             // 環境設定
          pauseScreen='settings';
        } else {                                 // やめる
          paused=false; stopBGM();
          if(currentStage===5) s6StopAllNotes();
          state='select'; selectStep='char';
        }
      }
    }
    // ── ステージ選択サブ画面 ─────────────────────────
    else if(pauseScreen==='stage_select'){
      // 順序：1→2→6(森)→3→4→5→1
      const _SF_ORDER=[1,2,6,3,4,5];
      const _sfi=_SF_ORDER.indexOf(pauseStageIdx);
      if(just['ArrowLeft']||just['KeyA'])  pauseStageIdx=_SF_ORDER[(_sfi+5)%6];
      if(just['ArrowRight']||just['KeyD']) pauseStageIdx=_SF_ORDER[(_sfi+1)%6];
      if(just['Digit1']||just['Numpad1']) pauseStageIdx=1;
      if(just['Digit2']||just['Numpad2']) pauseStageIdx=2;
      if(just['Digit3']||just['Numpad3']) pauseStageIdx=6;  // 森ステージ
      if(just['Digit4']||just['Numpad4']) pauseStageIdx=3;
      if(just['Digit5']||just['Numpad5']) pauseStageIdx=4;
      if(just['Digit6']||just['Numpad6']) pauseStageIdx=5;
      if(just['Space']||just['Enter']){
        paused=false; stopBGM();
        if(currentStage===5) s6StopAllNotes();
        initGame(pauseStageIdx);
      }
    }
    // ── 環境設定サブ画面 ─────────────────────────────
    else if(pauseScreen==='settings'){
      const step=0.1;
      if(just['ArrowLeft']||just['KeyA'])  { masterVolume=Math.max(0,+(masterVolume-step).toFixed(1)); _applyMasterVolume(); }
      if(just['ArrowRight']||just['KeyD']) { masterVolume=Math.min(1,+(masterVolume+step).toFixed(1)); _applyMasterVolume(); }
    }
    return;
  }

  // タイトル画面BGM：audioCtx が running 状態になり次第起動
  if(state==='select' && audioCtx && !_titleBGMRunning){
    if(audioCtx.state==='running') startTitleBGM();
    else if(audioCtx.state==='suspended') audioCtx.resume();
  }

  if(state==='select'){
    if(selectStep==='char'){
      // ステップ１：キャラクター選択
      if(just['ArrowLeft']||just['KeyA']||just['KeyD']&&charType==='white') charType='pink';
      if(just['ArrowRight']||just['KeyD']||just['KeyA']&&charType==='pink') charType='white';
      // 左右で交互切替
      if(just['ArrowLeft']) charType='pink';
      if(just['ArrowRight']) charType='white';
      if(just['Space']||just['Enter']){ ensureAudio(); selectStep='stage'; }
    } else {
      // ステップ２：ステージ選択
      if(just['ArrowLeft']||just['KeyA'])  startStage=startStage>1?startStage-1:5;
      if(just['ArrowRight']||just['KeyD']) startStage=startStage<5?startStage+1:1;
      // 数字キーで直接選択（キーボード用）
      if(just['Digit1']||just['Numpad1']) startStage=1;
      if(just['Digit2']||just['Numpad2']) startStage=2;
      if(just['Digit3']||just['Numpad3']) startStage=3;
      if(just['Digit4']||just['Numpad4']) startStage=4;
      if(just['Digit5']||just['Numpad5']) startStage=5;
      if(just['Space']||just['Enter']){ ensureAudio(); initGame(startStage); }
      if(just['Escape']||just['KeyN']) selectStep='char'; // Escape or ゲームパッドBで戻る
    }
    return;
  }
  if(state==='stage_clear'){
    stageClearTimer++;
    if(stageClearTimer>200||(just['Space']||just['Enter'])){
      if(currentStage===1) initGame(2);
      else if(currentStage===2) initGame(6);  // スペース→森
      else if(currentStage===6) initGame(3);  // 森→爆弾迷路
      else if(currentStage===3) initGame(4);
      else initGame(5);
    }
    return;
  }
  if(state==='costume_room'){
    selectAnim+=0.04;
    if(just['ArrowLeft']||just['KeyA'])  costumeSelectIdx=(costumeSelectIdx+2)%3;
    if(just['ArrowRight']||just['KeyD']) costumeSelectIdx=(costumeSelectIdx+1)%3;
    if(just['Space']||just['Enter']){ costumeType=costumeSelectIdx; state='play'; }
    if(just['Escape']||just['KeyX'])    { state='play'; }
    return;
  }
  if(state==='win'){
    winTimer++;
    if(winTimer>120&&(just['Space']||just['Enter'])){ stopBGM(); state='select'; selectStep='char'; }
    return;
  }
  if(state==='gameover'){
    gameoverTimer++;
    if(gameoverTimer>80&&(just['Space']||just['Enter'])){
      if(currentStage===5){ initStage6(); } // 音ゲーは曲選択に戻る
      else if(currentStage===6){ initStageForest(); state='play'; } // 森ステージはリスタート
      else { state='select'; selectStep='char'; }
    }
    return;
  }
  if(state==='win'||state==='gameover') return;

  // ダンス中の体の動き (コレオグラフィー 90フレーム)
  if(state==='dance_flash'){
    const elapsed = 90 - danceTimer;
    P.danceT += 0.18;
    P.walkT   += 0.18;

    if(elapsed < 20){
      // フェーズ1: 高くジャンプ！
      const t = elapsed / 20;
      P.y = danceAnchorY - Math.sin(t * Math.PI) * 90;
      P.x = danceAnchorX;
      P.facing = 1;
    } else if(elapsed < 50){
      // フェーズ2: 空中スピン＋左右サイドステップ
      const t = elapsed - 20;
      P.y = danceAnchorY - 55 + Math.sin(t / 30 * Math.PI * 2) * 22;
      P.x = danceAnchorX + Math.sin(t / 30 * Math.PI * 3) * 35;
      P.facing = Math.floor(t / 6) % 2 === 0 ? 1 : -1;
    } else if(elapsed < 72){
      // フェーズ3: 着地してポーズ決め＆バウンス
      const t = elapsed - 50;
      P.y = danceAnchorY - 30 * Math.abs(Math.sin(t / 22 * Math.PI * 2));
      P.x = danceAnchorX + Math.sin(t / 22 * Math.PI) * 18;
      P.facing = t < 11 ? -1 : 1;
    } else {
      // フェーズ4: 最終ポーズ静止
      P.y = danceAnchorY;
      P.x = danceAnchorX;
      P.facing = 1;
    }

    if(danceTimer % 3 === 0){
      const cols=['#FF69B4','#FFD700','#87CEEB','#FF1493','#98FB98','#FFA500'];
      spawnParticles(P.x+P.w/2+cam.x, P.y+P.h/2, cols[danceTimer%6], 3, 'star');
    }
    if(danceTimer % 15 === 0){
      spawnParticles(P.x+P.w/2+cam.x, P.y, '#FFD700', 5, 'note');
    }

    danceTimer--;
    updateFX();
    if(danceTimer<=0){ state='play'; P.dancing=false; P.y=danceAnchorY; P.x=danceAnchorX; }
    return;
  }

  // ステージ5の曲選択・クリア中間画面はplay状態でなくてもupdate
  if((state==='song_select'||state==='song_clear')&&currentStage===5){ updateStage6(); return; }

  if(state!=='play') return;

  // ── 制限時間カウントダウン ──
  if(stageTimer>0){
    stageTimer--;
    if(stageTimer===0){ stopBGM(); state='gameover'; gameoverTimer=0; }
  }
  if(state!=='play') return;

  if(currentStage===2){ updateStage3(); return; }
  if(currentStage===6){ updateStageForest(); return; }
  if(currentStage===3){ updateStage4(); return; }
  if(currentStage===4){ updateStage5(); return; }
  if(currentStage===5){ updateStage6(); return; }

  s2NearDoor=false; // 毎フレームリセット（ドア判定で再セット）

  // ── ダンスホール入場トランジション ─────────────
  if(s1HallTransition > 0){
    s1HallTransition--;
    if(s1HallTransition === 30){
      // 暗転の頂点：プレイヤーをダンスホール入り口へワープ
      // P.x = cam.x + W/3 になるよう配置 → カメラ目標 = cam.x（ズレ0、瞬間移動なし）
      cam.x = 5800;
      P.x = cam.x + Math.round(W/3); // = 6067（画面左1/3の位置に出現）
      P.y = GROUND_TOP - P.h;
      P.vx = 0; P.vy = 0; P.onGround = false;
      s1HallEntered = true;
    }
    // トランジション中は入力を受け付けない（物理のみ継続）
    P.vy = Math.min(P.vy + GRAVITY, 16);
    P.y += P.vy;
    collide(P, platforms);
    if(Math.abs(P.vx)>0.5&&P.onGround) P.walkT+=0.1;
    const tgt2=P.x-W/3;
    cam.x+=(tgt2-cam.x)*0.1;
    cam.x=Math.max(0,Math.min((currentStage===1?LEVEL_W_MERGED:LEVEL_W)-W,cam.x));
    // 入場後はカメラが屋外に戻らない（ループ内でも適用）
    if(s1HallEntered) cam.x=Math.max(cam.x,5800);
    updateFX();
    return;
  }

  // Player horizontal
  const ml=keys['ArrowLeft']||keys['KeyA'];
  const mr=keys['ArrowRight']||keys['KeyD'];
  if(ml){ P.vx=-WALK_SPD; P.facing=-1; }
  else if(mr){ P.vx=WALK_SPD; P.facing=1; }
  else P.vx*=0.78;

  // Jump
  if((just['Space']||just['ArrowUp']||just['KeyW'])&&P.onGround){
    P.vy=JUMP_V; sfxJump();
  }

  // ── ステージ2 衣装アクション ─────────────────
  if(currentStage===1){
    if(s2FireCD>0) s2FireCD--;
    if(s2SwordCD>0) s2SwordCD--;
    if(s2SwordTimer>0) s2SwordTimer--;

    // 魔法少女：Bボタン（キーボード:Bキー）で星を発射（バウンド弾）
    if(costumeType===1 && (just['KeyN']||just['KeyB']) && s2FireCD===0){
      const bx=P.x+P.w/2+P.facing*18, by=P.y+P.h/2-12;
      s2Bullets.push({x:bx,y:by,vx:P.facing*10,vy:2,on:true,t:0,bounces:0});
      s2FireCD=16;
      beep(880,0.08,0.13,'sine'); beep(1100,0.05,0.08,'sine',0.07);
    }

    // 戦士：Bボタン（キーボード:Bキー）で剣を振る
    if(costumeType===2 && (just['KeyN']||just['KeyB']) && s2SwordCD===0){
      s2SwordTimer=20; s2SwordCD=30;
      beep(300,0.06,0.18,'sawtooth'); beep(180,0.05,0.12,'sawtooth',0.06);
    }

    // 弾の移動・当たり判定（世界座標・バウンド）
    for(let i=s2Bullets.length-1;i>=0;i--){
      const b=s2Bullets[i];
      b.vy+=0.55;           // 重力
      b.x+=b.vx; b.y+=b.vy; b.t++;
      // 地面バウンド（最大4回）
      if(b.y>=GROUND_TOP-6){
        b.y=GROUND_TOP-6;
        b.bounces=(b.bounces||0)+1;
        if(b.bounces>=4){ s2Bullets.splice(i,1); continue; }
        b.vy=-Math.abs(b.vy)*0.62;  // 反発（少し弱める）
        b.vx*=0.92;                 // 水平も少し減衰
        beep(660,0.04,0.06,'sine');
      }
      if(b.y>H+40||b.x<cam.x-60||b.x>cam.x+W+60){ s2Bullets.splice(i,1); continue; }
      let hit=false;
      enemies.forEach(e=>{
        if(!e.on||hit) return;
        if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
          e.on=false; hit=true; score+=150;
          spawnParticles(e.x+e.w/2+cam.x,e.y,'#FFD700',10,'star');
          spawnText(e.x+e.w/2+cam.x,e.y-10,'★+150','#FFD700');
          sfxStomp();
        }
      });
      if(hit) s2Bullets.splice(i,1);
    }

    // 剣の当たり判定（振り始め8フレーム間）
    if(s2SwordTimer>12){
      const reach=64, ssx=P.facing>0?P.x+P.w:P.x-reach;
      const ssy=P.y+4, ssh=34;
      enemies.forEach(e=>{
        if(!e.on) return;
        if(ssx<e.x+e.w&&ssx+reach>e.x&&ssy<e.y+e.h&&ssy+ssh>e.y){
          e.on=false; score+=150;
          spawnParticles(e.x+e.w/2+cam.x,e.y,'#88CCFF',10,'star');
          spawnText(e.x+e.w/2+cam.x,e.y-10,'斬！+150','#88CCFF');
          sfxStomp();
        }
      });
    }
  }
  // ── ステージ2 衣装アクション ここまで ──────────

  // Gravity
  P.vy=Math.min(P.vy+GRAVITY,16);
  P.x+=P.vx; P.y+=P.vy;
  if(P.x<0) P.x=0;
  const LW1=currentStage===1?LEVEL_W_MERGED:LEVEL_W;
  if(P.x+P.w>LW1) P.x=LW1-P.w;
  // アウトドアフェーズでは建物の右端を越えられない
  if(currentStage===1 && !s1HallEntered && P.x+P.w > 5760) P.x = 5760 - P.w;
  // ダンスホール入場後は屋外に戻れない（x=5810 を左端とする壁）
  if(currentStage===1 && s1HallEntered && P.x < 5810) P.x = 5810;
  if(P.y>H+60){ loseLife(); return; }

  collide(P,platforms);

  if(Math.abs(P.vx)>0.5&&P.onGround) P.walkT+=0.1;
  if(P.invTimer>0) P.invTimer--;
  if(P.dancing) P.danceT+=0.1;

  // Camera
  const tgt=P.x-W/3;
  cam.x+=(tgt-cam.x)*0.1;
  cam.x=Math.max(0,Math.min((currentStage===1?LEVEL_W_MERGED:LEVEL_W)-W,cam.x));
  // アウトドアフェーズはカメラをダンスホール手前で止める
  if(currentStage===1 && !s1HallEntered) cam.x=Math.min(cam.x, 5000);
  // ダンスホール入場後はカメラが屋外へ戻らない
  if(currentStage===1 && s1HallEntered) cam.x=Math.max(cam.x, 5800);

  // Enemies
  enemies.forEach(e=>{
    if(!e.on) return;
    e.vy=Math.min(e.vy+GRAVITY,16);
    e.x+=e.vx; e.y+=e.vy;
    if(e.x<=e.min){ e.x=e.min; e.vx=Math.abs(e.vx); }
    if(e.x+e.w>=e.max){ e.x=e.max-e.w; e.vx=-Math.abs(e.vx); }
    collide(e,platforms);
    if(e.y>GROUND_TOP){ e.y=GROUND_TOP; e.vy=0; e.onGround=true; }

    // vs Player
    if(P.invTimer<=0&&
       P.x<e.x+e.w&&P.x+P.w>e.x&&
       P.y<e.y+e.h&&P.y+P.h>e.y){
      const stompY=P.y+P.h;
      const eTop=e.y+e.h*0.4;
      if(P.vy>0&&stompY<e.y+e.h*0.6&&stompY>e.y){
        e.on=false; P.vy=-9; score+=200;
        sfxStomp();
        spawnParticles(e.x+e.w/2+cam.x,e.y,'#FFD700',10,'star');
        spawnText(e.x+e.w/2+cam.x,e.y-10,'+200','#FFD700');
      } else {
        loseLife();
      }
    }
  });

  // Items
  items.forEach(it=>{
    if(!it.on) return;
    if(it.k==='hallgate'){
      // アーチ入り口（建物中央）に近づいたら自動でダンスホールへワープ
      if(!s1HallEntered && s1HallTransition===0){
        const archCX = it.x + it.w/2;
        const nearX = P.x+P.w/2 > archCX-50 && P.x+P.w/2 < archCX+50;
        if(nearX && P.onGround){
          s1HallTransition = 60;
          ensureAudio(); sfxWarpEnter();
        }
      }
      return;
    }
    // ゴールポールは中心軸±10px かつ 着地中のみ有効（ジャンプ/落下では取れない）
    const hitX = it.k==='goal'
      ? (P.x<it.x+10&&P.x+P.w>it.x-10&&P.onGround)
      : it.k==='goal_mic'
      ? (P.x<it.x+it.w&&P.x+P.w>it.x&&P.onGround)
      : (P.x<it.x+it.w&&P.x+P.w>it.x);
    if(hitX&&P.y<it.y+it.h&&P.y+P.h>it.y){
      if(it.k!=='goal'&&it.k!=='door'&&it.k!=='hallgate'&&it.k!=='goal_mic') it.on=false;
      if(it.k==='note'){
        noteCount++; score+=50; sfxCollect();
        spawnParticles(it.x+cam.x,it.y,'#FFD700',6,'note');
        spawnText(it.x+cam.x,it.y-20,'♪ +50','#FFD700');
        if(noteCount>=5) triggerDance();
      } else if(it.k==='star'){
        score+=500; sfxStar(); starCount++;
        spawnParticles(it.x+cam.x,it.y,'#FFD700',14,'star');
        spawnText(it.x+cam.x,it.y-20,'★ +500','#FFD700');
        if(starCount%5===0){
          lives=Math.min(lives+1,9);
          beep(523,0.1,0.15,'sine'); beep(659,0.1,0.12,'sine',0.15); beep(784,0.15,0.15,'sine',0.3);
          spawnText(it.x+cam.x,it.y-48,'♥ ライフ+1！','#FF69B4');
        }
      } else if(it.k==='goal'){
        triggerWin();
      } else if(it.k==='goal_mic'){
        triggerWin();
      } else if(it.k==='door'){
        it.on=true; // 扉は消えない（繰り返し入れる）
        s2NearDoor=true; // タッチデバイス用ドアボタン表示
        // ↑キー or タッチデバイスのジャンプボタンで入室
        if(just['ArrowUp']||just['KeyW']){
          costumeSelectIdx=costumeType;
          state='costume_room';
        }
      }
    }
  });

  // ゴールはポールへのタッチ判定のみ（上記アイテム衝突で処理）

  updateFX();
}

// ── ポーズオーバーレイ（全ステージ共通）──────────────
function drawPauseOverlay(){
  ctx.save();
  ctx.globalAlpha=0.65;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  if(pauseScreen==='menu')         _drawPauseMenu();
  else if(pauseScreen==='stage_select') _drawPauseStageSelect();
  else if(pauseScreen==='settings')    _drawPauseSettings();

  ctx.restore();
}

function _pausePanel(pw,ph){
  const px=W/2-pw/2, py=H/2-ph/2;
  ctx.save();
  ctx.shadowColor='#FF69B4'; ctx.shadowBlur=32;
  ctx.fillStyle='#1a0535';
  ctx.strokeStyle='#FF69B4'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,14); ctx.fill(); ctx.stroke();
  ctx.restore();
  return {px,py};
}

function _drawPauseMenu(){
  const pw=280, ph=260;
  const {px,py}=_pausePanel(pw,ph);

  ctx.font='bold 22px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
  ctx.fillText('⏸ 一時停止', W/2, py+34);
  ctx.shadowBlur=0;

  const menuItems=[
    {label:'▶  再開',       col:'#FFFFFF'},
    {label:'🎮  ステージ選択', col:'#87CEEB'},
    {label:'⚙  環境設定',   col:'#98FB98'},
    {label:'✕  やめる',     col:'#FF6B6B'},
  ];
  for(let i=0;i<menuItems.length;i++){
    const iy=py+82+i*46;
    if(pauseMenuIdx===i){
      ctx.fillStyle='rgba(255,105,180,0.28)';
      ctx.beginPath(); ctx.roundRect(px+14,iy-19,pw-28,38,8); ctx.fill();
      ctx.fillStyle=menuItems[i].col;
      ctx.shadowColor=menuItems[i].col; ctx.shadowBlur=8;
    } else {
      ctx.fillStyle='rgba(255,255,255,0.50)'; ctx.shadowBlur=0;
    }
    ctx.font=(pauseMenuIdx===i?'bold 19px':'17px')+' Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(menuItems[i].label, W/2, iy);
    ctx.shadowBlur=0;
  }

  ctx.font='11px Arial'; ctx.fillStyle='rgba(255,182,193,0.7)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('↑↓で選択  /  Spaceで決定  /  Escapeで再開', W/2, py+ph-16);
}

function _drawPauseStageSelect(){
  // 順序：1→2→6(森)→3→4→5
  const SF_ORDER=[1,2,6,3,4,5];
  const SF_LABELS=['S1\n冒険','S2\n宇宙','森\n森林','S3\n爆弾','S4\nDK','S5\n音ゲー'];
  const SF_NAMES={
    1:'STAGE 1 / プラットフォーム',
    2:'STAGE 2 / スターシューター',
    6:'FOREST / 森の縦型シューティング',
    3:'STAGE 3 / ボンバー迷路',
    4:'STAGE 4 / ドンキーコング',
    5:'STAGE 5 / 音ゲー'
  };
  const pw=360, ph=210;
  const {px,py}=_pausePanel(pw,ph);

  ctx.font='bold 20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
  ctx.fillText('🎮 ステージ選択', W/2, py+30);
  ctx.shadowBlur=0;

  const bw=46, bh=46, gap=7;
  const totalW=6*(bw+gap)-gap;
  const bx0=W/2-totalW/2;
  for(let i=0;i<6;i++){
    const sid=SF_ORDER[i];
    const bx=bx0+i*(bw+gap), by=py+62;
    const sel=pauseStageIdx===sid;
    ctx.save();
    if(sel){ ctx.shadowColor='#FFD700'; ctx.shadowBlur=18; }
    ctx.fillStyle=sel?'#FFD700':(sid===6?'rgba(34,139,34,0.4)':'rgba(255,255,255,0.15)');
    ctx.strokeStyle=sel?'#FFD700':(sid===6?'#228B22':'rgba(255,255,255,0.4)');
    ctx.lineWidth=sel?2.5:1.5;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    const lines=SF_LABELS[i].split('\n');
    ctx.fillStyle=sel?'#1a0535':'#fff';
    ctx.font=(sel?'bold 11px':'10px')+' Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(lines[0], bx+bw/2, by+bh/2-6);
    ctx.font='9px Arial';
    ctx.fillStyle=sel?'#1a0535':'rgba(255,255,255,0.7)';
    ctx.fillText(lines[1], bx+bw/2, by+bh/2+7);
    ctx.restore();
  }

  const sname=SF_NAMES[pauseStageIdx]||'';
  ctx.font='15px Arial'; ctx.fillStyle=pauseStageIdx===6?'#90EE90':'#fff';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(sname, W/2, py+140);

  ctx.font='11px Arial'; ctx.fillStyle='rgba(255,182,193,0.7)';
  ctx.fillText('← → で選択  /  Spaceで移動  /  Escapeで戻る', W/2, py+ph-16);
}

function _drawPauseSettings(){
  const pw=300, ph=180;
  const {px,py}=_pausePanel(pw,ph);

  ctx.font='bold 20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
  ctx.fillText('⚙ 環境設定', W/2, py+30);
  ctx.shadowBlur=0;

  // ボリュームラベル
  ctx.font='bold 16px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('🔊 ボリューム', px+28, py+78);

  // ボリュームバー
  const bx=px+28, by=py+102, bw=pw-56, bh=18;
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,9); ctx.fill();
  // 塗りつぶし部分
  const fillW=Math.round(bw*masterVolume);
  if(fillW>0){
    ctx.fillStyle='#FF69B4';
    ctx.beginPath(); ctx.roundRect(bx,by,fillW,bh,9); ctx.fill();
  }
  // 枠線
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,9); ctx.stroke();
  // パーセント
  ctx.font='bold 14px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${Math.round(masterVolume*100)}%`, W/2, by+bh/2);

  ctx.font='11px Arial'; ctx.fillStyle='rgba(255,182,193,0.7)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('← → で音量調整  /  Escapeで戻る', W/2, py+ph-16);
}

// ════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,H);

  if(state==='select'){ drawSelectScreen(); return; }
  if(state==='costume_room'){ drawCostumeRoom(); return; }

  // ── ステージ3シューティング
  if(currentStage===2){
    if(state==='play') drawStage3Scene();
    else { drawStage3BG(); drawFX(); }
    if(state==='stage_clear') drawStageClear();
    if(state==='gameover') drawGameoverScreen();
    if(paused) drawPauseOverlay();
    return;
  }

  // ── 森の縦型シューティング
  if(currentStage===6){
    drawStageForestScene();
    if(state==='stage_clear') drawStageClear();
    if(state==='gameover') drawGameoverScreen();
    if(paused) drawPauseOverlay();
    return;
  }

  // ── ステージ4ボンバーマン迷路（タッチUIはdrawStage4Scene内で描画）
  if(currentStage===3){
    drawStage4Scene();
    if(state==='stage_clear') drawStageClear();
    if(state==='gameover') drawGameoverScreen();
    if(paused) drawPauseOverlay();
    return;
  }

  // ── ステージ5ドンキーコング（タッチUIはdrawStage5Scene内で描画）
  if(currentStage===4){
    drawStage5Scene();
    if(state==='win') drawWinScreen();
    if(state==='gameover') drawGameoverScreen();
    if(state==='stage_clear') drawStageClear();
    if(paused) drawPauseOverlay();
    return;
  }

  // ── ステージ6音ゲー
  if(currentStage===5){
    drawStage6();
    if(state==='win') drawWinScreen();
    if(state==='gameover') drawGameoverScreen();
    if(paused) drawPauseOverlay();
    return;
  }

  // ── ゲームシーン (ステージ1/2)
  drawBackground();
  platforms.forEach(drawPlatform);
  drawItems();
  enemies.forEach(e=>{ if(e.on) drawEnemy(e); });
  drawS2Combat();

  // ── ダンス: スポットライトをキャラより先に描く
  if(state==='dance_flash') drawDanceSpots();

  // ── キャラクター描画
  if(state==='play'||state==='dance_flash'){
    // ダンス中は絶対に点滅させない
    const blink = state!=='dance_flash' && P.invTimer>0 && Math.floor(P.invTimer/5)%2===0;
    if(!blink){
      const sx = P.x - cam.x + P.w/2;
      // 脚の底がorigin+36なので、地面(P.y+P.h)に合わせるため36引く
      const sy = P.y + P.h - 36;
      if(state==='dance_flash'){
        // ダンス中は少し大きく＋揺れる
        ctx.save();
        const sc = 1.15 + Math.sin(P.danceT * 5) * 0.07;
        ctx.translate(sx, sy);
        ctx.scale(sc, sc);
        drawCharacter(0, 0, P.facing, P.walkT, false, true, P.danceT);
        ctx.restore();
      } else {
        drawCharacter(sx, sy, P.facing, P.walkT, !P.onGround, P.dancing, P.danceT);
      }
    }
  }

  // ── ダンス: キャラの手前にリング・テキスト演出
  if(state==='dance_flash') drawDanceOverlay();

  drawFX();
  drawHUD();
  drawTouchControls();

  // ── ダンスホール入場トランジション（暗転フェード）──────
  if(s1HallTransition > 0){
    // 0-30: フェードイン（暗くなる）, 30-60: フェードアウト（明るくなる）
    const alpha = s1HallTransition > 30
      ? (60 - s1HallTransition) / 30   // 60→31: 0→1
      : s1HallTransition / 30;          // 30→0 : 1→0
    ctx.save();
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    // 中央に入場メッセージ（暗転ピーク付近）
    if(s1HallTransition <= 32 && s1HallTransition >= 28){
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#FF69B4';
      ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
      ctx.shadowColor = '#FF69B4'; ctx.shadowBlur = 20;
      ctx.fillText('ダンスホールへようこそ！', W/2, H/2);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  if(state==='stage_clear') drawStageClear();
  if(state==='win') drawWinScreen();
  if(state==='gameover') drawGameoverScreen();
  if(paused) drawPauseOverlay();

  // ゲームパッド接続通知
  if(gpNoticeTimer > 0){
    gpNoticeTimer--;
    ctx.save();
    ctx.globalAlpha = Math.min(1, gpNoticeTimer / 30);
    ctx.fillStyle = '#222'; ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
    const tw = ctx.measureText(gpNotice).width + 28;
    const nx = W/2 - tw/2, ny = 12;
    ctx.beginPath(); ctx.roundRect(nx, ny, tw, 32, 8); ctx.fill(); ctx.stroke();
    ctx.globalAlpha *= 1;
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(gpNotice, W/2, ny + 16);
    ctx.restore();
  }
}

// ════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════
function loop(){
  pollGamepad();
  update();
  draw();
  just={};
  requestAnimationFrame(loop);
}

// Click/tap to select character
canvas.addEventListener('click',e=>{
  ensureAudio();
  // ── ステージ6曲選択画面のクリック
  if(state==='song_select'&&currentStage===5){
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width);
    const my=(e.clientY-r.top)*(H/r.height);
    const pw=188, ph=96, pgap=13, rowGap=11;
    const totalPW=3*(pw+pgap)-pgap;
    const px0=W/2-totalPW/2;
    const rowY=[210, 210+ph+rowGap];
    for(let i=0;i<6;i++){
      const col=i%3, row=Math.floor(i/3);
      const bx=px0+col*(pw+pgap);
      const by=rowY[row];
      if(mx>=bx&&mx<=bx+pw&&my>=by&&my<=by+ph){
        s6SongIdx=i; s6StartSong=i;
        s6BuildChart(s6SongIdx);
        state='play';
        return;
      }
    }
    if(mx<px0){ s6SongIdx=(s6SongIdx+5)%6; return; }
    if(mx>px0+totalPW){ s6SongIdx=(s6SongIdx+1)%6; return; }
    return;
  }
  // 曲クリア中間画面クリック→次の曲へ
  if(state==='song_clear'&&currentStage===5&&s6SongClearTimer>60){
    just['Space']=true; return;
  }
  if(state!=='select') return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  // ステージ選択パネル判定
  const sw=105, sh=52, gap=10;
  const totalW=5*(sw+gap)-gap;
  const sx0=W/2-totalW/2;
  let stageHit=false;
  for(let i=0;i<5;i++){
    const bx=sx0+i*(sw+gap), by=408;
    if(mx>=bx&&mx<=bx+sw&&my>=by&&my<=by+sh){
      startStage=i+1; stageHit=true; break;
    }
  }
  // スタートボタン (タッチデバイス: y=510近辺)
  if(isTouchDevice&&!stageHit&&my>488&&my<534){
    initGame(startStage); return;
  }
  // キャラ選択（上半分エリア）
  if(!stageHit&&my<390) charType=mx<W/2?'pink':'white';
});
canvas.addEventListener('dblclick',()=>{ if(state==='select') initGame(startStage); });

loop();
</script>
