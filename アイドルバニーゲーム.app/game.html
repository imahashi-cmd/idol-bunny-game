<script>
'use strict';
// ── roundRect polyfill (iOS Safari < 15.4, older Android) ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad);
    this.lineTo(x + w, y + h - rad);
    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    this.lineTo(x + rad, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad);
    this.lineTo(x, y + rad);
    this.quadraticCurveTo(x, y, x + rad, y);
    this.closePath();
  };
}
// ══════════════════════════════════════════
//  IDOL BUNNY ADVENTURE  アイドルうさぎ大冒険
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
const LEVEL_W = 5800;
const LEVEL_W_MERGED = 10200; // ステージ1 合体（アウトドア+ダンスホール）
const GROUND_TOP = 418;
const GRAVITY = 0.52;
const JUMP_V = -12.5;
const WALK_SPD = 4.2;

// ── Audio (Web Audio API) ──────────────────
let audioCtx = null;
let masterGain = null;   // 全サウンド共通の音量ノード
let masterVolume = 1.0;  // 0.0〜1.0（環境設定で変更）

function _applyMasterVolume(){
  if(masterGain) masterGain.gain.value = masterVolume;
  const a=document.getElementById('bgm'); if(a) a.volume=masterVolume;
  const a3=document.getElementById('bgm3'); if(a3) a3.volume=masterVolume;
}

// 起動直後に AudioContext を作成（Mac アプリ/WKWebView では制限なし）
try {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = masterVolume;
  masterGain.connect(audioCtx.destination); // masterGain自身はdestinationへ直結
} catch(e) {}
function ensureAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = masterVolume;
      masterGain.connect(audioCtx.destination); // masterGain自身はdestinationへ直結
    } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, vol=0.18, type='sine', delay=0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(masterGain||audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  const t = audioCtx.currentTime + delay;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}
function sfxJump()    { beep(350,0.12,0.15,'square'); beep(500,0.08,0.1,'square',0.06); }
function sfxCollect() { beep(660,0.06,0.15); beep(880,0.1,0.12,undefined,0.05); }
function sfxStar()    { [440,550,660,880,1100].forEach((f,i)=>beep(f,0.15,0.12,undefined,i*0.07)); }
function sfxStomp()   { beep(180,0.12,0.2,'sawtooth'); beep(300,0.08,0.1,undefined,0.08); }
function sfxHurt()    { beep(160,0.3,0.2,'sawtooth'); }
function sfxWarpEnter() { // ダンスホール入場SE

}
function sfxDance()   {

}
function sfxFanfare() {

}

// ── ステージ6専用：感動的なメロディ音 ─────────────────
// 3つのオシレーター（メイン＋オクターブ上＋低音）＋残響エコー
function melodyNote(freq, dur=0.72, vol=0.16, delay=0){
  if(!audioCtx) return;
  const t = audioCtx.currentTime + delay;
  function mko(type, f, v, att, rel){
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(masterGain||audioCtx.destination);
    o.type=type; o.frequency.value=f;
    const sus=Math.max(att, dur-rel);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(v,     t+att);
    g.gain.setValueAtTime(v,              t+sus);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.start(t); o.stop(t+dur+0.06);
  }
  mko('sine',     freq,     vol,       0.030, 0.18); // メイン
  mko('triangle', freq*2,   vol*0.18,  0.060, 0.10); // オクターブ上（輝き）
  mko('sine',     freq*0.5, vol*0.14,  0.015, 0.22); // サブ（温かみ）
  // 残響エコー
  const oe=audioCtx.createOscillator(), ge=audioCtx.createGain();
  oe.connect(ge); ge.connect(masterGain||audioCtx.destination);
  oe.type='sine'; oe.frequency.value=freq;
  ge.gain.setValueAtTime(0.001, t+0.20);
  ge.gain.linearRampToValueAtTime(vol*0.09, t+0.26);
  ge.gain.exponentialRampToValueAtTime(0.001, t+0.26+dur*0.55);
  oe.start(t+0.20); oe.stop(t+0.26+dur*0.55+0.06);
}

// ソフトコードパッド（複数周波数を同時持続）
function chordPad(freqs, dur=2.8, vol=0.038, delay=0){
  if(!audioCtx) return;
  const t=audioCtx.currentTime+delay;
  freqs.forEach(f=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(masterGain||audioCtx.destination);
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(vol,   t+0.45);
    g.gain.setValueAtTime(vol,            t+dur-0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.start(t); o.stop(t+dur+0.06);
  });
}

// ステージ6クリア専用BGM（完全合成音）
function sfxWin6(){
  if(!audioCtx) return;
  // ── ベース持続コード ──
  const bassDur=9.0;
  [[130.81,0],[174.61,2.2],[196.00,4.4],[130.81,6.6]].forEach(([f,d])=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(masterGain||audioCtx.destination);
    o.type='triangle'; o.frequency.value=f;
    const t=audioCtx.currentTime+d;
    g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(0.10, t+0.2);
    g.gain.setValueAtTime(0.10, t+1.8);
    g.gain.exponentialRampToValueAtTime(0.001, t+2.2);
    o.start(t); o.stop(t+2.3);
  });
  // ── コードパッド ──
  chordPad([261.63,329.63,392.00], 2.5, 0.050, 0.0);  // C major
  chordPad([261.63,349.23,440.00], 2.5, 0.050, 2.2);  // F major
  chordPad([196.00,392.00,493.88], 2.5, 0.050, 4.4);  // G major (G2/G3/B3)
  chordPad([261.63,329.63,392.00], 3.0, 0.060, 6.6);  // C major（フィナーレ）
  // ── ファンファーレ アルペジオ (0〜1.2s) ──
  [[392.00,0.00],[523.25,0.15],[659.25,0.30],[783.99,0.45],[1046.50,0.65]].forEach(([f,d])=>{
    melodyNote(f, 0.5, 0.16, d);
  });
  // ── メロディ A (1.0〜3.2s) ──
  [[1046.50,1.05,0.55],[880.00,1.65,0.35],[783.99,2.05,0.35],[659.25,2.45,0.65]].forEach(([f,d,dur])=>melodyNote(f,dur,0.17,d));
  // ── メロディ B (3.2〜5.5s) ──
  [[523.25,3.20,0.30],[659.25,3.55,0.30],[783.99,3.90,0.30],[880.00,4.25,0.55],[783.99,4.85,0.30],[659.25,5.20,0.80]].forEach(([f,d,dur])=>melodyNote(f,dur,0.17,d));
  // ── フィナーレ (6.0〜9.0s) 壮大な上昇 ──
  [[523.25,6.00,0.35],[659.25,6.40,0.35],[783.99,6.80,0.35],[1046.50,7.20,2.20]].forEach(([f,d,dur])=>melodyNote(f,dur,0.20,d));
  // 最終和音（フィナーレに重ねる）
  chordPad([523.25,659.25,783.99,1046.50], 2.5, 0.045, 7.15);
}

// キックドラム
function sfxKick(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(masterGain||audioCtx.destination);
  o.type='sine';
  o.frequency.setValueAtTime(160,t);
  o.frequency.exponentialRampToValueAtTime(42,t+0.18);
  g.gain.setValueAtTime(0.38,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.36);
  o.start(t); o.stop(t+0.37);
  // クリックトランジェント
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.connect(g2); g2.connect(masterGain||audioCtx.destination);
  o2.type='square'; o2.frequency.value=80;
  g2.gain.setValueAtTime(0.10,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.04);
  o2.start(t); o2.stop(t+0.05);
}

// スネアドラム
function sfxSnare(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const sz=Math.floor(audioCtx.sampleRate*0.22);
  const buf=audioCtx.createBuffer(1,sz,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const g=audioCtx.createGain();
  src.connect(g); g.connect(masterGain||audioCtx.destination);
  g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.20);
  src.start(t); src.stop(t+0.22);
  const o=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o.connect(g2); g2.connect(masterGain||audioCtx.destination);
  o.type='triangle'; o.frequency.value=220;
  g2.gain.setValueAtTime(0.09,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.10);
  o.start(t); o.stop(t+0.11);
}

// ハイハット
function sfxHihat(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const sz=Math.floor(audioCtx.sampleRate*0.055);
  const buf=audioCtx.createBuffer(1,sz,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const flt=audioCtx.createBiquadFilter();
  flt.type='highpass'; flt.frequency.value=7000;
  const g=audioCtx.createGain();
  src.connect(flt); flt.connect(g); g.connect(masterGain||audioCtx.destination);
  g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.055);
  src.start(t); src.stop(t+0.06);
}

// ベースギター/シンセベース
function sfxBass(freq, dur=1.0){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(masterGain||audioCtx.destination);
  o.type='triangle'; o.frequency.value=freq;
  g.gain.setValueAtTime(0.001,t);
  g.gain.linearRampToValueAtTime(0.24,t+0.025);
  g.gain.setValueAtTime(0.24,t+Math.max(0.03,dur-0.14));
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
  // サブ低音
  const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
  o2.connect(g2); g2.connect(masterGain||audioCtx.destination);
  o2.type='sine'; o2.frequency.value=freq*0.5;
  g2.gain.setValueAtTime(0.001,t);
  g2.gain.linearRampToValueAtTime(0.16,t+0.03);
  g2.gain.setValueAtTime(0.16,t+Math.max(0.04,dur-0.18));
  g2.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o2.start(t); o2.stop(t+dur+0.05);
}

// ── BGM (bgm.mp3) ────────────────────────
let bgmRunning = false;
let bgmTimer = null;
let bgmStage = 1;
let _bgmAudio = null;
function getBGM() {
  if (!_bgmAudio) _bgmAudio = document.getElementById('bgm');
  return _bgmAudio;
}
function startBGM() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 1;
  const a = getBGM(); if (!a) return;
  a.playbackRate = 1.0; a.play().catch(()=>{});
}
function startBGM2() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 2;
  const a = getBGM(); if (!a) return;
  a.playbackRate = 1.15; a.play().catch(()=>{});
}
function startBGM3() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 3;
  const a = document.getElementById('bgm3'); if (!a) return;
  a.currentTime = 0; a.playbackRate = 1.0; a.play().catch(()=>{});
}
function startBGM4() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 4;
  const a = getBGM(); if (!a) return;
  a.currentTime = 0; a.playbackRate = 1.35; a.play().catch(()=>{});
}
function startBGM5() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 5;
  const a = getBGM(); if (!a) return;
  a.currentTime = 0; a.playbackRate = 1.55; a.play().catch(()=>{});

function startBGMWin() {

function startBGM6() {
  bgmStage = 6; // BGMなし（合成音のみ）― _resumeBGM() が誤再生しないよう記録
}
function startBGMForest() {
  if (bgmRunning) return;
  bgmRunning = true; bgmStage = 7;
  const a = getBGM(); if (!a) return;
  a.currentTime = 0; a.playbackRate = 1.18; a.play().catch(()=>{});
}
function stopBGM() {
  bgmRunning = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  const a = getBGM(); if (a) a.pause();
  const a3 = document.getElementById('bgm3'); if (a3) a3.pause();
}
function _resumeBGM() {
  // ポーズ解除時：bgmStageに応じて正しいBGMだけ再開
  if(bgmStage===3){ const a3=document.getElementById('bgm3'); if(a3) a3.play().catch(()=>{}); }
  else if(bgmStage>=1 && bgmStage!==6){ const a=getBGM(); if(a) a.play().catch(()=>{}); }
}

// ── タイトル画面BGM（Web Audio API 合成） ────────────
let _titleBGMRunning = false;
let _titleBGMTimer   = null;
let _titleBGMNodes   = [];

function startTitleBGM() {
  if (_titleBGMRunning || !audioCtx) return;
  _titleBGMRunning = true;
  _titleBGMLoop();
}

function stopTitleBGM() {
  _titleBGMRunning = false;
  if (_titleBGMTimer) { clearTimeout(_titleBGMTimer); _titleBGMTimer = null; }
  _titleBGMNodes.forEach(n => { try { n.stop(0); } catch(e) {} });
  _titleBGMNodes = [];
}

function _titleBGMLoop() {
  if (!_titleBGMRunning || !audioCtx) return;
  const t   = audioCtx.currentTime;
  const bpm = 132;
  const e   = 60 / bpm / 2; // 8分音符

  // ── メロディー（サイン波・キラキラ感）──────────────────
  // Key: C major  2小節ループ（16×8分 ≈ 3.6秒）
  // C arpeggio up/down → Am→F→G resolve
  const mel = [
    // 小節1: C major アルペジオ
    [ 0, 523.25, e*.80, .30], // C5
    [ 1, 659.25, e*.80, .30], // E5
    [ 2, 783.99, e*.80, .30], // G5
    [ 3,1046.50, e*.90, .38], // C6 ★高音
    [ 4, 880.00, e*.80, .28], // A5
    [ 5, 783.99, e*.80, .28], // G5
    [ 6, 659.25, e*.80, .28], // E5
    [ 7, 523.25, e*.90, .28], // C5
    // 小節2: Am→F→G
    [ 8, 440.00, e*.80, .26], // A4
    [ 9, 523.25, e*.80, .28], // C5
    [10, 659.25, e*.80, .28], // E5
    [11, 880.00, e*.90, .34], // A5 ★
    [12, 698.46, e*.80, .26], // F5
    [13, 659.25, e*.80, .26], // E5
    [14, 587.33, e*.80, .28], // D5
    [15, 523.25, e*1.4, .30], // C5（長め、ループ繋ぎ）
  ];
  // ── ベース（三角波・まろやか）────────────────────────
  const bas = [
    [ 0, 130.81, e*3.5, .22], // C2
    [ 4, 110.00, e*3.5, .20], // A2
    [ 8, 130.81, e*3.5, .22], // C2
    [10, 174.61, e*1.8, .18], // F2
    [12, 174.61, e*1.8, .18], // F2
    [14, 196.00, e*1.8, .20], // G2
  ];
  // ── コードシマー（sine・和音感）──────────────────────
  const chd = [
    [ 0, [261.63,329.63,392.00], e*7.5, .06], // C major
    [ 8, [220.00,261.63,329.63], e*3.8, .05], // Am
    [12, [174.61,220.00,261.63], e*1.8, .05], // F
    [14, [196.00,246.94,293.66], e*1.8, .05], // G
  ];

  const loopSec = 16 * e;

  const schedNote = (freq, st, dur, vol, type='sine') => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(masterGain||audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t + st);
    g.gain.linearRampToValueAtTime(vol, t + st + .012);
    g.gain.exponentialRampToValueAtTime(.001, t + st + dur);
    o.start(t + st); o.stop(t + st + dur + .05);
    _titleBGMNodes.push(o);
  };

  for (const [idx, freq, dur, vol] of mel)   schedNote(freq, idx*e, dur, vol);
  for (const [idx, freq, dur, vol] of bas)   schedNote(freq, idx*e, dur, vol, 'triangle');
  for (const [idx, freqs, dur, vol] of chd)
    freqs.forEach(f => schedNote(f, idx*e, dur, vol));

  _titleBGMTimer = setTimeout(() => {
    _titleBGMNodes = [];
    _titleBGMLoop();
  }, (loopSec - .04) * 1000);
}

// ── Input ─────────────────────────────────
const keys = {};
let just = {};

// ── Gamepad support ────────────────────────
// ボタン→keyCode マッピング（標準レイアウト）
// ステージ6リズムゲーム：十字キー=ド〜ファ、Y/B/A/X=ソ〜ド↑
const GP_MAP = [
  // [buttonIndex, keyCode]
  [12, 'ArrowUp'],    // 十字上
  [13, 'ArrowDown'],  // 十字下
  [14, 'ArrowLeft'],  // 十字左
  [15, 'ArrowRight'], // 十字右
  [0,  'Space'],      // A → ジャンプ/爆弾/決定
  [9,  'Enter'],      // Start → 決定
  [8,  'Escape'],     // Select → キャンセル
  // ステージ6 リズムレーン（左手:十字、右手:YXAB）
  [14, 'KeyZ'],       // 十字左  = ど (lane0)
  [13, 'KeyX'],       // 十字下  = れ (lane1)
  [12, 'KeyC'],       // 十字上  = み (lane2)
  [15, 'KeyV'],       // 十字右  = ふぁ (lane3)
  [3,  'KeyB'],       // Y      = そ (lane4)
  [1,  'KeyN'],       // B      = ら (lane5)
  [0,  'KeyM'],       // A      = し (lane6)
  [2,  'Comma'],      // X      = ど↑ (lane7)
];
let gpPrev = {}; // 前フレームのボタン状態

function pollGamepad() {
  const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = Array.from(gamepads).find(g => g && g.connected);

  // 前フレームにゲームパッドが押していたキーを解放（キーボード優先）
  for (const key of Object.keys(gpPrev)) {
    if (gpPrev[key] && !keys[key + '_kb']) delete keys[key];
  }

  if (!gp) { gpPrev = {}; return; }

  const cur = {};
  // アナログスティック（軸0=左右、軸1=上下、閾値0.5）
  if (gp.axes[0] < -0.5) cur['ArrowLeft']  = cur['KeyZ']  = true;
  if (gp.axes[0] >  0.5) cur['ArrowRight'] = cur['KeyV']  = true;
  if (gp.axes[1] < -0.5) cur['ArrowUp']    = cur['KeyC']  = true;
  if (gp.axes[1] >  0.5) cur['ArrowDown']  = cur['KeyX']  = true;

  // デジタルボタン
  for (const [bi, code] of GP_MAP) {
    if (gp.buttons[bi] && gp.buttons[bi].pressed) cur[code] = true;
  }

  // ステージ5（音ゲー） 持続音：curが確定してから gpPrev と比較して押下/離しを検出
  if (currentStage === 5 && state === 'play') {
    // コードノートのstart/stop検出
    if (s6Notes) {
      for (const n of s6Notes.filter(n => n.isChord && n.state !== 'miss')) {
        const cA = S6_KEYS[n.laneA], cB = S6_KEYS[n.laneB];
        const nowBoth = cur[cA] && cur[cB];
        const prevBoth = gpPrev[cA] && gpPrev[cB];
        if (nowBoth && !prevBoth) { s6StopNote(n.laneA); s6StopNote(n.laneB); s6StartNote(n.lane, n.freq); } // 個別音を止めてからコード音開始
        if (!nowBoth && prevBoth) s6StopNote(n.lane);          // どちらか離した
      }
    }
    // 通常レーンキーのstart/stop（コードの両方が押されている場合は個別音を出さない）
    for (const code of Object.keys(cur)) {
      if (!gpPrev[code]) {
        const li = S6_KEYS.indexOf(code);
        if (li !== -1) {
          const inChord = s6Notes && s6Notes.some(n =>
            n.isChord && n.state !== 'miss' &&
            (n.laneA===li || n.laneB===li) &&
            cur[S6_KEYS[n.laneA]] && cur[S6_KEYS[n.laneB]]
          );
          if (!inChord) s6StartNote(li);
        }
      }
    }
    for (const code of Object.keys(gpPrev)) {
      if (!cur[code]) {
        const li = S6_KEYS.indexOf(code);
        if (li !== -1) s6StopNote(li);
      }
    }
  }

  // keys/just に反映
  for (const code of Object.keys(cur)) {
    if (!gpPrev[code]) just[code] = true; // 今フレームで初めて押した
    keys[code] = true;
  }
  gpPrev = cur;
}
document.addEventListener('keydown', e=>{
  ensureAudio();
  if (!keys[e.code]) just[e.code] = true;
  keys[e.code] = true;
  // ステージ6：キーを押している間だけ持続音を鳴らす
  if(state==='play'&&currentStage===5){
    const li=S6_KEYS.indexOf(e.code);
    if(li!==-1){
      // コードノートの片方を押したとき、もう片方が既に押されていれば和音スタート
      const cn=s6Notes&&s6Notes.find(n=>n.isChord&&n.state!=='miss'&&(n.laneA===li||n.laneB===li));
      if(cn&&keys[S6_KEYS[cn.laneA===li?cn.laneB:cn.laneA]]){
        // 両方押された → 先に鳴っていた個別音を止めてコード音スタート
        s6StopNote(cn.laneA===li ? cn.laneB : cn.laneA);
        s6StartNote(cn.lane, cn.freq);
      } else {
        s6StartNote(li);
      }
    }
  }
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e=>{
  keys[e.code]=false;
  // ステージ6：キーを離したら音をフェードアウト
  if(currentStage===5){
    const li=S6_KEYS.indexOf(e.code);
    if(li!==-1){
      s6StopNote(li);
      // コードノートも停止
      const cn=s6Notes&&s6Notes.find(n=>n.isChord&&(n.laneA===li||n.laneB===li));
      if(cn) s6StopNote(cn.lane);
    }
  }
});

// Button positions (in canvas-logical coords)
const TB = {
  left:  { x: 70,    y: H - 55, r: 40 },
  right: { x: 185,   y: H - 55, r: 40 },
  jump:  { x: W - 80, y: H - 55, r: 48 },
};
// Stage 3 上下ボタン（左側に寄せて十字キー配置）
const TB3 = {
  up:   { x: 128, y: H - 105, r: 38 },
  down: { x: 128, y: H - 5,   r: 38 },
};
// Stage 2 ドア入室ボタン
const TB_DOOR = { x: W/2, y: H - 55, r: 42 };
let s2NearDoor = false;
let s1HallTransition = 0; // ダンスホール入場トランジション(0=なし,1-60=進行中)
let s1HallEntered = false;  // ダンスホール入場済みフラグ
let s2Bullets = [];     // 魔法弾（世界座標）
let s2FireCD  = 0;      // 発射クールダウン
let s2SwordTimer = 0;   // 剣振りアニメ残フレーム（>0=振り中）
let s2SwordCD    = 0;   // 剣振りクールダウン
// Stage 6 タッチ中のレーン管理（touchId → lane）
const s6TouchLaneMap = new Map();
const activeTouches = {};

function touchPt(t){
  const r = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - r.left) * (W / r.width),
    y: (t.clientY - r.top)  * (H / r.height),
  };
}
function hitBtn(x, y, b){ return Math.hypot(x - b.x, y - b.y) < b.r; }

function s6GetTouchLane(x, y){
  // S6_X0 / S6_LANE_W は後方で定義されるが実行時には初期化済み
  const x0 = (800 - 8*88)/2; // S6_X0
  const lw  = 88;             // S6_LANE_W
  if(x < x0 || x >= x0 + 8*lw) return -1;
  return Math.max(0, Math.min(7, Math.floor((x - x0) / lw)));
}

function syncTouchKeys(){
  keys['ArrowLeft']  = false;
  keys['ArrowRight'] = false;
  keys['Space']      = false;
  keys['ArrowUp']    = false;
  keys['ArrowDown']  = false;
  for(const id in activeTouches){
    const {x, y} = activeTouches[id];
    if(hitBtn(x, y, TB.left))  keys['ArrowLeft']  = true;
    if(hitBtn(x, y, TB.right)) keys['ArrowRight'] = true;
    if(hitBtn(x, y, TB.jump))  keys['Space']      = true;
    if((currentStage===2||currentStage===3||currentStage===4) && hitBtn(x, y, TB3.up))   keys['ArrowUp']   = true;
    if((currentStage===2||currentStage===3||currentStage===4) && hitBtn(x, y, TB3.down))  keys['ArrowDown']  = true;
  }
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  ensureAudio();
  for(const t of e.changedTouches){
    const pt = touchPt(t);
    activeTouches[t.identifier] = pt;

    if(state === 'select'){
      // ステージパネルタップ → 即スタート
      const sw=105, sh=52, gap=10;
      const totalW=6*(sw+gap)-gap;
      const sx0=W/2-totalW/2;
      let stageTapped=false;
      for(let i=0;i<6;i++){
        const bx=sx0+i*(sw+gap), by=408;
        if(pt.x>=bx&&pt.x<=bx+sw&&pt.y>=by&&pt.y<=by+sh){
          ensureAudio(); initGame(i+1); stageTapped=true; break;
        }
      }
      if(!stageTapped){
        if(pt.y > H * 0.72) just['Space'] = true;
        else charType = pt.x < W / 2 ? 'pink' : 'white';
      }
      continue;
    }
    if(state === 'stage_clear' || state === 'win' || state === 'gameover'){
      just['Space'] = true;
      delete activeTouches[t.identifier];
      continue;
    }
    // 衣装部屋: パネルタップで選択・決定、出るボタン
    if(state === 'costume_room'){
      const cw=180, ch=220, gap=30;
      const totalW=3*(cw+gap)-gap;
      const ox=W/2-totalW/2;
      let handled=false;
      // 出るボタン
      if(pt.x>=W/2-70&&pt.x<=W/2+70&&pt.y>=H-60&&pt.y<=H-24){
        state='play'; handled=true;
      }
      if(!handled){
        for(let i=0;i<3;i++){
          const px=ox+i*(cw+gap), py=160;
          if(pt.x>=px&&pt.x<=px+cw&&pt.y>=py&&pt.y<=py+ch){
            costumeSelectIdx=i; costumeType=i; state='play'; handled=true; break;
          }
        }
      }
      continue;
    }
    // 曲選択: パネルタップで選択・スタート
    if(state === 'song_select' && currentStage===5){
      const pw=188, ph=96, pgap=13, rowGap=11;
      const totalPW=3*(pw+pgap)-pgap;
      const px0=W/2-totalPW/2;
      const rowY=[210, 210+ph+rowGap];
      let handled=false;
      for(let i=0;i<6;i++){
        const col=i%3, row=Math.floor(i/3);
        const bx=px0+col*(pw+pgap), by=rowY[row];
        if(pt.x>=bx&&pt.x<=bx+pw&&pt.y>=by&&pt.y<=by+ph){
          s6SongIdx=i; s6StartSong=i; s6BuildChart(i); state='play';
          handled=true; break;
        }
      }
      // 左右矢印タップ
      if(!handled){
        const arrowY=rowY[0]+ph+rowGap/2;
        if(pt.x<px0) s6SongIdx=(s6SongIdx+5)%6;
        else if(pt.x>px0+totalPW) s6SongIdx=(s6SongIdx+1)%6;
      }
      continue;
    }
    // 曲クリア中間画面：タップで次の曲へ
    if(state === 'song_clear' && currentStage===5){
      if(s6SongClearTimer>60){ just['Space']=true; }
      continue;
    }
    // Stage 6: レーンタッチ（音符を鳴らす）
    if(currentStage===5 && state==='play'){
      const lane = s6GetTouchLane(pt.x, pt.y);
      if(lane !== -1){
        s6TouchLaneMap.set(t.identifier, lane);
        just[S6_KEYS[lane]] = true;
        s6StartNote(lane);
        continue;
      }
    }
    // Stage 1/2: ドアボタン
    if(currentStage===1 && s2NearDoor && hitBtn(pt.x, pt.y, TB_DOOR)){
      just['ArrowUp'] = true;
      continue;
    }
    if(hitBtn(pt.x, pt.y, TB.jump)) just['Space'] = true;
  }
  syncTouchKeys();
}, { passive: false });

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches) activeTouches[t.identifier] = touchPt(t);
  syncTouchKeys();
}, { passive: false });

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(s6TouchLaneMap.has(t.identifier)){
      s6StopNote(s6TouchLaneMap.get(t.identifier));
      s6TouchLaneMap.delete(t.identifier);
    }
    delete activeTouches[t.identifier];
  }
  syncTouchKeys();
}, { passive: false });

canvas.addEventListener('touchcancel', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(s6TouchLaneMap.has(t.identifier)){
      s6StopNote(s6TouchLaneMap.get(t.identifier));
      s6TouchLaneMap.delete(t.identifier);
    }
    delete activeTouches[t.identifier];
  }
  syncTouchKeys();
}, { passive: false });

  s3Enemies3.push({
    x:W+20, y, w:big?38:28, h:big?38:28,
    hp:big?2:1, maxHP:big?2:1,
    vx:-spd, t:0, type, shootT:0, on:true
  });
}

function s3BossShoot(){
  if(!s3Boss) return;
  const bo=s3Boss;
  const cx=bo.x, cy=bo.y+bo.h/2;
  const hr=bo.hp/bo.maxHP;
  const phase=hr>0.75?1:hr>0.50?2:hr>0.25?3:4;
  const spd=5+( 1-hr)*4; // HPが低いほど速い弾

  const aimed=(offAngle=0)=>{
    const dx=P.x+P.w/2-cx, dy=P.y+P.h/2-cy;
    const a=Math.atan2(dy,dx)+offAngle;
    s3EBullets.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,on:true});
  };

  if(phase===1){
    // 1フェーズ: 狙い撃ち×1
    aimed();
  } else if(phase===2){
    // 2フェーズ: 3方向狙い撃ち
    aimed(-0.28); aimed(0); aimed(0.28);
  } else if(phase===3){
    // 3フェーズ: 5連スプレッド＋狙い撃ち
    for(let i=-2;i<=2;i++)
      s3EBullets.push({x:cx,y:cy,vx:-(spd+0.5),vy:i*2.4,on:true});
    aimed(-0.18); aimed(0.18);
  } else {
    // 4フェーズ（瀕死）: 8方向放射＋連続狙い撃ち
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2+bo.t*0.06;
      s3EBullets.push({x:bo.x+bo.w/2,y:cy,vx:Math.cos(a)*(spd+1),vy:Math.sin(a)*(spd+1),on:true});
    }
    aimed(-0.35); aimed(0); aimed(0.35);
  }
  beep(160+phase*20, 0.1, 0.14, 'sawtooth');
}

function s3HitPlayer(){
  if(s3ShieldTimer>0){
    // シールドが有効なら無効化してバリア演出
    spawnParticles(P.x+P.w/2,P.y+P.h/2,'#00BFFF',10,'circle');
    spawnText(P.x+P.w/2,P.y-20,'🛡 GUARD！','#00BFFF');
    return;
  }
  sfxHurt(); lives--;
  s3InvT=130;
  spawnParticles(P.x+P.w/2,P.y+P.h/2,'#FF69B4',12,'circle');
  if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
}

function updateStage3(){
  s3GameT++;
  if(s3InvT>0) s3InvT--;

  // ── 移動 (重力なし)
  const ml=keys['ArrowLeft']||keys['KeyA'];
  const mr=keys['ArrowRight']||keys['KeyD'];
  const mu=keys['ArrowUp']||keys['KeyW'];
  const md=keys['ArrowDown']||keys['KeyS'];
  P.vx = ml?-S3_SPD:mr?S3_SPD:0;
  P.vy = mu?-S3_SPD:md?S3_SPD:0;
  P.x  = Math.max(10,Math.min(W*0.38-P.w, P.x+P.vx));
  P.y  = Math.max(10,Math.min(H-P.h-10,   P.y+P.vy));
  P.facing = mr?1:ml?-1:P.facing;
  P.walkT += 0.08;

  // ── 3連砲タイマーカウントダウン
  if(s3TripleTimer>0) s3TripleTimer--;

  // ── 音符3つ溜まったら3連砲発動（自動）
  if(s3NoteCount>=3 && s3TripleTimer===0){
    s3NoteCount-=3;
    s3TripleTimer=1800; // 30秒 × 60fps
    beep(880,0.12,0.18,'square'); beep(1100,0.08,0.14,'square',0.06);
    spawnText(P.x+P.w/2,P.y-20,'★３連砲 30秒！★','#FFD700');
  }

  // ── 手動射撃（Space）
  if(just['Space']||just['Enter']){
    if(s3TripleTimer>0){
      // ３連砲モード
      for(let i=-1;i<=1;i++)
        s3Bullets.push({x:P.x+P.w/2+32,y:P.y+P.h/2-32+i*14,vx:S3_BSPD*0.85,vy:i*2.5,on:true,big:true});
      beep(880,0.07,0.1,'square');
    } else {
      // 通常射撃（杖の先端から）
      s3Bullets.push({x:P.x+P.w/2+32,y:P.y+P.h/2-32,vx:S3_BSPD,vy:0,on:true,big:false});
      beep(700,0.05,0.08,'square');
    }
  }

  // ── 音符アイテム更新
  for(let i=s3Notes.length-1;i>=0;i--){
    const n=s3Notes[i];
    n.x+=n.vx; n.y+=n.vy; n.t++;
    n.vy+=0.04; // 少し落下
    if(n.x<-20||n.y>H+20){ s3Notes.splice(i,1); continue; }
    // プレイヤーが触れたら取得
    if(P.x<n.x+10&&P.x+P.w>n.x-10&&P.y<n.y+10&&P.y+P.h>n.y-10){
      s3NoteCount=Math.min(s3NoteCount+1,9);
      sfxCollect();
      spawnParticles(n.x,n.y,'#FFD700',6,'note');
      spawnText(n.x,n.y-12,'♪+1','#FFD700');
      s3Notes.splice(i,1);
    }
  }

  // ── ハートアイテム更新（3連砲中に出現、取るとライフ+1）
  for(let i=s3Hearts.length-1;i>=0;i--){
    const h=s3Hearts[i];
    h.x+=h.vx; h.y+=h.vy; h.t++;
    h.vy+=0.05;
    if(h.x<-20||h.y>H+20){ s3Hearts.splice(i,1); continue; }
    if(P.x<h.x+12&&P.x+P.w>h.x-12&&P.y<h.y+12&&P.y+P.h>h.y-12){
      lives=Math.min(lives+1,9);
      beep(660,0.08,0.12,'sine'); beep(880,0.1,0.15,'sine',0.08); beep(1100,0.12,0.18,'sine',0.16);
      spawnParticles(h.x,h.y,'#FF69B4',8,'circle');
      spawnText(h.x,h.y-14,'♥ ライフ+1！','#FF69B4');
      s3Hearts.splice(i,1);
    }
  }

  // ── プレイヤー弾更新
  for(let i=s3Bullets.length-1;i>=0;i--){
    const b=s3Bullets[i];
    b.x+=b.vx; b.y+=b.vy;
    if(b.x>W+30||b.y<-20||b.y>H+20) b.on=false;
    if(!b.on) s3Bullets.splice(i,1);
  }

  // ── 敵スポーン
  if(!s3BossActive){
    s3SpawnT++;
    const interval=s3KillCount<5?80:s3KillCount<10?60:44;
    if(s3SpawnT>=interval){ s3SpawnT=0; spawnS3Enemy(); }
    if(s3KillCount>=15 && s3Enemies3.filter(e=>e.on).length===0){
      s3BossActive=true;
      s3Boss={x:W+100,y:H/2-65,w:110,h:140,hp:300,maxHP:300,vx:-1.8,t:0,shootT:0,on:true};
      spawnText(W/2,H/2-60,'BOSS出現！','#FF3333');
      beep(150,0.6,0.2,'sawtooth');
    }
  }

  // ── 通常敵更新
  for(let i=s3Enemies3.length-1;i>=0;i--){
    const e=s3Enemies3[i];
    if(!e.on){ s3Enemies3.splice(i,1); continue; }
    e.t++;
    if(e.type==='basic'){
      e.x+=e.vx;
    } else if(e.type==='zigzag'){
      e.x+=e.vx;
      e.y=Math.max(15,Math.min(H-e.h-15, e.y+Math.sin(e.t*0.12)*3.5));
    } else {
      e.x+=e.vx*0.7;
      e.y=Math.max(15,Math.min(H-e.h-15, e.y+Math.sin(e.t*0.06)*1.5));
      e.shootT++;
      if(e.shootT>=90){
        e.shootT=0;
        const dx=P.x+P.w/2-e.x, dy=P.y+P.h/2-(e.y+e.h/2);
        const len=Math.hypot(dx,dy)||1;
        s3EBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/len*4.5,vy:dy/len*4.5,on:true});
        beep(220,0.06,0.08,'sawtooth');
      }
    }
    if(e.x+e.w<-20){ e.on=false; continue; }

    // 弾 vs 敵
    for(const b of s3Bullets){
      if(!b.on||!e.on) continue;
      const bw=b.big?16:8;
      if(b.x<e.x+e.w&&b.x+bw>e.x&&b.y<e.y+e.h&&b.y+bw>e.y){
        b.on=false; e.hp-=b.big?2:1;
        if(e.hp<=0){
          e.on=false; s3KillCount++;
          const pts=e.type==='shooter'?300:150;
          score+=pts;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,'#FFD700',8,'star');
          spawnText(e.x+e.w/2,e.y-10,`+${pts}`,'#FFD700');
          sfxStomp();
          // 3連砲発動中はハートをドロップ、未発動は音符をドロップ
          if(s3TripleTimer>0){
            // ハートドロップ（shooter=必ず、他=60%）
            if(e.type==='shooter'||Math.random()<0.6){
              s3Hearts.push({x:e.x+e.w/2,y:e.y+e.h/2,
                vx:(Math.random()-0.5)*2,
                vy:-2.5-Math.random()*1.5, t:0});
            }
          } else {
            // 通常は音符ドロップ（shooter=必ず、他=50%）
            if(e.type==='shooter'||Math.random()<0.5){
              s3Notes.push({x:e.x+e.w/2,y:e.y+e.h/2,
                vx:(Math.random()-0.5)*2-0.5,
                vy:-2-Math.random()*1.5, t:0});
            }
          }
        }
      }
    }
    // 敵 vs プレイヤー
    if(s3InvT<=0&&P.x<e.x+e.w&&P.x+P.w>e.x&&P.y<e.y+e.h&&P.y+P.h>e.y){
      e.on=false; s3HitPlayer();
    }
  }

  // ── ボス更新
  if(s3Boss&&s3Boss.on){
    const bo=s3Boss;
    bo.t++;
    if(bo.x>W-bo.w-50){
      bo.x+=bo.vx;
    } else {
      bo.y=H/2-bo.h/2+Math.sin(bo.t*0.022)*140;
      bo.shootT++;
      const rate=bo.hp<bo.maxHP*0.25?28:bo.hp<bo.maxHP*0.5?40:bo.hp<bo.maxHP*0.75?58:80;
      if(bo.shootT>=rate){ bo.shootT=0; s3BossShoot(); }
    }
    // 弾 vs ボス
    for(const b of s3Bullets){
      if(!b.on||!bo.on) continue;
      const bw=b.big?16:8;
      if(b.x<bo.x+bo.w&&b.x+bw>bo.x&&b.y<bo.y+bo.h&&b.y+bw>bo.y){
        b.on=false; bo.hp-=b.big?3:1;
        spawnParticles(b.x,b.y,'#FF69B4',4,'circle');
        sfxStomp();
        if(bo.hp<=0){
          bo.on=false; score+=3000;
          spawnParticles(bo.x+bo.w/2,bo.y+bo.h/2,'#FFD700',40,'star');
          spawnParticles(bo.x+bo.w/2,bo.y+bo.h/2,'#FF69B4',20,'circle');
          spawnText(bo.x+bo.w/2,bo.y-10,'BOSS撃破！+3000','#FFD700');
          sfxFanfare(); s3WinCD=150;
        }
      }
    }
    // ボス vs プレイヤー
    if(s3InvT<=0&&P.x<bo.x+bo.w&&P.x+P.w>bo.x&&P.y<bo.y+bo.h&&P.y+P.h>bo.y)
      s3HitPlayer();
  }

  // ── ボス撃破後カウントダウン
  if(s3WinCD>0){ s3WinCD--; if(s3WinCD===0) triggerWin(); }

  // ── シールドタイマー
  if(s3ShieldTimer>0) s3ShieldTimer--;

  // ── ボス戦中シールドアイテムスポーン（約8秒ごと）
  if(s3BossActive && s3Boss && s3Boss.on){
    s3ShieldSpawnT++;
    if(s3ShieldSpawnT>=480){
      s3ShieldSpawnT=0;
      s3ShieldItems.push({
        x: 20+Math.random()*(W*0.34-40),
        y: 80+Math.random()*(H-180),
        t:0, on:true
      });
    }
  }

  // ── シールドアイテム更新
  for(let i=s3ShieldItems.length-1;i>=0;i--){
    const sh=s3ShieldItems[i];
    sh.t++;
    // 上下にふわふわ
    sh.y+=Math.sin(sh.t*0.07)*0.6;
    // プレイヤーが触れたら取得
    if(P.x<sh.x+18&&P.x+P.w>sh.x-18&&P.y<sh.y+18&&P.y+P.h>sh.y-18){
      s3ShieldTimer=300; // 5秒 × 60fps
      beep(660,0.1,0.08,'sine'); beep(880,0.1,0.1,'sine',0.08); beep(1100,0.12,0.15,'sine',0.16);
      spawnParticles(sh.x,sh.y,'#00BFFF',16,'circle');
      spawnText(sh.x,sh.y-20,'🛡 バリア 5秒！','#00BFFF');
      s3ShieldItems.splice(i,1); continue;
    }
    // 画面外・時間切れ（15秒）で消滅
    if(sh.t>900) s3ShieldItems.splice(i,1);
  }

  // ── 敵弾更新
  for(let i=s3EBullets.length-1;i>=0;i--){
    const b=s3EBullets[i];
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30) b.on=false;
    if(b.on&&s3InvT<=0&&P.x<b.x+8&&P.x+P.w>b.x&&P.y<b.y+8&&P.y+P.h>b.y){
      b.on=false; s3HitPlayer();
    }
    if(!b.on) s3EBullets.splice(i,1);
  }

  // ── 星スクロール
  s3Stars.forEach(s=>{ s.x-=s.spd; if(s.x<-5){ s.x=W+5; s.y=Math.random()*H; } });
  updateFX();
}

// ── Stage 3 描画 ─────────────────────────
function drawStage3BG(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#02000f'); bg.addColorStop(0.5,'#080025'); bg.addColorStop(1,'#050018');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  s3Stars.forEach(s=>{
    const tw=0.5+Math.abs(Math.sin(s3GameT*0.04+s.phase))*0.5;
    ctx.globalAlpha=tw*Math.min(1,s.sz/2);
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.sz*0.7,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  [[W*0.65,H*0.3,200,'rgba(80,0,180,0.07)'],[W*0.78,H*0.7,160,'rgba(0,80,200,0.06)'],
   [W*0.5, H*0.5,130,'rgba(180,0,100,0.05)']].forEach(([nx,ny,nr,nc])=>{
    const g=ctx.createRadialGradient(nx,ny,0,nx,ny,nr);
    g.addColorStop(0,nc); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
}

function drawS3Enemy(e){
  if(!e.on||e.x+e.w<-10||e.x>W+10) return;
  ctx.save(); ctx.translate(e.x+e.w/2,e.y+e.h/2);
  if(e.type==='basic'){
    // エイリアン1 - 緑の宇宙人
    const bob=Math.sin(e.t*0.15)*3;
    ctx.translate(0,bob);
    ctx.fillStyle='#33CC33';
    ctx.beginPath(); ctx.ellipse(0,4,13,14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.ellipse(-5,-2,6,7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-2,6,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(-5,-2,3.5,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-2,3.5,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(150,220,255,0.85)';
    ctx.beginPath(); ctx.arc(-4,-3,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-3,1.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#227722'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,9,4,0.2,Math.PI-0.2); ctx.stroke();
    ctx.strokeStyle='#33CC33'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-5,-13); ctx.lineTo(-9,-23); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,-13); ctx.lineTo(9,-23); ctx.stroke();
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(-9,-23,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-23,3.5,0,Math.PI*2); ctx.fill();
  } else if(e.type==='zigzag'){
    // エイリアン2 - 紫の三つ目宇宙人
    const jiggle=Math.sin(e.t*0.2)*2;
    ctx.fillStyle='#8833EE';
    ctx.beginPath();
    ctx.moveTo(0,-15+jiggle);
    ctx.bezierCurveTo(16,-10,18,6,10,16);
    ctx.bezierCurveTo(4,22,-4,22,-10,16);
    ctx.bezierCurveTo(-18,6,-16,-10,0,-15+jiggle);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#AA66FF';
    ctx.beginPath(); ctx.ellipse(-3,-4,8,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFE000';
    ctx.beginPath(); ctx.arc(-7,0,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,0,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-9,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-7,0,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,0,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-9,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(-6,-1,1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,-1,1,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#9933CC';
    ctx.beginPath();
    ctx.arc(0,-5,18,Math.PI,0);
    ctx.lineTo(18,14);
    ctx.bezierCurveTo(10,8,6,22,0,14);
    ctx.bezierCurveTo(-6,22,-10,8,-18,14);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(-6,-5,4.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-5,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c00';
    ctx.beginPath(); ctx.arc(-5,-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-4,2,0,Math.PI*2); ctx.fill();
    if(e.hp<e.maxHP){
      ctx.fillStyle='#333'; ctx.fillRect(-19,-28,38,5);
      ctx.fillStyle='#FF3333'; ctx.fillRect(-19,-28,38*(e.hp/e.maxHP),5);
    }
  }
  ctx.restore();
}

  const bo=s3Boss;
  ctx.save(); ctx.translate(bo.x+bo.w/2, bo.y+bo.h/2);
  const pulse=1+Math.sin(bo.t*0.06)*0.03;
  ctx.scale(pulse,pulse);

  // ── ダッフルコート（青）

  ctx.beginPath(); ctx.ellipse(0,22,44,52,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#153D7A';

}

function drawS3Bullets(){
  s3Bullets.forEach(b=>{
    if(!b.on) return;
    ctx.save(); ctx.translate(b.x+(b.big?8:0),b.y);
    if(b.big){
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
      drawStar(0,0,11,'#FFD700');
    } else {
      ctx.shadowColor='#FF69B4'; ctx.shadowBlur=6;
      ctx.fillStyle='#FF69B4';
      ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(-1,-1,1.8,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.restore();
  });
  s3EBullets.forEach(b=>{
    if(!b.on) return;
    ctx.save(); ctx.translate(b.x+4,b.y+4);
    ctx.shadowColor='#FF4444'; ctx.shadowBlur=8;
    ctx.fillStyle='#FF4444';
    ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFAAAA';
    ctx.beginPath(); ctx.arc(-1,-1,2.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  });
}

function drawS3Player(){
  const blink=s3InvT>0&&Math.floor(s3InvT/5)%2===0;
  if(blink) return;
  const cx=P.x+P.w/2, cy=P.y+P.h/2;

  ctx.save();
  ctx.translate(cx, cy+6);
  if(P.facing<0) ctx.scale(-1,1);

  // ── スラスター炎（後方からの推進力）
  const fl=20+Math.sin(s3GameT*0.28)*7;
  ctx.globalAlpha=0.85;
  const tg=ctx.createRadialGradient(-26,6,0,-26,6,fl);
  tg.addColorStop(0,'#FFD700'); tg.addColorStop(0.4,'#FF6600'); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.ellipse(-26,6,fl,8,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // ── ハリネズミ本体（丸くてかわいい）
  // メインボディ（丸みのある体）
  ctx.fillStyle='#9B6B2C';
  ctx.beginPath(); ctx.ellipse(0,8,24,15,0,0,Math.PI*2); ctx.fill();
  // お腹（顔と同じクリーム白）
  ctx.fillStyle='#F0EDE0';
  ctx.beginPath(); ctx.ellipse(4,12,17,9,0,0,Math.PI*2); ctx.fill();

  // 後ろ足
  ctx.fillStyle='#9B6B2C';
  ctx.beginPath(); ctx.ellipse(-14,20,7,5,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-6,22,6,4,0.2,0,Math.PI*2); ctx.fill();
  // 前足
  ctx.beginPath(); ctx.ellipse(18,20,6,4,-0.2,0,Math.PI*2); ctx.fill();

  // 頭（前方、丸くてキュート）白っぽいクリーム色
  ctx.fillStyle='#F0EDE0';
  ctx.beginPath(); ctx.arc(22,3,14,0,Math.PI*2); ctx.fill();
  // 頭のハイライト（薄いクリーム）
  ctx.fillStyle='#F8F5EC';
  ctx.beginPath(); ctx.arc(18,-1,9,0,Math.PI*2); ctx.fill();

  // 鼻先（薄茶色）
  ctx.fillStyle='#C8A878';
  ctx.beginPath(); ctx.ellipse(32,7,8,5,0.15,0,Math.PI*2); ctx.fill();
  // 黒い鼻（ツヤあり）
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(38,5,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(37,4,1.3,0,Math.PI*2); ctx.fill();

  // 目（小さめ・キラキラ）
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(22,-3,2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(23,-4,1.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(140,210,255,0.9)';
  ctx.beginPath(); ctx.arc(23,-4,0.55,0,Math.PI*2); ctx.fill();

  // ほっぺ（チーク）
  ctx.fillStyle='rgba(255,130,90,0.38)';
  ctx.beginPath(); ctx.arc(30,4,5,0,Math.PI*2); ctx.fill();

  // にっこり口
  ctx.strokeStyle='#8B6040'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.arc(34,10,4,0.25,Math.PI-0.25); ctx.stroke();

  // 焦茶色の耳（ハリネズミらしい丸耳）
  ctx.fillStyle='#3D1800';
  ctx.beginPath(); ctx.ellipse(14,-16,7,9,-0.2,0,Math.PI*2); ctx.fill(); // 耳の外側
  ctx.fillStyle='#6B3010';
  ctx.beginPath(); ctx.ellipse(14,-16,4.5,6.5,-0.2,0,Math.PI*2); ctx.fill(); // 耳の内側
  ctx.fillStyle='rgba(255,160,130,0.5)';
  ctx.beginPath(); ctx.ellipse(14,-16,2.5,4,-0.2,0,Math.PI*2); ctx.fill(); // 耳の奥

  // トゲ（背中、白と焦茶色のふさふさ長い毛）
  const spines=[
    {x:-20,h:22,a:-0.42},{x:-14,h:26,a:-0.26},{x:-7,h:29,a:-0.12},
    {x:0,h:30,a:0.0},{x:7,h:28,a:0.13},{x:14,h:25,a:0.27},{x:20,h:20,a:0.40}
  ];
  // 焦茶色の層（奥）
  spines.forEach(({x,h,a},i)=>{
    ctx.save(); ctx.translate(x,-8);
    ctx.rotate(a+Math.sin(s3GameT*0.09+i*0.9)*0.07);
    ctx.fillStyle='#3D1800';
    ctx.beginPath(); ctx.moveTo(-4.5,0); ctx.quadraticCurveTo(-2,-h*0.6,0,-h); ctx.quadraticCurveTo(2,-h*0.6,4.5,0); ctx.closePath(); ctx.fill();
    // 先端を細く
    ctx.fillStyle='#2A1000';
    ctx.beginPath(); ctx.moveTo(-1.5,-h*0.55); ctx.lineTo(0,-h); ctx.lineTo(1.5,-h*0.55); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  // 白い層（手前、少しずらしてふさふさ感）
  spines.forEach(({x,h,a},i)=>{
    ctx.save(); ctx.translate(x+1.5,-8);
    ctx.rotate(a+Math.sin(s3GameT*0.09+i*0.9+0.5)*0.07-0.08);
    ctx.fillStyle='#F2EFE5';
    ctx.beginPath(); ctx.moveTo(-3.5,0); ctx.quadraticCurveTo(-1.5,-h*0.55,0,-h*0.92); ctx.quadraticCurveTo(1.5,-h*0.55,3.5,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  ctx.restore();

  // ── うさぎキャラ（静止ポーズでハリネズミの上に着座）
  ctx.save();
  ctx.translate(cx, cy-28);
  ctx.scale(0.62,0.62);
  if(P.facing<0) ctx.scale(-1,1);
  drawCharacter(0,0,1,0,false,false,0); // walkT=0 で完全静止
  ctx.restore();

  // ── マジカルステッキ（常に右向き・先端から弾を発射）
  ctx.save();
  const wx0=cx+10, wy0=cy-26; // 腕の付け根
  const wx1=cx+32, wy1=cy-32; // 先端（弾の発射口）
  // 杖の柄
  const wg=ctx.createLinearGradient(wx0,wy0,wx1,wy1);
  wg.addColorStop(0,'#6B3A10'); wg.addColorStop(1,'#A0522D');
  ctx.strokeStyle=wg; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(wx0,wy0); ctx.lineTo(wx1,wy1); ctx.stroke();
  // 先端の星（点滅）
  const wGlow=0.7+Math.sin(s3GameT*0.2)*0.3;
  ctx.globalAlpha=wGlow;
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
  drawStar(wx1,wy1,7,'#FFD700');
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(wx1,wy1,2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawS3HUD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.42)'; ctx.fillRect(0,0,W,42);
  ctx.fillStyle='#FFD700'; ctx.font='bold 17px Arial'; ctx.textAlign='left';
  ctx.fillText(`スコア: ${score}`,10,27);
  ctx.fillStyle='#87CEEB'; ctx.font='bold 13px Arial';
  ctx.fillText('パディントンを倒せ！',10,41);
  // 音符ゲージ / 3連砲タイマー
  ctx.textAlign='left';
  if(s3TripleTimer>0){
    // 発動中：残り秒数バー
    const sec=Math.ceil(s3TripleTimer/60);
    const pulse=Math.sin(s3GameT*0.25)>0;
    ctx.fillStyle=pulse?'#FFD700':'#FF8800'; ctx.font='bold 13px Arial';
    ctx.fillText(`★３連砲 残り${sec}秒`,120,28);
    // 残り時間バー
    ctx.fillStyle='#333'; ctx.fillRect(120,32,160,5);
    ctx.fillStyle='#FFD700'; ctx.fillRect(120,32,s3TripleTimer/1800*160,5);
  } else {
    // 未発動：音符チャージ表示
    ctx.fillStyle='#aaa'; ctx.font='bold 13px Arial';
    ctx.fillText('♪',120,27);
    for(let i=0;i<3;i++){
      const filled=s3NoteCount>i;
      ctx.fillStyle=filled?'#FFD700':'#333';
      ctx.fillRect(136+i*16,14,13,13);
      ctx.strokeStyle=filled?'#FFA500':'#666'; ctx.lineWidth=1.5;
      ctx.strokeRect(136+i*16,14,13,13);
    }
  }
  // シールドタイマー表示
  if(s3ShieldTimer>0){
    const ssec=Math.ceil(s3ShieldTimer/60);
    const sp=Math.sin(s3GameT*0.3)>0;
    ctx.textAlign='left'; ctx.fillStyle=sp?'#00BFFF':'#ffffff'; ctx.font='bold 12px Arial';
    ctx.fillText(`🛡 バリア 残り${ssec}秒`,120,41);
    ctx.fillStyle='#003355'; ctx.fillRect(120,43,160,4);
    ctx.fillStyle='#00BFFF'; ctx.fillRect(120,43,s3ShieldTimer/300*160,4);
  }
  ctx.fillStyle='#FF69B4'; ctx.textAlign='center'; ctx.font='bold 18px Arial';
  ctx.fillText('♥'.repeat(Math.max(0,lives)),W/2,27);
  ctx.textAlign='right';
  if(!s3BossActive){
    ctx.fillStyle='#ddd'; ctx.font='13px Arial';
    ctx.fillText(`撃破 ${s3KillCount}/15`,W-10,27);
    ctx.fillStyle='#333'; ctx.fillRect(W-168,14,154,12);
    ctx.fillStyle='#FF69B4'; ctx.fillRect(W-168,14,Math.min(154,s3KillCount/15*154),12);
    ctx.strokeStyle='#777'; ctx.lineWidth=1; ctx.strokeRect(W-168,14,154,12);
    ctx.fillStyle='#FF3333'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText('BOSS',W-168+77,23);
  } else if(s3Boss&&s3Boss.on){
    const pulse2=Math.sin(s3GameT*0.15)>0;
    ctx.fillStyle=pulse2?'#FF3333':'#FF9900'; ctx.font='bold 14px Arial'; ctx.textAlign='right';
    ctx.fillText('⚠ BOSS出現 ⚠',W-10,27);
  }
  ctx.restore();
}

function drawTouchControlsS3(){
  if(!isTouchDevice) return;
  ctx.save();
  const drawBtn2=(x,y,r,pressed,label,sz)=>{
    ctx.globalAlpha=pressed?0.72:0.32;
    ctx.fillStyle=pressed?'#fff':'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=pressed?0.9:0.55;
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=pressed?3:2;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=pressed?1:0.75;
    ctx.fillStyle='#222'; ctx.font=`bold ${sz}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x,y); ctx.textBaseline='alphabetic';
  };
  drawBtn2(TB.left.x,TB.left.y,TB.left.r,!!keys['ArrowLeft'],'◀',22);
  drawBtn2(TB.right.x,TB.right.y,TB.right.r,!!keys['ArrowRight'],'▶',22);
  drawBtn2(TB3.up.x,TB3.up.y,TB3.up.r,!!keys['ArrowUp'],'▲',20);
  drawBtn2(TB3.down.x,TB3.down.y,TB3.down.r,!!keys['ArrowDown'],'▼',20);
  drawBtn2(TB.jump.x,TB.jump.y,TB.jump.r,!!keys['Space'],'★',26);
  ctx.restore();
}

function drawStage3Scene(){
  drawStage3BG();
  drawS3Player();
  // バリアエフェクト（プレイヤー周囲）
  if(s3ShieldTimer>0){
    const cx=P.x+P.w/2, cy=P.y+P.h/2;
    const pulse=0.55+Math.sin(s3GameT*0.22)*0.25;
    ctx.save();
    ctx.globalAlpha=pulse;
    const sg=ctx.createRadialGradient(cx,cy,18,cx,cy,42);
    sg.addColorStop(0,'rgba(0,191,255,0.18)');
    sg.addColorStop(0.7,'rgba(0,191,255,0.45)');
    sg.addColorStop(1,'rgba(0,191,255,0)');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.arc(cx,cy,42,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.7+Math.sin(s3GameT*0.18)*0.3;
    ctx.strokeStyle='#00BFFF'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(cx,cy,38+Math.sin(s3GameT*0.14)*4,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.restore();
  }
  s3Enemies3.forEach(e=>drawS3Enemy(e));
  drawS3Boss();
  drawS3Bullets();
  // 音符アイテム描画
  s3Notes.forEach(n=>{
    ctx.save();
    ctx.globalAlpha=0.9+Math.sin(n.t*0.15)*0.1;
    drawNote(n.x,n.y,9,'#FFD700');
    ctx.restore();
  });
  // ハートアイテム描画（3連砲発動中に出現）
  s3Hearts.forEach(h=>{
    const bob=Math.sin(h.t*0.18)*2;
    const glow=0.65+Math.sin(h.t*0.14)*0.35;
    ctx.save();
    ctx.globalAlpha=glow;
    ctx.shadowColor='#FF69B4'; ctx.shadowBlur=14;
    ctx.save();
    ctx.translate(h.x, h.y+bob);
    ctx.scale(1+Math.sin(h.t*0.12)*0.08, 1+Math.sin(h.t*0.12)*0.08);
    // ハート形
    ctx.fillStyle='#FF3399';
    ctx.beginPath();
    ctx.moveTo(0,4);
    ctx.bezierCurveTo(-12,-6,-16,-16,-8,-18);
    ctx.bezierCurveTo(-2,-20,0,-14,0,-14);
    ctx.bezierCurveTo(0,-14,2,-20,8,-18);
    ctx.bezierCurveTo(16,-16,12,-6,0,4);
    ctx.closePath(); ctx.fill();
    // ハイライト
    ctx.fillStyle='rgba(255,200,220,0.55)';
    ctx.beginPath(); ctx.ellipse(-4,-14,4,3,-0.3,0,Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();
  });
  // シールドアイテム描画
  s3ShieldItems.forEach(sh=>{
    ctx.save();
    const glow=0.6+Math.sin(sh.t*0.12)*0.4;
    ctx.globalAlpha=glow;
    ctx.shadowColor='#00BFFF'; ctx.shadowBlur=18;
    // 六角形シールドアイコン
    ctx.fillStyle='#00BFFF';
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2-Math.PI/6;
      if(i===0) ctx.moveTo(sh.x+Math.cos(a)*16,sh.y+Math.sin(a)*16);
      else ctx.lineTo(sh.x+Math.cos(a)*16,sh.y+Math.sin(a)*16);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='bold 14px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🛡',sh.x,sh.y);
    ctx.textBaseline='alphabetic';
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();
  });
  drawFX();
  drawS3HUD();
  drawTouchControlsS3();
}

// ════════════════════════════════════════════
//  STAGE FOREST – 縦型シューティング（森の中）
// ════════════════════════════════════════════
const SF_PLR_SPD=8.4, SF_BSPD=11, SF_BOSS_MAX_HP=20;
let sfTimer=0, sfScrollY=0;
let sfBullets=[], sfEnemies=[], sfBushes=[], sfItems=[];
let sfTrees=[], sfPits=[], sfEBullets=[];
let sfBoss=null, sfBossAppeared=false, sfKillCount=0;
let sfHasTriple=false, sfTripleTimer=0, sfFireCD=0;
let sfESpawnCD=0, sfTSpawnCD=0, sfBSpawnCD=0, sfPSpawnCD=0;
let sfCapture=false, sfCaptureT=0; // 捕獲アニメ

function initStageForest(){
  sfTimer=0; sfScrollY=0;
  sfBullets=[]; sfEnemies=[]; sfBushes=[]; sfItems=[];
  sfTrees=[]; sfPits=[]; sfEBullets=[];
  sfBoss=null; sfBossAppeared=false; sfKillCount=0;
  sfHasTriple=false; sfTripleTimer=0; sfFireCD=0;
  sfCapture=false; sfCaptureT=0;
  sfESpawnCD=80; sfTSpawnCD=70; sfBSpawnCD=110; sfPSpawnCD=320;
  P.x=W/2-15; P.y=400; P.w=30; P.h=30;
  P.vx=0; P.vy=0; P.facing=1; P.invTimer=0; P.walkT=0; P.dancing=false;
  goalReached=false;
  document.getElementById('hint').textContent=
    '← → ↑ ↓で移動 | Spaceで星を発射 | 草むらにアイテムが潜む！ 敵12体倒してパディントンに挑もう！';
}

function sfHitPlayer(){
  if(P.invTimer>0) return;
  sfxHurt(); lives--;
  P.invTimer=140;
  spawnParticles(P.x+P.w/2,P.y+P.h/2,'#FF69B4',12,'circle');
  if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
}

function updateStageForest(){
  if(state!=='play') return;

  // ── 捕獲アニメ中 ─────────────────────────────────
  if(sfCapture){
    sfCaptureT++;
    // フェーズ0(0-70): パディントンがプレイヤーへ近づく
    if(sfCaptureT<=70){
      sfBoss.x+=(P.x+P.w/2-sfBoss.w/2-sfBoss.x)*0.06;
      sfBoss.y+=(P.y-80-sfBoss.y)*0.07;
    }
    // フェーズ1(70-160): プレイヤーがパディントンに引き寄せられ右へ移動
    else if(sfCaptureT<=160){
      sfBoss.x+=(W+60-sfBoss.x)*0.04;
      sfBoss.y=P.y-75;
      P.x+=(sfBoss.x+sfBoss.w/2-P.x-P.w/2)*0.18;
      P.y+=(sfBoss.y+sfBoss.h-10-P.y)*0.15;
    }
    // フェーズ2(160-240): フェードアウト
    // フェーズ3(240): ステージクリア
    if(sfCaptureT>=240) triggerWin();
    updateFX(); return;
  }

  sfTimer++; sfScrollY+=1.6;
  if(sfFireCD>0) sfFireCD--;
  if(sfTripleTimer>0){ sfTripleTimer--; if(sfTripleTimer===0){ sfHasTriple=false; spawnText(P.x+P.w/2,P.y-20,'ビーム終了','#aaa'); } }
  if(P.invTimer>0) P.invTimer--;

  // ── プレイヤー移動（木で止まる） ─────────────────────
  const ml=keys['ArrowLeft']||keys['KeyA'], mr=keys['ArrowRight']||keys['KeyD'];
  const mu=keys['ArrowUp']||keys['KeyW'],   md=keys['ArrowDown']||keys['KeyS'];
  // 木との衝突矩形チェック（幹エリア）
  const _sfHitsTree=(nx,ny)=>sfTrees.some(t=>{
    const tx=t.x+t.w/2-11, ty=t.y+t.h-46, tw=22, th=52;
    return nx<tx+tw&&nx+P.w>tx&&ny<ty+th&&ny+P.h>ty;
  });
  if(mr){ if(!_sfHitsTree(P.x+SF_PLR_SPD,P.y)) P.x+=SF_PLR_SPD; P.facing=1; }
  if(ml){ if(!_sfHitsTree(P.x-SF_PLR_SPD,P.y)) P.x-=SF_PLR_SPD; P.facing=-1; }
  if(mu){ if(!_sfHitsTree(P.x,P.y-SF_PLR_SPD)) P.y-=SF_PLR_SPD; }
  if(md){ if(!_sfHitsTree(P.x,P.y+SF_PLR_SPD)) P.y+=SF_PLR_SPD; }
  P.x=Math.max(12,Math.min(W-P.w-12,P.x));
  P.y=Math.max(260,Math.min(H-P.h-8,P.y));
  if(ml||mr||mu||md) P.walkT+=0.14;
  // 木がスクロールしてきてプレイヤーに被った場合は横に押し出す
  for(const t of sfTrees){
    const tx=t.x+t.w/2-11, ty=t.y+t.h-46, tw=22, th=52;
    if(P.x<tx+tw&&P.x+P.w>tx&&P.y<ty+th&&P.y+P.h>ty){
      const push=(P.x+P.w/2<tx+tw/2)?-4:4;
      P.x=Math.max(12,Math.min(W-P.w-12,P.x+push));
    }
  }

  // ── 射撃 ─────────────────────────────────────────
  if((just['Space']||just['Enter'])&&sfFireCD<=0){
    sfFireCD=12;
    beep(880,0.06,0.09,'sine'); beep(1100,0.04,0.06,'sine',0.04);
    const bx=P.x+P.w/2, by=P.y;
    sfBullets.push({x:bx,y:by,vx:0,vy:-SF_BSPD});
    if(sfHasTriple){
      sfBullets.push({x:bx,y:by,vx:-5,vy:-9.5});
      sfBullets.push({x:bx,y:by,vx: 5,vy:-9.5});
    }
    spawnParticles(bx,by,'#FFD700',2,'star');
  }

  // ── 自弾更新 ─────────────────────────────────────
  for(let i=sfBullets.length-1;i>=0;i--){
    const b=sfBullets[i]; b.x+=b.vx; b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20) sfBullets.splice(i,1);
  }

  // ── 敵弾更新 ─────────────────────────────────────
  for(let i=sfEBullets.length-1;i>=0;i--){
    const b=sfEBullets[i]; b.x+=b.vx; b.y+=b.vy;
    if(b.y>H+20||b.x<-20||b.x>W+20){ sfEBullets.splice(i,1); continue; }
    if(P.invTimer<=0&&b.x>P.x-4&&b.x<P.x+P.w+4&&b.y>P.y&&b.y<P.y+P.h){
      sfEBullets.splice(i,1); sfHitPlayer();
    }
  }

  if(!sfBossAppeared){
    // ── 木を生成 ─────────────────────────────────────
    if(--sfTSpawnCD<=0){
      sfTSpawnCD=55+Math.random()*70|0;
      sfTrees.push({x:25+Math.random()*(W-90)|0, y:-130, w:50+Math.random()*40|0, h:110+Math.random()*50|0});
    }
    sfTrees.forEach(t=>{ t.y+=1.6; });
    for(let i=sfTrees.length-1;i>=0;i--) if(sfTrees[i].y>H+160) sfTrees.splice(i,1);

    // ── 草むらを生成 ──────────────────────────────────
    if(--sfBSpawnCD<=0){
      sfBSpawnCD=100+Math.random()*100|0;
      const hasItem=Math.random()<0.45;
      sfBushes.push({x:30+Math.random()*(W-80)|0, y:-45, w:52, h:30, hp:1,
        itemType:hasItem?(Math.random()<0.5?'heart':'triple'):null, on:true});
    }
    sfBushes.forEach(b=>{ b.y+=1.6; });
    for(let i=sfBushes.length-1;i>=0;i--) if(!sfBushes[i].on||sfBushes[i].y>H+60) sfBushes.splice(i,1);

    // ── 落とし穴を生成 ────────────────────────────────
    if(--sfPSpawnCD<=0){
      sfPSpawnCD=360+Math.random()*200|0;
      sfPits.push({x:60+Math.random()*(W-200)|0, y:-38, w:120+Math.random()*80|0, h:34});
    }
    sfPits.forEach(p=>{ p.y+=1.6; });
    for(let i=sfPits.length-1;i>=0;i--) if(sfPits[i].y>H+60) sfPits.splice(i,1);

    // ── 敵（ハリネズミ）を生成 ────────────────────────
    if(--sfESpawnCD<=0 && sfKillCount<12){
      sfESpawnCD=90+Math.random()*90|0;
      const pat=Math.random()*3|0, elite=sfKillCount>5&&Math.random()<0.3;
      sfEnemies.push({x:35+Math.random()*(W-70)|0, y:-40,
        vx:(Math.random()-0.5)*1.8, vy:1.6+Math.random()*0.9,
        hp:elite?2:1, pat, t:0, on:true, elite,
        fCD:190+Math.random()*180|0, phase:Math.random()*Math.PI*2});
    }
  }

  // ── ボス出現 ─────────────────────────────────────
  if(!sfBossAppeared && sfKillCount>=12 && sfEnemies.every(e=>!e.on)){
    sfBossAppeared=true;
    sfBoss={x:W/2-52,y:-100,w:104,h:88,hp:SF_BOSS_MAX_HP,t:0,vx:2.2,fCD:80};
    spawnText(W/2,H/2-60,'パディントン 再び現れた！','#FF4500');
    beep(150,0.6,0.2,'sawtooth'); beep(120,0.5,0.18,'sawtooth',0.35);
  }

  // ── ボス更新 ─────────────────────────────────────
  if(sfBoss && sfBoss.hp>0){
    const bo=sfBoss; bo.t++;
    if(bo.y<55) bo.y+=2.8;
    bo.x+=bo.vx;
    if(bo.x<20||bo.x>W-bo.w-20) bo.vx*=-1;
    bo.fCD--;
    if(bo.fCD<=0){
      const spd=bo.hp<=5?3.2:bo.hp<=10?2.4:1.8;
      if(bo.hp>10){
        for(let a=-2;a<=2;a++) sfEBullets.push({x:bo.x+bo.w/2,y:bo.y+bo.h,vx:a*1.3,vy:spd});
        bo.fCD=85;
      } else if(bo.hp>5){
        const dx=P.x+P.w/2-(bo.x+bo.w/2), dy=P.y-(bo.y+bo.h);
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        sfEBullets.push({x:bo.x+bo.w/2,y:bo.y+bo.h,vx:dx/d*spd,vy:dy/d*spd});
        sfEBullets.push({x:bo.x+bo.w/2,y:bo.y+bo.h,vx:(dx/d+0.5)*spd,vy:dy/d*spd});
        sfEBullets.push({x:bo.x+bo.w/2,y:bo.y+bo.h,vx:(dx/d-0.5)*spd,vy:dy/d*spd});
        bo.fCD=55;
      } else {
        for(let a=-3;a<=3;a++) sfEBullets.push({x:bo.x+bo.w/2,y:bo.y+bo.h,vx:a*1.6,vy:spd});
        bo.fCD=40;
      }
      beep(180,0.12,0.09,'square');
    }
    // 自弾がボスにヒット
    for(let i=sfBullets.length-1;i>=0;i--){
      const b=sfBullets[i];
      if(b.x>bo.x&&b.x<bo.x+bo.w&&b.y>bo.y&&b.y<bo.y+bo.h){
        sfBullets.splice(i,1); bo.hp--;
        spawnParticles(b.x,b.y,'#FF6600',4,'circle');
        beep(280,0.08,0.07,'sawtooth');
        if(bo.hp<=0){
          spawnParticles(bo.x+bo.w/2,bo.y+bo.h/2,'#FFD700',22,'star');
          spawnText(W/2,H/2-40,'パディントン撃破！ +1000','#FFD700');
          score+=1000;
          beep(400,0.1,0.12,'sine'); beep(500,0.1,0.12,'sine',0.1);
          // 捕獲アニメ開始（すぐにtriggerWin()は呼ばない）
          sfCapture=true; sfCaptureT=0;
          bo.vx=0; // 移動停止
        }
      }
    }
    // ボスとプレイヤー接触
    if(P.invTimer<=0&&P.x<bo.x+bo.w&&P.x+P.w>bo.x&&P.y<bo.y+bo.h&&P.y+P.h>bo.y) sfHitPlayer();
  }

  // ── 敵更新 ───────────────────────────────────────
  for(let i=sfEnemies.length-1;i>=0;i--){
    const e=sfEnemies[i];
    if(!e.on){ sfEnemies.splice(i,1); continue; }
    e.t++;
    e.y+=e.vy;
    if(e.pat===1) e.x+=Math.sin(e.t*0.09+e.phase)*2.8;
    else if(e.pat===2) e.x+=Math.cos(e.t*0.11+e.phase)*2.2;
    else e.x+=e.vx;
    e.x=Math.max(10,Math.min(W-32,e.x));
    // 敵弾（一定体数倒してから発射）
    if(--e.fCD<=0 && sfKillCount>4){
      e.fCD=160+Math.random()*140|0;
      const dx=P.x+P.w/2-e.x, dy=P.y+P.h/2-e.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      sfEBullets.push({x:e.x+16,y:e.y+16,vx:dx/d*2.4,vy:dy/d*2.4});
      beep(240,0.07,0.05,'square');
    }
    if(e.y>H+60){ sfEnemies.splice(i,1); continue; }
    // 自弾ヒット
    let hit=false;
    for(let j=sfBullets.length-1;j>=0;j--){
      const b=sfBullets[j];
      if(b.x>e.x&&b.x<e.x+32&&b.y>e.y&&b.y<e.y+30){
        sfBullets.splice(j,1); e.hp--; hit=true;
        spawnParticles(b.x,b.y,'#FFD700',5,'star'); break;
      }
    }
    if(hit&&e.hp<=0){
      e.on=false; sfKillCount++;
      const pts=e.elite?400:200; score+=pts;
      spawnParticles(e.x+16,e.y+15,'#FF8C00',8,'circle');
      spawnText(e.x+16,e.y,`+${pts}`,'#FFD700');
      beep(440,0.1,0.11,'sine'); beep(550,0.07,0.09,'sine',0.07);
    }
    // プレイヤー接触
    if(P.invTimer<=0&&P.x<e.x+28&&P.x+P.w>e.x+4&&P.y<e.y+26&&P.y+P.h>e.y+4) sfHitPlayer();
  }

  // ── 草むら（弾ヒット＋アイテム出現） ────────────────
  for(let i=sfBushes.length-1;i>=0;i--){
    const b=sfBushes[i]; if(!b.on) continue;
    for(let j=sfBullets.length-1;j>=0;j--){
      const bull=sfBullets[j];
      if(bull.x>b.x&&bull.x<b.x+b.w&&bull.y>b.y&&bull.y<b.y+b.h){
        sfBullets.splice(j,1); b.on=false;
        spawnParticles(b.x+b.w/2,b.y+b.h/2,'#228B22',6,'circle');
        beep(280,0.1,0.07,'triangle');
        if(b.itemType) sfItems.push({x:b.x+b.w/2-10,y:b.y,type:b.itemType,vy:1.4,t:0,on:true});
        break;
      }
    }
  }

  // ── アイテム ─────────────────────────────────────
  for(let i=sfItems.length-1;i>=0;i--){
    const it=sfItems[i]; if(!it.on){ sfItems.splice(i,1); continue; }
    it.y+=it.vy; it.t++;
    if(it.y>H+60){ sfItems.splice(i,1); continue; }
    if(P.x<it.x+22&&P.x+P.w>it.x&&P.y<it.y+22&&P.y+P.h>it.y){
      it.on=false;
      if(it.type==='heart'){
        lives=Math.min(lives+1,9);
        beep(523,0.1,0.12,'sine'); beep(659,0.1,0.1,'sine',0.1); beep(784,0.15,0.15,'sine',0.2);
        spawnParticles(it.x+11,it.y+11,'#FF69B4',10,'circle');
        spawnText(it.x+11,it.y-10,'❤️ ライフ+1！','#FF69B4');
      } else {
        sfHasTriple=true; sfTripleTimer=600;
        beep(660,0.1,0.1,'sine'); beep(880,0.12,0.12,'sine',0.08); beep(1100,0.15,0.18,'sine',0.16);
        spawnParticles(it.x+11,it.y+11,'#00BFFF',12,'star');
        spawnText(it.x+11,it.y-10,'✨ ３方向ビーム！','#00BFFF');
      }
    }
  }

  // ── 落とし穴 ─────────────────────────────────────
  for(const pit of sfPits){
    if(P.invTimer<=0&&P.x+4<pit.x+pit.w&&P.x+P.w-4>pit.x&&P.y+P.h-4>pit.y&&P.y+8<pit.y+pit.h){
      sfHitPlayer();
      P.y=Math.min(P.y,pit.y-P.h-2); // ピットを越えないように上に弾く
    }
  }

  updateFX();
}

// ── 森ステージ 描画 ─────────────────────────────────
function drawStageForestScene(){
  _sfDrawBG();

  // 落とし穴
  ctx.save();
  sfPits.forEach(p=>{
    ctx.fillStyle='#080808';
    ctx.fillRect(p.x,p.y,p.w,p.h);
    for(let i=0;i<p.w;i+=14){
      ctx.fillStyle=(Math.floor(i/14)%2===0)?'rgba(139,0,0,0.5)':'transparent';
      ctx.fillRect(p.x+i,p.y,14,p.h);
    }
    ctx.strokeStyle='#CC0000'; ctx.lineWidth=1.5;
    ctx.strokeRect(p.x,p.y,p.w,p.h);
    ctx.font='10px Arial'; ctx.fillStyle='#FF4444'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚠', p.x+p.w/2, p.y+p.h/2);
  });
  ctx.restore();

  // 木（背景より手前）
  sfTrees.forEach(tr=>_sfDrawTree(tr));

  // 草むら
  sfBushes.forEach(b=>{
    if(!b.on) return;
    ctx.save();
    // 草の塊を複数の円で表現
    [0,0.25,0.5,0.75,1].forEach((t,i)=>{
      const bx=b.x+t*b.w, by=b.y+b.h-10+Math.sin(i*2.1)*5;
      const r=11+Math.sin(i*1.7)*4;
      ctx.fillStyle=i%2===0?'#2E7D32':'#388E3C';
      ctx.beginPath(); ctx.arc(bx,by,r,Math.PI,0); ctx.fill();
    });
    ctx.fillStyle='#1B5E20'; ctx.fillRect(b.x,b.y+b.h-8,b.w,8);
    if(b.itemType){
      const glow=0.5+Math.sin(sfTimer*0.15)*0.4;
      ctx.globalAlpha=glow;
      ctx.fillStyle=b.itemType==='heart'?'#FF69B4':'#00BFFF';
      ctx.beginPath(); ctx.arc(b.x+b.w/2,b.y+b.h/2-5,5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    ctx.restore();
  });

  // アイテム
  sfItems.forEach(it=>{
    if(!it.on) return;
    ctx.save();
    ctx.globalAlpha=0.8+Math.sin(it.t*0.2)*0.2;
    ctx.font='22px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(it.type==='heart'?'❤️':'✨', it.x+11, it.y+11);
    ctx.restore();
  });

  // 敵（カラス）※ハリネズミは友達なので別の敵に変更
  sfEnemies.forEach(e=>{ if(e.on) _sfDrawCrow(e.x+16,e.y+10,e.elite); });

  // 敵弾
  ctx.fillStyle='#FF6347';
  sfEBullets.forEach(b=>{
    ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();
  });

  // ボス
  if(sfBoss && sfBoss.hp>0) _sfDrawBoss();

  // プレイヤー
  _sfDrawPlayer();

  // 自弾（星型）
  sfBullets.forEach(b=>{
    ctx.save();
    ctx.fillStyle='#FFD700'; ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const a=i/10*Math.PI*2-Math.PI/2, r=i%2===0?7:3;
      if(i===0) ctx.moveTo(b.x+Math.cos(a)*r,b.y+Math.sin(a)*r);
      else ctx.lineTo(b.x+Math.cos(a)*r,b.y+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
    ctx.restore();
  });

  drawFX();
  _sfDrawHUD();
  drawTouchControlsS3(); // 射撃ボタンを流用

  // 捕獲アニメオーバーレイ
  if(sfCapture) _sfDrawCapture();
}

function _sfDrawBG(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#071A07'); grad.addColorStop(0.5,'#0E3810'); grad.addColorStop(1,'#1B5E20');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // 遠景の木（シルエット、複数段でスクロール）
  const drawFarTrees=(spd,alpha,col)=>{
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col;
    for(let i=0;i<10;i++){
      const ox=(i*110+sfScrollY*spd)%W;
      const ht=80+Math.sin(i*1.9)*30;
      // 木シルエット（三角2段）
      ctx.beginPath(); ctx.moveTo(ox,H-ht); ctx.lineTo(ox-22,H-ht+50); ctx.lineTo(ox+22,H-ht+50); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(ox,H-ht-30); ctx.lineTo(ox-16,H-ht+10); ctx.lineTo(ox+16,H-ht+10); ctx.closePath(); ctx.fill();
      ctx.fillRect(ox-4,H-ht+50,8,ht-50);
    }
    ctx.restore();
  };
  drawFarTrees(0.18,0.25,'#0A2E0A');
  drawFarTrees(0.28,0.35,'#0D3D0D');
  drawFarTrees(0.45,0.50,'#1A5C1A');

  // 地面のストライプ（スクロール）
  const goff=sfScrollY%40;
  ctx.fillStyle='#2E5C1A'; ctx.fillRect(0,H-70,W,70);
  ctx.strokeStyle='#3A7A20'; ctx.lineWidth=1.5;
  for(let y=H-70;y<H;y+=20){
    const yo=y+goff%20;
    ctx.beginPath(); ctx.moveTo(0,yo); ctx.lineTo(W,yo); ctx.stroke();
  }
  // パスライン
  ctx.strokeStyle='rgba(180,160,80,0.18)'; ctx.lineWidth=3;
  ctx.setLineDash([25,20]); ctx.beginPath();
  ctx.moveTo(W/2,H-70); ctx.lineTo(W/2,H);
  ctx.stroke(); ctx.setLineDash([]);
}

function _sfDrawTree(tr){
  ctx.save();
  const cx=tr.x+tr.w/2;
  // 幹
  ctx.fillStyle='#4A2C0E';
  ctx.fillRect(cx-7,tr.y+tr.h-38,14,42);
  // 樹冠（3層）
  [[tr.h-52,tr.w*0.52],[tr.h-78,tr.w*0.40],[tr.h-100,tr.w*0.28]].forEach(([oy,r])=>{
    ctx.fillStyle='#1A5C1A';
    ctx.beginPath(); ctx.arc(cx,tr.y+oy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2E7D32';
    ctx.beginPath(); ctx.arc(cx-r*0.22,tr.y+oy-r*0.18,r*0.55,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function _sfDrawHedgehog(cx,cy,elite=false){
  ctx.save();
  // 体
  ctx.fillStyle=elite?'#4A2A10':'#6B3F1F';
  ctx.beginPath(); ctx.ellipse(cx,cy,15,11,0.15,0,Math.PI*2); ctx.fill();
  // トゲ
  ctx.strokeStyle=elite?'#FF6600':'#3D2010'; ctx.lineWidth=1.8;
  for(let i=0;i<9;i++){
    const a=i/9*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*14,cy+Math.sin(a)*10);
    ctx.lineTo(cx+Math.cos(a)*21,cy+Math.sin(a)*16);
    ctx.stroke();
  }
  // 顔
  ctx.fillStyle='#F5CBA7';
  ctx.beginPath(); ctx.ellipse(cx+9,cy-2,7,6,0.25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(cx+13,cy-3,2.2,0,Math.PI*2); ctx.fill();
  // エリートのオーラ
  if(elite){
    ctx.globalAlpha=0.35+Math.sin(sfTimer*0.2)*0.2;
    ctx.strokeStyle='#FF4500'; ctx.lineWidth=2;
    ctx.shadowColor='#FF4500'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.ellipse(cx,cy,19,14,0.15,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.restore();
}

function _sfDrawBoss(){
  const bo=sfBoss;
  ctx.save();
  ctx.translate(bo.x+bo.w/2, bo.y+bo.h/2);
  const pulse=1+Math.sin(bo.t*0.07)*0.03;
  ctx.scale(pulse*0.85,pulse*0.85); // 通常の0.85倍サイズ（森版）

  // ダッフルコート（青）
  ctx.fillStyle='#1B4F9A';
  ctx.beginPath(); ctx.ellipse(0,22,38,46,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#153D7A';
  ctx.beginPath(); ctx.moveTo(-5,-4); ctx.lineTo(-4,44); ctx.lineTo(4,44); ctx.lineTo(5,-4); ctx.closePath(); ctx.fill();
  [[0,4],[0,18],[0,32]].forEach(([bx,by])=>{
    ctx.fillStyle='#6B3310';
    ctx.beginPath(); ctx.roundRect(bx-7,by-3,14,5,3); ctx.fill();
  });
  // 毛皮・体
  ctx.fillStyle='#A0723A';
  ctx.beginPath(); ctx.ellipse(0,-1,19,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8B5E28';
  ctx.beginPath(); ctx.ellipse(0,22,32,40,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.fillStyle='#A0723A';
  ctx.beginPath(); ctx.arc(0,-28,27,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#B8864A';
  ctx.beginPath(); ctx.arc(-5,-33,15,0,Math.PI*2); ctx.fill();
  // 耳
  [[-22,-50],[22,-50]].forEach(([ex,ey])=>{
    ctx.fillStyle='#A0723A'; ctx.beginPath(); ctx.arc(ex,ey,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#C8966A'; ctx.beginPath(); ctx.arc(ex,ey,6,0,Math.PI*2); ctx.fill();
  });
  // 顔
  ctx.fillStyle='#D4A870';
  ctx.beginPath(); ctx.ellipse(0,-26,18,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a1500';
  ctx.beginPath(); ctx.arc(-9,-31,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-31,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-7,-33,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(11,-33,2.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2a1500'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.moveTo(-14,-40); ctx.lineTo(-4,-37); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14,-40); ctx.lineTo(4,-37); ctx.stroke();
  ctx.fillStyle='#1a0a00';
  ctx.beginPath(); ctx.ellipse(0,-20,7,5,0,0,Math.PI*2); ctx.fill();
  // ハット
  ctx.fillStyle='#CC1111';
  ctx.beginPath(); ctx.ellipse(0,-54,33,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillRect(-18,-72,36,20);
  ctx.fillStyle='#AA0E0E'; ctx.fillRect(-16,-70,32,18);

  ctx.restore();

  // HPバー
  const bx=bo.x, by2=bo.y-18;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx,by2,bo.w,12);
  const ratio=bo.hp/SF_BOSS_MAX_HP;
  ctx.fillStyle=ratio>0.5?'#44FF44':ratio>0.25?'#FFAA00':'#FF2200';
  ctx.fillRect(bx,by2,bo.w*ratio,12);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx,by2,bo.w,12);
  ctx.font='bold 10px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`PADDINGTON HP ${bo.hp}/${SF_BOSS_MAX_HP}`,bx+bo.w/2,by2+6);

  // フェーズ2以降のオーラ
  if(bo.hp<=10){
    ctx.save();
    ctx.globalAlpha=0.15+Math.sin(sfTimer*0.18)*0.1;
    ctx.fillStyle=bo.hp<=5?'#FF0000':'#FF6600';
    ctx.beginPath(); ctx.arc(bo.x+bo.w/2,bo.y+bo.h/2,58,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── 捕獲アニメ描画 ───────────────────────────────────────────
function _sfDrawCapture(){
  const t=sfCaptureT;
  const bo=sfBoss;
  if(!bo) return;

  // フェーズ0 (0-70): ！？吹き出し
  if(t<=70){
    // 吹き出し背景
    const bx=bo.x+bo.w/2, by=bo.y-30;
    ctx.save();
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.strokeStyle='#333'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect(bx-28,by-28,56,30,8);
    ctx.fill(); ctx.stroke();
    // 吹き出しのしっぽ
    ctx.beginPath();
    ctx.moveTo(bx-8,by+2); ctx.lineTo(bx,by+14); ctx.lineTo(bx+8,by+2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // ！？テキスト
    ctx.font='bold 20px Arial'; ctx.fillStyle='#C00';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('！？',bx,by-13);
    ctx.restore();
  }

  // フェーズ1 (70-160): 腕ラインでプレイヤーを引き寄せ＋洞窟出現
  if(t>70 && t<=160){
    const prog=(t-70)/90; // 0→1

    // 腕ライン（パディントン → プレイヤー）
    const armX1=bo.x+bo.w/2+20;
    const armY1=bo.y+bo.h*0.5;
    const armX2=P.x+P.w/2;
    const armY2=P.y+P.h/2;
    ctx.save();
    ctx.strokeStyle='#A0723A'; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(armX1,armY1); ctx.lineTo(armX2,armY2); ctx.stroke();
    // 手（丸）
    ctx.fillStyle='#C8966A';
    ctx.beginPath(); ctx.arc(armX2,armY2,10,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#8B5E28'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();

    // 洞窟入り口（右端に出現、progに合わせてフェードイン）
    const caveAlpha=Math.min(1,prog*2);
    const caveX=W-60;
    const caveY=H/2-30;
    ctx.save();
    ctx.globalAlpha=caveAlpha;
    // 洞窟外壁
    ctx.fillStyle='#3A2A1A';
    ctx.beginPath(); ctx.ellipse(caveX,caveY,55,75,0,0,Math.PI*2); ctx.fill();
    // 洞窟の穴（暗い楕円）
    const grad=ctx.createRadialGradient(caveX,caveY,10,caveX,caveY,45);
    grad.addColorStop(0,'#050302'); grad.addColorStop(0.6,'#0E0804'); grad.addColorStop(1,'#2A1A0A');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.ellipse(caveX,caveY,42,60,0,0,Math.PI*2); ctx.fill();
    // 「洞窟」テキスト
    ctx.font='bold 13px Arial'; ctx.fillStyle='#DDD';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('洞窟',caveX,caveY+68);
    ctx.restore();
  }

  // フェーズ2 (160-240): フェードアウト＋テキスト
  if(t>160){
    const fadeT=(t-160)/80;
    const alpha=Math.min(1,fadeT*1.2);

    // 洞窟も継続表示
    const caveX=W-60; const caveY=H/2-30;
    ctx.save();
    ctx.fillStyle='#3A2A1A';
    ctx.beginPath(); ctx.ellipse(caveX,caveY,55,75,0,0,Math.PI*2); ctx.fill();
    const grad2=ctx.createRadialGradient(caveX,caveY,10,caveX,caveY,45);
    grad2.addColorStop(0,'#050302'); grad2.addColorStop(0.6,'#0E0804'); grad2.addColorStop(1,'#2A1A0A');
    ctx.fillStyle=grad2;
    ctx.beginPath(); ctx.ellipse(caveX,caveY,42,60,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 暗転
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    // テキスト（暗転後に浮かび上がる）
    if(alpha>0.5){
      const textAlpha=Math.min(1,(alpha-0.5)*3);
      ctx.save();
      ctx.globalAlpha=textAlpha;
      ctx.font='bold 28px Arial';
      ctx.fillStyle='#FF4444';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('パディントンに連れ去られた！',W/2,H/2-20);
      ctx.font='22px Arial';
      ctx.fillStyle='#AAA';
      ctx.fillText('洞窟の中へ...',W/2,H/2+20);
      ctx.restore();
    }
  }
}

function _sfDrawPlayer(){
  const blink=P.invTimer>0&&Math.floor(P.invTimer/5)%2===0;
  if(blink) return;
  ctx.save();
  const cx=P.x+P.w/2;
  const bob=Math.sin(P.walkT*2.2)*2;
  const hcy=P.y+P.h+18; // ハリネズミ基準Y（プレイヤー矩形の下）
  const faceDir=P.facing;
  const sc=1.05; // 2.1×0.5 = 1.05倍スケール

  // ── 乗り物ハリネズミ（シューティング前半と同じデザイン、2.1倍） ──
  ctx.save();
  ctx.translate(cx, hcy+bob);
  ctx.scale(faceDir*sc, sc); // 左右反転もここで処理

  // メインボディ
  ctx.fillStyle='#9B6B2C';
  ctx.beginPath(); ctx.ellipse(0,8,24,15,0,0,Math.PI*2); ctx.fill();
  // お腹（クリーム白）
  ctx.fillStyle='#F0EDE0';
  ctx.beginPath(); ctx.ellipse(4,12,17,9,0,0,Math.PI*2); ctx.fill();

  // 後ろ足
  ctx.fillStyle='#9B6B2C';
  ctx.beginPath(); ctx.ellipse(-14,20,7,5,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-6,22,6,4,0.2,0,Math.PI*2); ctx.fill();
  // 前足
  ctx.beginPath(); ctx.ellipse(18,20,6,4,-0.2,0,Math.PI*2); ctx.fill();

  // 頭（前方・クリーム色）
  ctx.fillStyle='#F0EDE0';
  ctx.beginPath(); ctx.arc(22,3,14,0,Math.PI*2); ctx.fill();
  // 頭ハイライト
  ctx.fillStyle='#F8F5EC';
  ctx.beginPath(); ctx.arc(18,-1,9,0,Math.PI*2); ctx.fill();

  // 鼻先
  ctx.fillStyle='#C8A878';
  ctx.beginPath(); ctx.ellipse(32,7,8,5,0.15,0,Math.PI*2); ctx.fill();
  // 鼻（黒・ツヤ）
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(38,5,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(37,4,1.3,0,Math.PI*2); ctx.fill();

  // 目（キラキラ）
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(22,-3,2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(23,-4,1.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(140,210,255,0.9)';
  ctx.beginPath(); ctx.arc(23,-4,0.55,0,Math.PI*2); ctx.fill();

  // ほっぺ（チーク）
  ctx.fillStyle='rgba(255,130,90,0.38)';
  ctx.beginPath(); ctx.arc(30,4,5,0,Math.PI*2); ctx.fill();

  // にっこり口
  ctx.strokeStyle='#8B6040'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.arc(34,10,4,0.25,Math.PI-0.25); ctx.stroke();

  // 耳（丸耳）
  ctx.fillStyle='#3D1800';
  ctx.beginPath(); ctx.ellipse(14,-16,7,9,-0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#6B3010';
  ctx.beginPath(); ctx.ellipse(14,-16,4.5,6.5,-0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,160,130,0.5)';
  ctx.beginPath(); ctx.ellipse(14,-16,2.5,4,-0.2,0,Math.PI*2); ctx.fill();

  // トゲ（焦茶＋白の二層・ふさふさ）
  const spines=[
    {x:-20,h:22,a:-0.42},{x:-14,h:26,a:-0.26},{x:-7,h:29,a:-0.12},
    {x:0,h:30,a:0.0},{x:7,h:28,a:0.13},{x:14,h:25,a:0.27},{x:20,h:20,a:0.40}
  ];
  spines.forEach(({x,h,a},i)=>{
    ctx.save(); ctx.translate(x,-8);
    ctx.rotate(a+Math.sin(sfTimer*0.09+i*0.9)*0.07);
    ctx.fillStyle='#3D1800';
    ctx.beginPath(); ctx.moveTo(-4.5,0); ctx.quadraticCurveTo(-2,-h*0.6,0,-h); ctx.quadraticCurveTo(2,-h*0.6,4.5,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#2A1000';
    ctx.beginPath(); ctx.moveTo(-1.5,-h*0.55); ctx.lineTo(0,-h); ctx.lineTo(1.5,-h*0.55); ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  spines.forEach(({x,h,a},i)=>{
    ctx.save(); ctx.translate(x+1.5,-8);
    ctx.rotate(a+Math.sin(sfTimer*0.09+i*0.9+0.5)*0.07-0.08);
    ctx.fillStyle='#F2EFE5';
    ctx.beginPath(); ctx.moveTo(-3.5,0); ctx.quadraticCurveTo(-1.5,-h*0.55,0,-h*0.92); ctx.quadraticCurveTo(1.5,-h*0.55,3.5,0); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  ctx.restore(); // scaleを戻す

  // ── バニーライダー（ハリネズミのトゲの上に着座） ──────
  // 射撃ステージと同比率: 基準点から -34*sc 上
  const riderY = hcy + bob - 34*sc;
  ctx.save();
  ctx.translate(cx, riderY);
  ctx.scale(0.5, 0.5); // プレイヤーキャラも半分サイズ
  const fn=charType==='pink'?drawPink:drawWhite;
  fn(0, 0, faceDir, P.walkT, false, false, 0);
  ctx.restore();

  // ３方向ビームのオーラ
  if(sfHasTriple){
    ctx.globalAlpha=0.45+Math.sin(sfTimer*0.22)*0.35;
    ctx.strokeStyle='#00BFFF'; ctx.lineWidth=2;
    ctx.shadowColor='#00BFFF'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.ellipse(cx,P.y+P.h/2,38,30,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.restore();
}

// 敵：カラス（ハリネズミは友達なので別の敵に変更）
function _sfDrawCrow(cx,cy,elite=false){
  ctx.save();
  const flap=Math.sin(sfTimer*0.25)*0.3;
  // 体
  ctx.fillStyle=elite?'#1a1050':'#111827';
  ctx.beginPath(); ctx.ellipse(cx,cy,14,9,-0.15,0,Math.PI*2); ctx.fill();
  // 翼（羽ばたきアニメ）
  ctx.fillStyle=elite?'#2a1a70':'#1a2540';
  ctx.save(); ctx.translate(cx,cy);
  ctx.rotate(flap);
  ctx.beginPath(); ctx.moveTo(-13,0); ctx.lineTo(-28,-12); ctx.lineTo(-22,4); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.translate(cx,cy);
  ctx.rotate(-flap);
  ctx.beginPath(); ctx.moveTo(13,0); ctx.lineTo(28,-12); ctx.lineTo(22,4); ctx.closePath(); ctx.fill();
  ctx.restore();
  // 頭
  ctx.fillStyle=elite?'#1a1050':'#111827';
  ctx.beginPath(); ctx.arc(cx+11,cy-7,8,0,Math.PI*2); ctx.fill();
  // くちばし
  ctx.fillStyle='#FFAA00';
  ctx.beginPath(); ctx.moveTo(cx+18,cy-7); ctx.lineTo(cx+26,cy-5); ctx.lineTo(cx+18,cy-4); ctx.closePath(); ctx.fill();
  // 目
  ctx.fillStyle=elite?'#FF00FF':'#FF3300';
  ctx.beginPath(); ctx.arc(cx+13,cy-9,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx+14,cy-10,0.9,0,Math.PI*2); ctx.fill();
  // エリートのオーラ
  if(elite){
    ctx.globalAlpha=0.3+Math.sin(sfTimer*0.18)*0.2;
    ctx.strokeStyle='#AA00FF'; ctx.lineWidth=2;
    ctx.shadowColor='#AA00FF'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.ellipse(cx,cy,18,12,-0.15,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.restore();
}

  let ls=''; for(let i=0;i<Math.min(lives,9);i++) ls+='❤️';

  ctx.textAlign='right'; ctx.fillText(`SCORE: ${score}`,W-10,10);

    ctx.shadowBlur=0;
  }

}
