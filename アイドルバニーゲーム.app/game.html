//  STAGE 4 – BOMBERMAN MAZE
// ════════════════════════════════════════════
function initStage4(){
  s4Grid=[]; s4Bombs=[]; s4Explosions=[];
  s4Enemies4=[]; s4GameT4=0;
  s4ExitOpen=false; s4WinCD4=-1; s4BombCD=0;
  s4BombRange=S4_BRANGE; s4PowerItems=[]; s4PowerTimer=0;
  s4SpeedUpDropped=false; s4LifeUpDropped=false; s4TimeUpDropped=false; s4SpeedActive=false;
  s4DropItems=[];
  platforms=[]; enemies=[]; items=[]; bgTrees=[];
  particles=[]; floatTxts=[];

  // グリッド生成
  for(let r=0;r<S4_ROWS;r++){
    s4Grid.push([]);
    for(let c=0;c<S4_COLS;c++){
      if(r===0||r===S4_ROWS-1||c===0||c===S4_COLS-1) s4Grid[r].push(1); // 外壁
      else if(r%2===0&&c%2===0) s4Grid[r].push(1); // ピラー（壊せない）
      else s4Grid[r].push(0); // 空きスペース
    }
  }
  // ソフトブロックをランダム配置（プレイヤー出発周辺と出口周辺は空ける）
  const safe=new Set(['1,1','2,1','1,2','1,3','3,1']);
  const exitR=S4_ROWS-2, exitC=S4_COLS-2;
  safe.add(`${exitR},${exitC}`); safe.add(`${exitR-1},${exitC}`); safe.add(`${exitR},${exitC-1}`);
  for(let r=1;r<S4_ROWS-1;r++)
    for(let c=1;c<S4_COLS-1;c++)
      if(s4Grid[r][c]===0&&!safe.has(`${r},${c}`)&&Math.random()<0.20) // 木箱1/3に削減
        s4Grid[r][c]=2;
  s4Grid[exitR][exitC]=3; // 出口マーク（最初は隠す＝通常床に見せる）

  // 敵を12体配置
  const eStarts=[
    [1,S4_COLS-2],[S4_ROWS-2,1],[3,S4_COLS-4],[S4_ROWS-4,3],
    [1,7],[1,11],[5,S4_COLS-2],[S4_ROWS-2,9],
    [S4_ROWS-2,13],[5,1],[3,5],[7,9]
  ];
  const eCols=['#FF6B6B','#6BCB77','#4D96FF','#FFD166','#FF9F43','#EE5A24','#A29BFE','#FD79A8','#00B894','#E17055','#74B9FF','#FFEAA7'];
  eStarts.forEach(([r,c],i)=>{
    if(s4Grid[r]&&s4Grid[r][c]===2) s4Grid[r][c]=0;
    s4Enemies4.push({
      x:S4_OX+c*S4_TILE+4, y:S4_OY+r*S4_TILE+4,
      w:32,h:32, t:0, dir:i%4,
      moveCD:30+Math.random()*30, on:true, color:eCols[i%eCols.length],
      isPaddington:false
    });
  });

  // パディントン敵（速さ2倍・HP2）を2体追加
  [[5,7],[7,11]].forEach(([r,c],i)=>{
    if(s4Grid[r]&&s4Grid[r][c]===2) s4Grid[r][c]=0;
    s4Enemies4.push({
      x:S4_OX+c*S4_TILE+4, y:S4_OY+r*S4_TILE+4,
      w:34,h:34, t:0, dir:(i+2)%4,
      moveCD:20+Math.random()*20, on:true, color:'#8B5E2C',
      isPaddington:true, hp:2
    });
  });

  // 爆弾パワーアップアイテムを3か所に配置
  [[3,7],[7,13],[5,5]].forEach(([r,c])=>{
    if(s4Grid[r]&&s4Grid[r][c]===2) s4Grid[r][c]=0;
    s4PowerItems.push({r,c,x:S4_OX+c*S4_TILE+S4_TILE/2,y:S4_OY+r*S4_TILE+S4_TILE/2,t:0,on:true});
  });

  // プレイヤー配置（グリッド(1,1)）
  P.w=30; P.h=30;
  P.x=S4_OX+S4_TILE+(S4_TILE-P.w)/2;
  P.y=S4_OY+S4_TILE+(S4_TILE-P.h)/2;
  P.vx=0; P.vy=0; P.facing=1; P.invTimer=0; P.walkT=0;

  document.getElementById('hint').textContent=
    '← → ↑ ↓ / WASD で移動 | Space で爆弾設置 | 敵を全滅させて出口へ！';
}

// isPlayer=true のときは爆弾をすり抜け可
function s4IsSolid(px,py,pw,ph,isPlayer=false){
  const m=3;
  const pts=[[px+m,py+m],[px+pw-m,py+m],[px+m,py+ph-m],[px+pw-m,py+ph-m]];
  for(const [x,y] of pts){
    const c=Math.floor((x-S4_OX)/S4_TILE);
    const r=Math.floor((y-S4_OY)/S4_TILE);
    if(r<0||r>=S4_ROWS||c<0||c>=S4_COLS) return true;
    const cell=s4Grid[r][c];
    if(cell===1||cell===2) return true;
    // 爆弾は敵にのみ当たり判定あり（プレイヤーはすり抜け）
    if(!isPlayer){
      for(const b of s4Bombs){
        if(b.r===r&&b.c===c) return true;
      }
    }
  }
  return false;
}

function s4HitPlayer4(){
  if(P.invTimer>0) return;
  sfxHurt(); lives--;
  P.invTimer=130;
  spawnParticles(P.x+P.w/2,P.y+P.h/2,'#FF69B4',12,'circle');
  if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
}

function s4Explode(br,bc,range){
  const cells=[];
  // 中心
  cells.push({r:br,c:bc});
  // 4方向に伸ばす
  [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr,dc])=>{
    for(let i=1;i<=range;i++){
      const nr=br+dr*i, nc=bc+dc*i;
      if(nr<0||nr>=S4_ROWS||nc<0||nc>=S4_COLS) break;
      if(s4Grid[nr][nc]===1) break; // 硬い壁でストップ
      cells.push({r:nr,c:nc});
      if(s4Grid[nr][nc]===2){
        s4Grid[nr][nc]=0;
        // ランダムアイテムドロップ（各種1回まで、40%の確率）
        const _avail=[];
        if(!s4SpeedUpDropped) _avail.push('speed');
        if(!s4LifeUpDropped)  _avail.push('life');
        if(!s4TimeUpDropped)  _avail.push('time');
        if(_avail.length>0 && Math.random()<0.40){
          const _type=_avail[Math.floor(Math.random()*_avail.length)];
          if(_type==='speed') s4SpeedUpDropped=true;
          else if(_type==='life') s4LifeUpDropped=true;
          else s4TimeUpDropped=true;
          s4DropItems.push({x:S4_OX+nc*S4_TILE+S4_TILE/2, y:S4_OY+nr*S4_TILE+S4_TILE/2, type:_type, t:0, on:true});
        }
        break;
      } // ソフトブロック破壊
    }
  });
  s4Explosions.push({cells,timer:45});
  beep(100,0.5,0.18,'sawtooth');
  beep(180,0.3,0.14,'sawtooth',0.08);

  // 爆発セル内の敵・プレイヤーにダメージ
  cells.forEach(({r,c})=>{
    s4Enemies4.forEach(e=>{
      if(!e.on) return;
      const er=Math.floor((e.y+e.h/2-S4_OY)/S4_TILE);
      const ec=Math.floor((e.x+e.w/2-S4_OX)/S4_TILE);
      if(er===r&&ec===c){
        if(e.isPaddington){
          e.hp=(e.hp||2)-1;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,'#FF6600',6,'circle');
          if(e.hp<=0){
            e.on=false;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,'#FFD700',14,'star');
            spawnText(e.x+e.w/2,e.y-12,'パディントン撃破！+500','#FF6600');
            score+=500; sfxStomp();
          } else {
            spawnText(e.x+e.w/2,e.y-12,'もう1発！','#FF6600');
          }
        } else {
          e.on=false;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,'#FFD700',10,'star');
          spawnText(e.x+e.w/2,e.y-12,'+200','#FFD700');
          score+=200; sfxStomp();
        }
      }
    });
    const pr=Math.floor((P.y+P.h/2-S4_OY)/S4_TILE);
    const pc2=Math.floor((P.x+P.w/2-S4_OX)/S4_TILE);
    if(r===pr&&c===pc2) s4HitPlayer4();
  });

  // 全敵撃破で出口オープン
  if(!s4ExitOpen && s4Enemies4.filter(e=>e.on).length===0){
    s4ExitOpen=true;
    spawnText(W/2,H/2-50,'⭐ 出口が開いた！ ⭐','#00FF88');
    beep(523,0.2,0.1,'sine'); beep(659,0.2,0.12,'sine',0.1); beep(784,0.25,0.18,'sine',0.22);
  }
}

function updateStage4(){
  s4GameT4++;
  if(P.invTimer>0) P.invTimer--;
  if(s4BombCD>0) s4BombCD--;
  P.walkT+=0.08;

  // プレイヤー移動（4方向トップダウン）
  const ml=keys['ArrowLeft']||keys['KeyA'];
  const mr=keys['ArrowRight']||keys['KeyD'];
  const mu=keys['ArrowUp']||keys['KeyW'];
  const md=keys['ArrowDown']||keys['KeyS'];
  const _s4spd = s4SpeedActive ? S4_SPD4*2 : S4_SPD4;
  let dvx=mr?_s4spd:ml?-_s4spd:0;
  let dvy=md?_s4spd:mu?-_s4spd:0;
  if(dvx&&dvy){ dvx*=0.707; dvy*=0.707; }
  if(mr||ml) P.facing=mr?1:-1;

  if(!s4IsSolid(P.x+dvx,P.y,P.w,P.h,true)) P.x+=dvx;
  if(!s4IsSolid(P.x,P.y+dvy,P.w,P.h,true)) P.y+=dvy;

  // 爆弾設置（Space）
  if(just['Space']&&s4BombCD<=0&&s4Bombs.length<2){
    const bc=Math.floor((P.x+P.w/2-S4_OX)/S4_TILE);
    const br=Math.floor((P.y+P.h/2-S4_OY)/S4_TILE);
    if(!s4Bombs.some(b=>b.r===br&&b.c===bc)){
      s4Bombs.push({r:br,c:bc,timer:S4_BFUSE});
      beep(220,0.07,0.09,'sine');
      s4BombCD=12;
    }
  }

  // 爆弾タイマー
  for(let i=s4Bombs.length-1;i>=0;i--){
    s4Bombs[i].timer--;
    if(s4Bombs[i].timer<=0){ s4Explode(s4Bombs[i].r,s4Bombs[i].c,s4BombRange); s4Bombs.splice(i,1); }
  }

  // 爆発の継続ダメージ
  if(P.invTimer<=0){
    const pr=Math.floor((P.y+P.h/2-S4_OY)/S4_TILE);
    const pc2=Math.floor((P.x+P.w/2-S4_OX)/S4_TILE);
    for(const ex of s4Explosions){
      if(ex.cells.some(cell=>cell.r===pr&&cell.c===pc2)){ s4HitPlayer4(); break; }
    }
  }

  // 爆発タイマー
  for(let i=s4Explosions.length-1;i>=0;i--){
    s4Explosions[i].timer--;
    if(s4Explosions[i].timer<=0) s4Explosions.splice(i,1);
  }

  // パワーアップタイマー
  if(s4PowerTimer>0){ s4PowerTimer--; if(s4PowerTimer===0){ s4BombRange=S4_BRANGE; spawnText(P.x+P.w/2,P.y-20,'爆弾通常に戻った','#aaa'); } }

  // パワーアップアイテム更新
  for(let i=s4PowerItems.length-1;i>=0;i--){
    const pw=s4PowerItems[i]; pw.t++;
    if(!pw.on) continue;
    if(P.x<pw.x+14&&P.x+P.w>pw.x-14&&P.y<pw.y+14&&P.y+P.h>pw.y-14){
      pw.on=false;
      s4BombRange=S4_BRANGE*2;
      s4PowerTimer=420; // 7秒
      beep(440,0.1,0.08,'sine'); beep(660,0.12,0.1,'sine',0.08); beep(880,0.15,0.15,'sine',0.16);
      spawnParticles(pw.x,pw.y,'#FF4500',14,'star');
      spawnText(pw.x,pw.y-20,'💥 爆弾パワーUP！','#FF4500');
    }
  }

  // スピードUP / ライフUP アイテム取得判定
  for(let i=s4DropItems.length-1;i>=0;i--){
    const it=s4DropItems[i]; it.t++;
    if(!it.on) continue;
    if(P.x<it.x+14&&P.x+P.w>it.x-14&&P.y<it.y+14&&P.y+P.h>it.y-14){
      it.on=false;
      if(it.type==='speed'){
        s4SpeedActive=true;
        beep(660,0.1,0.1,'sine'); beep(880,0.12,0.12,'sine',0.08); beep(1100,0.15,0.18,'sine',0.16);
        spawnParticles(it.x,it.y,'#FFD700',14,'star');
        spawnText(it.x,it.y-20,'⚡ スピード２倍！','#FFD700');
      } else if(it.type==='time'){
        stageTimer+=30*60; // 30秒追加
        beep(784,0.1,0.1,'sine'); beep(1047,0.12,0.12,'sine',0.1); beep(1319,0.18,0.2,'sine',0.2);
        spawnParticles(it.x,it.y,'#00CFFF',14,'star');
        spawnText(it.x,it.y-20,'⏱ +30秒！','#00CFFF');
      } else {
        lives=3;
        beep(523,0.15,0.12,'sine'); beep(659,0.12,0.1,'sine',0.1); beep(784,0.2,0.18,'sine',0.2);
        spawnParticles(it.x,it.y,'#FF69B4',14,'star');
        spawnText(it.x,it.y-20,'❤️ ライフ全回復！','#FF69B4');
      }
    }
  }

  // 敵AI（ランダムウォーク）
  for(let i=s4Enemies4.length-1;i>=0;i--){
    const e=s4Enemies4[i];
    if(!e.on){ s4Enemies4.splice(i,1); continue; }
    e.t++; e.moveCD--;
    const spd=e.isPaddington?S4_ESPD*2:S4_ESPD;
    const eDirs=[[0,-spd],[spd,0],[0,spd],[-spd,0]];
    const [evx,evy]=eDirs[e.dir%4];
    if(!s4IsSolid(e.x+evx,e.y+evy,e.w,e.h)){
      e.x+=evx; e.y+=evy;
    } else {
      e.dir=(e.dir+1+Math.floor(Math.random()*3))%4;
      e.moveCD=40+Math.random()*40;
    }
    if(e.moveCD<=0&&Math.random()<0.015){ e.dir=Math.floor(Math.random()*4); e.moveCD=40; }

    // プレイヤーと接触
    if(P.invTimer<=0&&P.x<e.x+e.w&&P.x+P.w>e.x&&P.y<e.y+e.h&&P.y+P.h>e.y)
      s4HitPlayer4();
  }

  // 出口判定
  if(s4ExitOpen){
    const pr=Math.floor((P.y+P.h/2-S4_OY)/S4_TILE);
    const pc2=Math.floor((P.x+P.w/2-S4_OX)/S4_TILE);
    if(pr>=0&&pr<S4_ROWS&&pc2>=0&&pc2<S4_COLS&&s4Grid[pr][pc2]===3)
      triggerWin();
  }
  updateFX();
}

// ── Stage 4 描画 ─────────────────────────
function drawS4Maze(){
  for(let r=0;r<S4_ROWS;r++){
    for(let c=0;c<S4_COLS;c++){
      const px=S4_OX+c*S4_TILE, py=S4_OY+r*S4_TILE;
      const cell=s4Grid[r][c];
      // 床
      ctx.fillStyle=(r+c)%2===0?'#DDD0B0':'#CFC0A0';
      ctx.fillRect(px,py,S4_TILE,S4_TILE);
      if(cell===1){
        // 硬い壁（レンガ風）
        ctx.fillStyle='#556';
        ctx.fillRect(px,py,S4_TILE,S4_TILE);
        ctx.fillStyle='#667';
        ctx.fillRect(px+1,py+1,S4_TILE-2,5);
        ctx.fillStyle='#445';
        ctx.fillRect(px+1,py+S4_TILE-6,S4_TILE-2,5);
        ctx.strokeStyle='#334'; ctx.lineWidth=1;
        ctx.strokeRect(px,py,S4_TILE,S4_TILE);
      } else if(cell===2){
        // 壊せる壁（木箱）
        ctx.fillStyle='#9B6B2C';
        ctx.fillRect(px+2,py+2,S4_TILE-4,S4_TILE-4);
        ctx.strokeStyle='#5C3A10'; ctx.lineWidth=2;
        ctx.strokeRect(px+2,py+2,S4_TILE-4,S4_TILE-4);
        ctx.beginPath();
        ctx.moveTo(px+4,py+4); ctx.lineTo(px+S4_TILE-4,py+S4_TILE-4);
        ctx.moveTo(px+S4_TILE-4,py+4); ctx.lineTo(px+4,py+S4_TILE-4);
        ctx.stroke();
      } else if(cell===3){
        if(s4ExitOpen){
          // 出口（光る緑ポータル）
          const gp=ctx.createRadialGradient(px+20,py+20,3,px+20,py+20,22);
          gp.addColorStop(0,'#AAFFCC'); gp.addColorStop(1,'#006633');
          ctx.fillStyle=gp; ctx.fillRect(px,py,S4_TILE,S4_TILE);
          ctx.globalAlpha=0.35+Math.abs(Math.sin(s4GameT4*0.12))*0.4;
          ctx.fillStyle='#CCFFDD'; ctx.fillRect(px+4,py+4,S4_TILE-8,S4_TILE-8);
          ctx.globalAlpha=1;
          ctx.fillStyle='#fff'; ctx.font='bold 13px Arial';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('出',px+S4_TILE/2,py+S4_TILE/2);
          ctx.textBaseline='alphabetic';
        } else {
          // 隠し出口（普通の床に見える）
          ctx.fillStyle='#D5C8A8'; ctx.fillRect(px,py,S4_TILE,S4_TILE);
        }
      }
    }
  }
}

function drawS4Bombs(){
  s4Bombs.forEach(b=>{
    const cx=S4_OX+b.c*S4_TILE+S4_TILE/2, cy=S4_OY+b.r*S4_TILE+S4_TILE/2;
    const danger=b.timer<60;
    const pulse=Math.sin(s4GameT4*(danger?0.45:0.2))*3;
    ctx.save();
    ctx.shadowColor=danger?'#FF2200':'#FF6600'; ctx.shadowBlur=danger?14:7;
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(cx,cy-2,13+pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // ハイライト
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.beginPath(); ctx.arc(cx-4,cy-7,4,0,Math.PI*2); ctx.fill();
    // 導火線
    ctx.strokeStyle=danger?'#FF6600':'#999'; ctx.lineWidth=2.2;
    ctx.beginPath();
    ctx.moveTo(cx+9,cy-12);
    ctx.quadraticCurveTo(cx+16,cy-20,cx+13,cy-27);
    ctx.stroke();
    // 火花
    if(Math.sin(s4GameT4*0.38)>0){
      ctx.fillStyle=danger?'#FF3300':'#FFD700';
      ctx.beginPath(); ctx.arc(cx+13,cy-27,3.5,0,Math.PI*2); ctx.fill();
    }
    // 残り秒数
    ctx.fillStyle=danger?'#FF4444':'#FFD700';
    ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.fillText(Math.ceil(b.timer/60)+'s',cx,cy+27);
    ctx.restore();
  });
}

function drawS4Explosions(){
  s4Explosions.forEach(ex=>{
    const a=ex.timer/45;
    ex.cells.forEach(({r,c})=>{
      const px=S4_OX+c*S4_TILE, py=S4_OY+r*S4_TILE;
      ctx.save(); ctx.globalAlpha=a;
      const fg=ctx.createRadialGradient(px+20,py+20,2,px+20,py+20,22);
      fg.addColorStop(0,'#FFFFFF');
      fg.addColorStop(0.3,'#FFD700');
      fg.addColorStop(0.7,'#FF4400');
      fg.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=fg;
      ctx.fillRect(px,py,S4_TILE,S4_TILE);
      ctx.restore();
    });
  });
}

function drawS4Enemy(e){
  if(!e.on) return;
  const cx=e.x+e.w/2, cy=e.y+e.h/2;
  ctx.save(); ctx.translate(cx,cy);

  if(e.isPaddington){
    // ── パディントンベア（トップダウン）
    // 速さ表示（動く速度線）
    const spd=Math.sin(e.t*0.3)*3;
    ctx.globalAlpha=0.4;
    ctx.strokeStyle='#FF6600'; ctx.lineWidth=2;
    [-10,-6,-2,2,6,10].forEach(ox=>{
      ctx.beginPath(); ctx.moveTo(ox-6+spd,8); ctx.lineTo(ox+6+spd,8); ctx.stroke();
    });
    ctx.globalAlpha=1;
    // 影
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(0,4,15,10,0,0,Math.PI*2); ctx.fill();
    // 青いコート（体）
    ctx.fillStyle='#1A5276';
    ctx.beginPath(); ctx.ellipse(0,1,14,13,0,0,Math.PI*2); ctx.fill();
    // 茶色の顔（頭）
    ctx.fillStyle='#8B5E2C';
    ctx.beginPath(); ctx.arc(0,-5,10,0,Math.PI*2); ctx.fill();
    // 顔ハイライト
    ctx.fillStyle='#A87840';
    ctx.beginPath(); ctx.arc(-2,-7,5,0,Math.PI*2); ctx.fill();
    // 赤いバケツハット
    ctx.fillStyle='#C0392B';
    ctx.beginPath(); ctx.ellipse(0,-12,9,4,0,0,Math.PI*2); ctx.fill(); // 帽子ツバ
    ctx.fillStyle='#E74C3C';
    ctx.beginPath(); ctx.ellipse(0,-15,6,5,0,0,Math.PI*2); ctx.fill(); // 帽子本体
    // 目
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-4,-4,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-4,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-3,-5,0.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-5,0.8,0,Math.PI*2); ctx.fill();
    // マーマレードジャム
    ctx.fillStyle='#FF8C00';
    ctx.beginPath(); ctx.ellipse(7,4,4,3,0.3,0,Math.PI*2); ctx.fill();
    // HP表示（2発必要な場合）
    if((e.hp||2)>1){
      ctx.fillStyle='#FF6600'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
      ctx.fillText('HP:'+e.hp,0,e.h/2+6);
    }
  } else {
    // 通常の敵（ブロブ）
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(0,3,14,9,0,0,Math.PI*2); ctx.fill();
    const wb=Math.sin(e.t*0.14)*2;
    ctx.fillStyle=e.color;
    ctx.beginPath(); ctx.ellipse(0,0,14+wb,13-wb,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-5,-3,4.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-5,-3,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,100,100,0.35)';
    ctx.beginPath(); ctx.arc(-8,2,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,2,3.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

      ctx.beginPath(); ctx.arc(8+Math.cos(a)*3,-8+Math.sin(a)*3,1.7,0,Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();
}

function drawS4PowerItems(){
  // 既存：爆弾パワーアップ
  s4PowerItems.forEach(pw=>{
    if(!pw.on) return;
    const glow=0.6+Math.sin(pw.t*0.14)*0.4;
    ctx.save();
    ctx.globalAlpha=glow;
    ctx.shadowColor='#FF4500'; ctx.shadowBlur=16;
    ctx.fillStyle='#FF4500';
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2-Math.PI/6;
      if(i===0) ctx.moveTo(pw.x+Math.cos(a)*14,pw.y+Math.sin(a)*14);
      else ctx.lineTo(pw.x+Math.cos(a)*14,pw.y+Math.sin(a)*14);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💥',pw.x,pw.y);
    ctx.textBaseline='alphabetic';
    ctx.globalAlpha=1;
    ctx.restore();
  });

  // 木箱ドロップ：スピードUP / ライフUP / タイムUP
  s4DropItems.forEach(it=>{
    if(!it.on) return;
    const glow=0.65+Math.sin(it.t*0.12)*0.35;
    const col=it.type==='speed'?'#FFD700':it.type==='time'?'#00CFFF':'#FF69B4';
    const icon=it.type==='speed'?'⚡':it.type==='time'?'⏱':'❤️';
    ctx.save();
    ctx.globalAlpha=glow;
    ctx.shadowColor=col; ctx.shadowBlur=18;
    // 円形背景
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(it.x,it.y,13,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(icon,it.x,it.y+1);
    ctx.textBaseline='alphabetic';
    ctx.globalAlpha=1;
    ctx.restore();
  });
}

function drawTouchControlsS4(){
  if(!isTouchDevice) return;
  ctx.save();
  const db=(x,y,r,pressed,label,sz)=>{
    // 影（黒い一回り大きい円）でどんな背景でも浮き出る
    ctx.globalAlpha=0.60;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x,y,r+4,0,Math.PI*2); ctx.fill();
    // ボタン本体
    ctx.globalAlpha=pressed?0.95:0.75;
    ctx.fillStyle=pressed?'#FFD700':'#fff';
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    // 枠線
    ctx.globalAlpha=1;
    ctx.strokeStyle=pressed?'#FF8800':'#FFD700';
    ctx.lineWidth=pressed?3:2.5;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
    // ラベル
    ctx.fillStyle=pressed?'#333':'#222';
    ctx.font=`bold ${sz}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(label,x,y); ctx.textBaseline='alphabetic';
  };
  db(TB.left.x, TB.left.y, TB.left.r, !!keys['ArrowLeft'],  '◀', 22);
  db(TB.right.x,TB.right.y,TB.right.r,!!keys['ArrowRight'], '▶', 22);
  db(TB3.up.x,  TB3.up.y,  TB3.up.r,  !!keys['ArrowUp'],    '▲', 20);
  db(TB3.down.x,TB3.down.y,TB3.down.r,!!keys['ArrowDown'],  '▼', 20);
  db(TB.jump.x, TB.jump.y, TB.jump.r, !!keys['Space'],      '💣', 20);
  ctx.restore();
}

function drawStage4Scene(){
  // 暗い背景
  ctx.fillStyle='#1a1410'; ctx.fillRect(0,0,W,H);
  drawS4Maze();
  drawS4Explosions();
  drawS4PowerItems();
  s4Enemies4.forEach(e=>drawS4Enemy(e));
  drawS4Bombs();
  drawS4Player();
  drawFX();
  // パワーアップ中HUD
  if(s4PowerTimer>0){
    const sec=Math.ceil(s4PowerTimer/60);
    const pulse=Math.sin(s4GameT4*0.3)>0;
    ctx.save();
    ctx.fillStyle=pulse?'#FF4500':'#FF8C00'; ctx.font='bold 13px Arial'; ctx.textAlign='left';
    ctx.fillText(`💥 爆弾2倍 残り${sec}秒`,145,43);
    ctx.fillStyle='#331100'; ctx.fillRect(145,46,120,5);
    ctx.fillStyle='#FF4500'; ctx.fillRect(145,46,s4PowerTimer/420*120,5);
    ctx.restore();
  }
  drawS4HUD();
  drawTouchControlsS4();
}

// ════════════════════════════════════════════
//  STAGE 5 – DONKEY KONG STYLE
// ════════════════════════════════════════════
// Floors: y = top edge of girder, barrel/player stand ON this y
const S5_FL = [
  {y:444, x1:0,   x2:800},  // 0: ground floor
  {y:356, x1:60,  x2:680},  // 1
  {y:268, x1:120, x2:740},  // 2
  {y:180, x1:60,  x2:680},  // 3
  {y:92,  x1:120, x2:740},  // 4: top (Paddington lives here)
];
// Ladder definitions {x, y1=top, y2=bottom}
const S5_LD = [
  {x:140, y1:356, y2:444},  // floor 0-1 (left side)
  {x:640, y1:268, y2:356},  // floor 1-2 (right side)
  {x:140, y1:180, y2:268},  // floor 2-3 (left side)
  {x:620, y1:92,  y2:180},  // floor 3-4 (right side)
];
// Rolling direction for barrels per floor index (+1=right, -1=left)
const S5_BDIR = [-1, +1, -1, +1, -1];
const S5_BSPD5 = 2.7;
const S5_CSPD5 = 3.2;   // climb speed
const S5_JV5   = -12.0; // jump velocity
const S5_GR5   = 0.48;  // gravity
const S5_WS5   = 3.8;   // walk speed

let s5Barrels=[], s5SpawnT5=0, s5GameT5=0, s5PadT5=0;
let s5WinCD5=-1, s5OnLadder5=false, s5CurLadder=null;
let s5KickCD=0;   // キックのクールダウン（フレーム数）
let s5KickAnim=0; // キックアニメーション残りフレーム（18→0）
let s5PadHP=10;   // パディントンのHP（最大10）
let s5PadHitCD=0; // パディントン被ダメージ無敵フレーム
let s5Stars=[];   // 魔法少女の星弾リスト
let s5PadFloor=4; // パディントンが居るフロアインデックス（4=最上段）
let s5PadX=620;   // パディントンのX座標（HP3以下で横移動）
let s5PadMoveDir=-1; // HP3以下の横移動方向

function initStage5(){
  s5Barrels=[]; s5SpawnT5=0; s5GameT5=0; s5PadT5=0;
  s5WinCD5=-1; s5OnLadder5=false; s5CurLadder=null; s5KickCD=0; s5KickAnim=0;
  s5PadHP=10; s5PadHitCD=0; s5Stars=[];
  s5PadFloor=4; s5PadX=620; s5PadMoveDir=-1;
  platforms=[]; enemies=[]; items=[]; bgTrees=[];
  particles=[]; floatTxts=[];
  // Microphone at top-right
  items=[{k:'mic',x:706,y:54,w:28,h:38,on:true}];
  // Player starts bottom-left on floor 0
  P.w=28; P.h=40;
  P.x=80; P.y=S5_FL[0].y-P.h;
  P.vx=0; P.vy=0; P.facing=1;
  P.onGround=true; P.invTimer=0; P.walkT=0;
  cam.x=0;
  const actionHint = costumeType===2 ? 'Space 剣を振る' : costumeType===1 ? 'Space 星を発射' : 'Space キック';
  document.getElementById('hint').textContent=
    `← → 移動 | ↑↓ ハシゴ登り降り | ${actionHint} | 樽を避けてマイクをとれ！`;
}

// Returns the ladder the player is near (or null)
function s5GetLadder(){
  const cx=P.x+P.w/2, cy=P.y+P.h/2;
  for(const l of S5_LD){
    if(Math.abs(cx-l.x)<22 && cy>=l.y1-22 && cy<=l.y2+12) return l;
  }
  return null;
}

// One barrel update step; returns false if barrel should be removed
function s5UpdateBarrel(b){
  b.t++;
  b.angle = (b.angle||0) + b.vx / b.r; // 転がり角度を移動量/半径で累積
  const prevBY = b.y;
  b.vy = Math.min(b.vy + S5_GR5, 16);
  b.y += b.vy;
  b.x += b.vx;
  const bBot = b.y + b.r, prevBot = prevBY + b.r;
  // Floor landing check
  for(let fi=0;fi<S5_FL.length;fi++){
    const f=S5_FL[fi];
    if(b.x>=f.x1 && b.x<=f.x2 && bBot>=f.y && prevBot<=f.y && b.vy>0){
      b.y=f.y-b.r;
      // ランダムバウンド（約50%の確率で弾む）
      b.vy = Math.random()<0.50 ? -(2.5+Math.random()*6.5) : 0;
      if(b.floorIdx!==fi){
        b.floorIdx=fi;
        if(!b.kicked) b.vx=S5_BSPD5*S5_BDIR[fi]; // 蹴られた樽は方向を維持
        beep(80,0.07,0.07,'sine');
      }
      break;
    }
  }
  // Remove if offscreen
  return !(b.x<-50||b.x>850||b.y>530);
}

function updateStage5(){
  s5GameT5++; s5PadT5++;
  if(P.invTimer>0) P.invTimer--;

  // ── Barrel spawning (Paddington throws)
  s5SpawnT5++;
  const spRate = Math.max(80, 200 - Math.floor(s5GameT5/400)*15);
  if(s5SpawnT5>=spRate){
    s5SpawnT5=0;
    s5Barrels.push({
      x:s5PadX, y:S5_FL[s5PadFloor].y-14,
      vx:S5_BSPD5*S5_BDIR[s5PadFloor], vy:0,
      r:14, on:true, t:0, floorIdx:s5PadFloor, angle:0
    });
    beep(110,0.14,0.11,'sawtooth');
    spawnText(s5PadX,S5_FL[s5PadFloor].y-50,'樽！','#FF8800');
  }

  // ── Barrel physics & collision
  for(let i=s5Barrels.length-1;i>=0;i--){
    const b=s5Barrels[i];
    if(!s5UpdateBarrel(b)){ s5Barrels.splice(i,1); continue; }
    // Barrel vs player（蹴られた樽はプレイヤーに当たらない）
    if(P.invTimer<=0 && !b.kicked){
      const dx=(P.x+P.w/2)-b.x, dy=(P.y+P.h/2)-b.y;
      if(Math.hypot(dx,dy)<b.r+15){
        sfxHurt(); lives--;
        P.invTimer=130;
        spawnParticles(P.x+P.w/2,P.y+P.h/2,'#FF69B4',12,'circle');
        spawnText(P.x+P.w/2,P.y-20,'やられた！','#FF4400');
        // Reset to start
        s5OnLadder5=false; s5CurLadder=null;
        P.x=80; P.y=S5_FL[0].y-P.h; P.vx=0; P.vy=0; P.onGround=true;
        if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
      }
    }
    // 蹴られた樽 vs パディントン → 樽消滅＋ダメージ
    if(b.kicked && s5PadHP>0 && s5PadHitCD===0){
      const padCX=s5PadX, padCY=S5_FL[s5PadFloor].y-40;
      if(Math.hypot(padCX-b.x, padCY-b.y)<52){
        s5PadHP--; s5PadHitCD=55;
        s5Barrels.splice(i,1); // 樽消滅
        beep(150,0.1,0.22,'square'); beep(80,0.12,0.18,'sawtooth',0.06);
        spawnParticles(padCX,padCY,'#FF4400',18,'circle');
        spawnParticles(padCX,padCY,'#FF8800',10,'star');
        const dmgTxt=s5PadHP===0?'KO！！':`ヒット！ 残り${s5PadHP}`;
        spawnText(padCX,S5_FL[s5PadFloor].y-90,dmgTxt,'#FF4400');
        if(s5PadHP<=0) setTimeout(()=>triggerWin(),600);
        continue;
      }
    }
  }

  // ── 蹴られた樽 vs 通常樽 衝突判定（両方消滅）
  {
    const toRemove=new Set();
    for(let i=0;i<s5Barrels.length;i++){
      if(toRemove.has(i)||!s5Barrels[i].kicked) continue;
      const bk=s5Barrels[i];
      for(let j=0;j<s5Barrels.length;j++){
        if(i===j||toRemove.has(j)) continue;
        const bt=s5Barrels[j];
        if(Math.hypot(bk.x-bt.x, bk.y-bt.y)<bk.r+bt.r+2){
          toRemove.add(i); toRemove.add(j);
          const cx=(bk.x+bt.x)/2, cy=(bk.y+bt.y)/2;
          beep(200,0.08,0.22,'square'); beep(100,0.10,0.16,'sawtooth',0.05);
          spawnParticles(cx,cy,'#FF8800',22,'circle');
          spawnParticles(cx,cy,'#FFD700',10,'star');
          spawnText(cx,cy-26,'ドカン！','#FF8800');
          break;
        }
      }
    }
    [...toRemove].sort((a,b)=>b-a).forEach(i=>s5Barrels.splice(i,1));
  }

  // ── 魔法の星 更新 ──
  for(let i=s5Stars.length-1;i>=0;i--){
    const st=s5Stars[i];
    st.x+=st.vx;
    st.life--;
    if(st.life<=0||st.x<-30||st.x>830){ s5Stars.splice(i,1); continue; }
    // 星 vs 樽 → キックと同効果
    let starHit=false;
    for(let j=s5Barrels.length-1;j>=0;j--){
      const b=s5Barrels[j];
      if(Math.hypot(b.x-st.x, b.y-st.y)<b.r+10){
        const speed=Math.max(Math.abs(b.vx), S5_BSPD5)*1.5;
        b.vx=Math.sign(st.vx)*speed;
        b.kicked=true;
        beep(440,0.04,0.12,'sine'); beep(660,0.03,0.10,'sine',0.04);
        spawnParticles(b.x,b.y,'#FFD700',14,'star');
        spawnParticles(b.x,b.y,'#CC88FF',8,'circle');
        spawnText(b.x,b.y-26,'✨ヒット！','#FFD700');
        s5Stars.splice(i,1); starHit=true; break;
      }
    }
    if(starHit) continue;
    // 星 vs パディントン → 消滅のみ（ダメージなし）
    const padCX=s5PadX, padCY=S5_FL[s5PadFloor].y-40;
    if(Math.hypot(padCX-st.x, padCY-st.y)<40){
      spawnParticles(st.x,st.y,'#FFD700',10,'star');
      spawnText(st.x,st.y-22,'✨','#FFD700');
      s5Stars.splice(i,1);
    }
  }

  // ── Player controls
  const ml=keys['ArrowLeft']||keys['KeyA'];
  const mr=keys['ArrowRight']||keys['KeyD'];
  const mu=keys['ArrowUp']||keys['KeyW'];
  const md=keys['ArrowDown']||keys['KeyS'];

  if(s5OnLadder5 && s5CurLadder){
    const l=s5CurLadder;
    // Snap player x to ladder center
    P.x+=(l.x-P.w/2-P.x)*0.4;
    // Vertical movement
    P.vy = mu?-S5_CSPD5 : md?S5_CSPD5 : 0;
    P.y += P.vy;
    P.y = Math.max(l.y1-P.h, Math.min(l.y2-P.h, P.y));
    if(mu||md) P.walkT+=0.08;
    // 上端到達 → 下を押していなければ自動降車
    if(P.y<=l.y1-P.h+6 && !md){ s5OnLadder5=false; s5CurLadder=null; P.y=l.y1-P.h; P.vy=0; P.onGround=true; }
    // 下端到達 → 上を押していなければ自動降車
    if(P.y>=l.y2-P.h-6 && !mu){ s5OnLadder5=false; s5CurLadder=null; P.y=l.y2-P.h; P.vy=0; P.onGround=true; }
    // ジャンプ禁止（Space = キックのみ）
    updateFX(); return;
  }

  // Grab ladder with ↑ or ↓
  if((mu||md)&&!s5OnLadder5){
    const l=s5GetLadder();
    if(l){ s5OnLadder5=true; s5CurLadder=l; updateFX(); return; }
  }

  // Horizontal
  if(ml){P.vx=-S5_WS5; P.facing=-1;}
  else if(mr){P.vx=S5_WS5; P.facing=1;}
  else P.vx*=0.78;

  // ── キックアクション（Space）──
  if(s5KickCD>0) s5KickCD--;
  if(s5KickAnim>0) s5KickAnim--;
  if(s5PadHitCD>0) s5PadHitCD--;

  // ── パディントン フェーズ移行 & 横移動 ──────────────────
  if(s5PadHP>0){
    // HP7以下：フロア4→3に移動
    if(s5PadHP<=7 && s5PadFloor===4){
      s5PadFloor=3;
      s5PadX=S5_FL[3].x2-80; // フロア3の右寄りに出現
      beep(180,0.15,0.25,'sawtooth'); beep(120,0.12,0.2,'square',0.1);
      spawnParticles(s5PadX,S5_FL[3].y-40,'#FF4400',22,'circle');
      spawnText(s5PadX,S5_FL[3].y-80,'ガウッ！一段下がる！','#FF4400');
    }
    // HP5以下：フロア3→2に移動
    if(s5PadHP<=5 && s5PadFloor===3){
      s5PadFloor=2;
      s5PadX=S5_FL[2].x2-80; // フロア2の右寄りに出現
      beep(160,0.15,0.25,'sawtooth'); beep(100,0.12,0.2,'square',0.1);
      spawnParticles(s5PadX,S5_FL[2].y-40,'#FF8800',22,'circle');
      spawnText(s5PadX,S5_FL[2].y-80,'まだまだ！さらに下がる！','#FF8800');
    }
    // HP3以下：横往復
    if(s5PadHP<=3){
      const pf=S5_FL[s5PadFloor];
      s5PadX+=s5PadMoveDir*3.5;
      if(s5PadX>=pf.x2-55){ s5PadX=pf.x2-55; s5PadMoveDir=-1; }
      if(s5PadX<=pf.x1+55){ s5PadX=pf.x1+55; s5PadMoveDir=1; }
    }
  }

  if(just['Space'] && s5KickCD===0){
    s5KickCD=28; s5KickAnim=18;
    let acted=false;

    if(costumeType===1){
      // ── 魔法少女：杖を振って星を発射 ──
      beep(660,0.05,0.12,'sine'); beep(880,0.04,0.10,'sine',0.06);
      spawnParticles(P.x+P.w/2+P.facing*18,P.y+P.h*0.3,'#FFD700',10,'star');
      spawnParticles(P.x+P.w/2+P.facing*18,P.y+P.h*0.3,'#CC88FF',6,'circle');
      s5Stars.push({
        x: P.x+P.w/2+P.facing*26,
        y: P.y+P.h*0.32,
        vx: P.facing*10,
        life: 90
      });
      acted=true;
    } else {
      // ── デフォルト（キック）or 戦士（剣振り）──
      const range       = costumeType===2 ? 72 : 58;
      const actionText  = costumeType===2 ? '斬！' : 'キック！';
      const actionColor = costumeType===2 ? '#88CCFF' : '#FF6600';
      // 樽チェック
      for(let i=s5Barrels.length-1;i>=0;i--){
        const b=s5Barrels[i];
        const dx=b.x-(P.x+P.w/2), dy=b.y-(P.y+P.h/2);
        if(Math.hypot(dx,dy)<range){
          const speed=Math.max(Math.abs(b.vx), S5_BSPD5)*1.5;
          b.vx=P.facing*speed;
          b.kicked=true;
          if(costumeType===2){
            beep(300,0.04,0.15,'sawtooth'); beep(150,0.06,0.20,'square',0.04);
            spawnParticles(b.x,b.y,'#88CCFF',18,'star');
            spawnParticles(b.x+P.facing*28,b.y-12,'#FFFFFF',10,'circle');
          } else {
            beep(220,0.06,0.20,'square'); beep(100,0.10,0.16,'sawtooth',0.05);
            spawnParticles(b.x,b.y,'#FF6600',16,'star');
            spawnParticles(b.x+P.facing*24,b.y-10,'#FFD700',8,'circle');
          }
          spawnText(b.x,b.y-26,actionText,actionColor);
          acted=true; break;
        }
      }
      // パディントンチェック（デフォルト＆戦士は直接攻撃可能）
      if(!acted && s5PadHP>0 && s5PadHitCD===0){
        const padCX=s5PadX, padCY=S5_FL[s5PadFloor].y-40;
        const dx=padCX-(P.x+P.w/2), dy=padCY-(P.y+P.h/2);
        const padRange=costumeType===2 ? 88 : 80;
        if(Math.hypot(dx,dy)<padRange){
          s5PadHP--;
          s5PadHitCD=50;
          beep(150,0.1,0.2,'square'); beep(80,0.12,0.18,'sawtooth',0.06);
          spawnParticles(padCX,padCY,'#FF4400',16,'circle');
          const dmgTxt=s5PadHP===0?'KO！！':`ヒット！ 残り${s5PadHP}`;
          spawnText(padCX,S5_FL[s5PadFloor].y-90,dmgTxt,'#FF4400');
          acted=true;
          if(s5PadHP<=0) setTimeout(()=>triggerWin(),600);
        }
      }
    }

    if(!acted){
      beep(220,0.05,0.08,'square');
      spawnText(P.x+P.w/2+P.facing*20,P.y,'スカ…','#aaa');
    }
  }

  // Gravity
  P.vy = Math.min(P.vy+S5_GR5, 15);
  const prevPY = P.y;
  P.x = Math.max(0, Math.min(800-P.w, P.x+P.vx));
  P.y += P.vy;

  // Floor landing
  P.onGround=false;
  if(P.vy>=0){
    const cx=P.x+P.w/2;
    const prevBot=prevPY+P.h, newBot=P.y+P.h;
    for(const f of S5_FL){
      if(cx>=f.x1-6&&cx<=f.x2+6&&newBot>=f.y&&prevBot<=f.y+3){
        P.y=f.y-P.h; P.vy=0; P.onGround=true; break;
      }
    }
  }

  // ── パディントン壁判定（生存中はすり抜け禁止）
  if(s5PadHP>0){
    const padX1=s5PadX-23, padX2=s5PadX+23;
    const padY1=S5_FL[s5PadFloor].y-90, padY2=S5_FL[s5PadFloor].y+4;
    if(P.x<padX2 && P.x+P.w>padX1 && P.y<padY2 && P.y+P.h>padY1){
      if(P.x+P.w/2 < s5PadX){
        P.x=padX1-P.w; // 左から来た → 左に押し戻す
      } else {
        P.x=padX2;     // 右から来た → 右に押し戻す
      }
      P.vx=0;
    }
  }

  // Fell off screen
  if(P.y>510){
    sfxHurt(); lives--;
    spawnParticles(P.x+P.w/2,490,'#FF69B4',12,'circle');
    s5OnLadder5=false; s5CurLadder=null;
    P.x=80; P.y=S5_FL[0].y-P.h; P.vx=0; P.vy=0; P.invTimer=120; P.onGround=true;
    if(lives<=0){ stopBGM(); state='gameover'; gameoverTimer=0; }
  }

  if(Math.abs(P.vx)>0.5&&P.onGround) P.walkT+=0.1;

  // Microphone pickup → win
  const mic=items.find(it=>it.k==='mic'&&it.on);
  if(mic&&P.x<mic.x+mic.w&&P.x+P.w>mic.x&&P.y<mic.y+mic.h&&P.y+P.h>mic.y){
    mic.on=false; score+=2000;
    sfxFanfare();
    spawnParticles(mic.x+mic.w/2,mic.y,'#FFD700',30,'star');
    spawnText(mic.x+mic.w/2,mic.y-24,'🎤 GOAL！ +2000','#FFD700');
    s5WinCD5=160;
  }
  if(s5WinCD5>0){ s5WinCD5--; if(s5WinCD5===0) triggerWin(); }

  updateFX();
}

// ── Stage 5 Draw ──────────────────────────
function drawStage5BG(){
  // Dark factory background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0808'); bg.addColorStop(1,'#1a1008');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Scaffolding lines
  ctx.strokeStyle='rgba(80,60,20,0.25)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=80){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

  // Draw floors (steel girders)
  S5_FL.forEach((f,i)=>{
    const fw=f.x2-f.x1;
    // Girder body
    const gg=ctx.createLinearGradient(f.x1,f.y,f.x1,f.y+20);
    gg.addColorStop(0,'#B8860B'); gg.addColorStop(0.35,'#DAA520'); gg.addColorStop(1,'#6B4C0A');
    ctx.fillStyle=gg; ctx.fillRect(f.x1,f.y,fw,18);
    // Highlight strip
    ctx.fillStyle='rgba(255,220,80,0.22)'; ctx.fillRect(f.x1,f.y,fw,4);
    // Shadow strip
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(f.x1,f.y+14,fw,4);
    // Rivets
    ctx.fillStyle='#4A3208';
    for(let rx=f.x1+24;rx<f.x2-16;rx+=56){
      ctx.beginPath(); ctx.arc(rx,f.y+9,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,200,60,0.35)';
      ctx.beginPath(); ctx.arc(rx-1,f.y+8,1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#4A3208';
    }
    // Edge brackets
    ctx.fillStyle='#5A3A08';
    ctx.fillRect(f.x1,f.y,10,18);
    ctx.fillRect(f.x2-10,f.y,10,18);
  });

  // Draw ladders
  S5_LD.forEach(l=>{
    const lh=l.y2-l.y1;
    // Side rails
    ctx.strokeStyle='#7B5E10'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(l.x-9,l.y1); ctx.lineTo(l.x-9,l.y2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(l.x+9,l.y1); ctx.lineTo(l.x+9,l.y2); ctx.stroke();
    // Rail highlight
    ctx.strokeStyle='rgba(218,165,32,0.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(l.x-8,l.y1); ctx.lineTo(l.x-8,l.y2); ctx.stroke();
    // Rungs
    ctx.strokeStyle='#DAA520'; ctx.lineWidth=3.5;
    for(let ry=l.y1+14;ry<l.y2;ry+=18){
      ctx.beginPath(); ctx.moveTo(l.x-9,ry); ctx.lineTo(l.x+9,ry); ctx.stroke();
    }
  });
}

function drawS5Barrel(b){
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle||0);
  // 蹴られた樽はオーラを纏う
  if(b.kicked){
    ctx.shadowColor='#FF4400'; ctx.shadowBlur=18;
  }
  // Body（蹴られた樽は赤系）
  const bg2=ctx.createRadialGradient(-4,-4,2,0,0,b.r);
  if(b.kicked){
    bg2.addColorStop(0,'#FF9944'); bg2.addColorStop(1,'#BB2200');
  } else {
    bg2.addColorStop(0,'#D4882A'); bg2.addColorStop(1,'#6B3A10');
  }
  ctx.fillStyle=bg2; ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill();
  // Rings
  ctx.strokeStyle=b.kicked?'#881100':'#3A1E05'; ctx.lineWidth=2;
  [-5,0,5].forEach(oy=>{
    ctx.beginPath(); ctx.ellipse(0,oy,b.r-1,3,0,0,Math.PI*2); ctx.stroke();
  });
  // Highlight
  ctx.fillStyle=b.kicked?'rgba(255,180,80,0.40)':'rgba(255,210,100,0.28)';
  ctx.beginPath(); ctx.arc(-4,-4,b.r*0.48,0,Math.PI*2); ctx.fill();
  // 蹴られた樽に矢印（方向表示）
  if(b.kicked){
    ctx.restore();
    ctx.save();
    ctx.translate(b.x, b.y);
    const dir=b.vx>0?1:-1;
    ctx.fillStyle='rgba(255,100,0,0.85)';
    ctx.font='bold 13px Arial'; ctx.textAlign='center';
    ctx.fillText(dir>0?'→':'←', dir*20, -b.r-4);
  }
  ctx.restore();
}

  ctx.beginPath(); ctx.arc(0,9,11,0,Math.PI); ctx.fill();
  // Grille (lighter top)

// ── Stage5専用：横向きキャラクター描画 ──────────────────
function drawS5SideChar(cx, cy, facing, wt, kick=0){
  ctx.save();
  ctx.translate(cx, cy);
  if(facing<0) ctx.scale(-1,1);
  const ks = kick>0 ? Math.sin(kick*Math.PI*0.5) : 0;
  if(ks>0) ctx.rotate(-0.16*ks);

  const isPink = charType==='pink';
  // コスチューム別の色テーブル（ピンク・白それぞれ）
  const _cc5 = isPink ? [
    {leg:'#FF69B4',body:'#FFB6C1',d1:'#FF69B4',d2:'#FF1493'},
    {leg:'#8E44AD',body:'#D7BDE2',d1:'#9B59B6',d2:'#6C3483'},
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},
  ] : [
    {leg:'#ADD8E6',body:'#F5F5F5',d1:'#87CEEB',d2:'#4CA3D4'},
    {leg:'#8E44AD',body:'#EDE0F5',d1:'#9B59B6',d2:'#6C3483'},
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},
  ];
  const _c5 = _cc5[costumeType]||_cc5[0];
  const legCol  = _c5.leg;
  const bodyCol = _c5.body;
  const d1Col   = _c5.d1;
  const d2Col   = _c5.d2;

  // 影
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0,2,12,5,0,0,Math.PI*2); ctx.fill();

  // 後ろ足
  ctx.fillStyle=legCol;
  ctx.save(); ctx.translate(4,14);
  ctx.rotate(ks>0 ? 0.18*ks : Math.sin(wt*10+Math.PI)*0.38);
  ctx.beginPath(); ctx.ellipse(0,7,4,10,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ボディ（横から：縦長楕円）
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.ellipse(0,-2,10,17,0,0,Math.PI*2); ctx.fill();

  // ドレス
  ctx.fillStyle=d1Col;
  ctx.beginPath(); ctx.ellipse(0,8,10,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=d2Col;
  ctx.beginPath(); ctx.ellipse(0,14,12,5,0,0,Math.PI*2); ctx.fill();

  // 後ろ腕
  ctx.fillStyle=bodyCol;
  ctx.save(); ctx.translate(-5,0);
  ctx.rotate(ks>0 ? -Math.PI*0.28*ks : Math.sin(wt*10)*0.22);
  ctx.beginPath(); ctx.ellipse(0,6,3.5,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 耳（横顔：正面側の1本）
  if(isPink){
    ctx.fillStyle=bodyCol;
    ctx.save(); ctx.translate(3,-20);
    ctx.beginPath(); ctx.ellipse(0,-12,5,17,0.12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF69B4';
    ctx.beginPath(); ctx.ellipse(0,-12,2.5,11,0.12,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    ctx.fillStyle=bodyCol;
    ctx.save(); ctx.translate(3,-20); ctx.rotate(0.55);
    ctx.beginPath(); ctx.ellipse(0,10,5,18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,182,193,0.7)';
    ctx.beginPath(); ctx.ellipse(0,10,2.5,11,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // 頭（横顔：少し前方に）
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.arc(4,-18,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(2,-21,5,0,Math.PI*2); ctx.fill();

  // 目（横顔：前方の1つ）
  if(isPink){
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(9,-20,2.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(10,-21,0.9,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#1E90FF';
    ctx.beginPath(); ctx.arc(9,-20,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(9,-20,1.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(10,-21,0.8,0,Math.PI*2); ctx.fill();
  }

  // 鼻（横顔の先端）
  ctx.fillStyle= isPink ? '#FF69B4' : '#FFB6C1';
  ctx.beginPath(); ctx.arc(14,-18,1.4,0,Math.PI*2); ctx.fill();

  // ── コスチューム別アクセサリー ──
  if(costumeType===2){
    // 戦士：兜（ヘルメット）
    ctx.fillStyle='#778899';
    ctx.beginPath(); ctx.ellipse(4,-27,13,7,0,Math.PI,Math.PI*2); ctx.fill(); // 兜本体（上半楕円）
    ctx.fillStyle='#999'; ctx.fillRect(2,-35,3,9);   // 縦の飾り板
    ctx.fillStyle='#CC2200'; ctx.fillRect(2,-39,3,6); // 赤い羽根飾り
    ctx.fillStyle='rgba(60,60,70,0.55)';              // 頬当て
    ctx.beginPath(); ctx.ellipse(11,-23,4,5,0.2,0,Math.PI*2); ctx.fill();
    // 鎧ベルト
    ctx.fillStyle='rgba(110,110,130,0.9)';
    ctx.beginPath(); ctx.ellipse(0,4,10,2.5,0,0,Math.PI*2); ctx.fill();
    // マント（背後に流れる）
    ctx.fillStyle='rgba(180,0,0,0.72)';
    ctx.beginPath();
    ctx.moveTo(-8,-2); ctx.lineTo(-20,16); ctx.lineTo(-5,10);
    ctx.closePath(); ctx.fill();
  } else if(costumeType===1){
    // 魔法少女：リボン（胸元）
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(2,4,5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,215,0,0.6)';
    ctx.beginPath(); ctx.ellipse(2,4,2,5,0,0,Math.PI*2); ctx.fill();
    // 杖（アクション中でなければ常時表示）
    if(ks===0){
      ctx.save();
      ctx.translate(12,-4); ctx.rotate(-0.28);
      const wg2=ctx.createLinearGradient(0,0,0,24);
      wg2.addColorStop(0,'#CC88FF'); wg2.addColorStop(1,'#9B59B6');
      ctx.fillStyle=wg2;
      ctx.beginPath(); ctx.roundRect(-1.5,0,3,24,1); ctx.fill();
      ctx.save(); ctx.translate(0,-2); ctx.rotate(s5GameT5*0.08);
      drawStar(0,0,7,'#FFD700');
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.restore();
    }
    // 魔法少女：ヘアアクセ（星）
    drawStar(9,-28,4,'#FFD700');
  } else {
    // デフォルト：星のヘアクリップ
    drawStar(9,-28,5,'#FFD700');
  }

  // 前腕（キック時：後ろへ振り上げ）
  ctx.fillStyle=bodyCol;
  ctx.save(); ctx.translate(5,-1);
  ctx.rotate(ks>0 ? Math.PI*0.52*ks : Math.sin(wt*10)*-0.25);
  ctx.beginPath(); ctx.ellipse(0,6,3.5,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 前足（デフォルト/戦士はキック動作、魔法少女は通常歩き）
  ctx.fillStyle=legCol;
  ctx.save();
  const fl_rise = (ks>0 && costumeType!==1) ? -ks*10 : 0;
  const fl_ang  = (ks>0 && costumeType!==1) ? -Math.PI*0.52*ks : Math.sin(wt*10)*0.38;
  ctx.translate(-3, 14+fl_rise);
  ctx.rotate(fl_ang);
  ctx.beginPath(); ctx.ellipse(0,7,4,10,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── コスチューム別 武器エフェクト ──
  if(ks>0){
    if(costumeType===2){
      // 戦士：剣を前方に振り下ろす
      ctx.save();
      ctx.translate(10,-4);
      ctx.rotate(-Math.PI*0.10 + Math.PI*0.65*ks);
      // 刀身
      const sg=ctx.createLinearGradient(0,-4,0,-34);
      sg.addColorStop(0,'#88CCFF'); sg.addColorStop(0.5,'#FFFFFF'); sg.addColorStop(1,'#AAAAFF');
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.roundRect(-2,-34,5,32,2); ctx.fill();
      // 鍔
      ctx.fillStyle='#FFD700';
      ctx.beginPath(); ctx.roundRect(-5,-7,11,4,1); ctx.fill();
      // 柄
      ctx.fillStyle='#8B4513';
      ctx.beginPath(); ctx.roundRect(-2,-3,4,10,1); ctx.fill();
      // 斬撃エフェクト（半透明アーク）
      if(ks>0.4){
        ctx.globalAlpha=ks*0.55;
        ctx.strokeStyle='#88CCFF';
        ctx.lineWidth=4;
        ctx.beginPath();
        ctx.arc(0,-20, 26, -Math.PI*0.6, Math.PI*0.15);
        ctx.stroke();
        ctx.globalAlpha=1;
      }
      ctx.restore();
    } else if(costumeType===1){
      // 魔法少女：杖を振り上げる
      ctx.save();
      ctx.translate(8,-2);
      ctx.rotate(-Math.PI*0.6 + Math.PI*0.5*(1-ks));
      // 杖の棒
      const wg=ctx.createLinearGradient(0,0,0,28);
      wg.addColorStop(0,'#CC88FF'); wg.addColorStop(1,'#9B59B6');
      ctx.fillStyle=wg;
      ctx.beginPath(); ctx.roundRect(-2,0,4,28,1); ctx.fill();
      // 杖先の星
      ctx.save();
      ctx.translate(0,-2);
      ctx.rotate(s5GameT5*0.15);
      drawStar(0,0,8,'#FFD700');
      // 輝き
      ctx.globalAlpha=0.7+Math.sin(s5GameT5*0.3)*0.3;
      ctx.fillStyle='#FFFFFF';
      ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      ctx.restore();
      // 魔法のきらめき
      if(ks>0.3){
        ctx.globalAlpha=ks*0.7;
        for(let si=0;si<3;si++){
          const sa=si/3*Math.PI*2+s5GameT5*0.2;
          const sr=12+si*4;
          ctx.fillStyle=['#FFD700','#CC88FF','#FFFFFF'][si];
          ctx.beginPath();
          ctx.arc(Math.cos(sa)*sr, Math.sin(sa)*sr-10, 3, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha=1;
      }
      ctx.restore();
    }
  }

  ctx.restore();
}

// ── Stage5専用：後ろ向きキャラクター描画（ハシゴ登り）──
function drawS5BackChar(cx, cy, wt){
  ctx.save();
  ctx.translate(cx, cy);

  const isPink = charType==='pink';
  // コスチューム別カラー（後ろ向きも同じテーブル）
  const _cb5 = isPink ? [
    {leg:'#FF69B4',body:'#FFB6C1',d1:'#FF69B4',d2:'#FF1493'},
    {leg:'#8E44AD',body:'#D7BDE2',d1:'#9B59B6',d2:'#6C3483'},
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},
  ] : [
    {leg:'#ADD8E6',body:'#F5F5F5',d1:'#87CEEB',d2:'#4CA3D4'},
    {leg:'#8E44AD',body:'#EDE0F5',d1:'#9B59B6',d2:'#6C3483'},
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},
  ];
  const _cb = _cb5[costumeType]||_cb5[0];
  const legCol  = _cb.leg;
  const bodyCol = _cb.body;
  const d1Col   = _cb.d1;
  const d2Col   = _cb.d2;

  // 影
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0,2,14,6,0,0,Math.PI*2); ctx.fill();

  // 足（交互に動く）
  ctx.fillStyle=legCol;
  [[-7,0],[7,Math.PI]].forEach(([dx,ph])=>{
    ctx.save(); ctx.translate(dx,14);
    ctx.rotate(Math.sin(wt*9+ph)*0.4);
    ctx.beginPath(); ctx.ellipse(0,7,5,11,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ボディ（後ろ向き）
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.ellipse(0,-2,13,18,0,0,Math.PI*2); ctx.fill();

  // ドレス
  ctx.fillStyle=d1Col;
  ctx.beginPath(); ctx.ellipse(0,8,13,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=d2Col;
  ctx.beginPath(); ctx.ellipse(0,15,15,5,0,0,Math.PI*2); ctx.fill();

  // 腕（ハシゴをつかむ動き）
  ctx.fillStyle=bodyCol;
  [[-13,0],[13,Math.PI]].forEach(([dx,ph])=>{
    ctx.save(); ctx.translate(dx,-2);
    ctx.rotate(Math.sin(wt*9+ph)*0.38-0.45);
    ctx.beginPath(); ctx.ellipse(0,6,4,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 耳（後ろから）
  if(isPink){
    [[-7,-0.12],[7,0.12]].forEach(([ex,tilt])=>{
      ctx.fillStyle=bodyCol;
      ctx.save(); ctx.translate(ex,-21);
      ctx.beginPath(); ctx.ellipse(0,-13,5.5,18,tilt,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FF69B4';
      ctx.beginPath(); ctx.ellipse(0,-13,2.8,12,tilt,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  } else {
    [[-10,0.45],[10,-0.45]].forEach(([ex,rot])=>{
      ctx.fillStyle=bodyCol;
      ctx.save(); ctx.translate(ex,-19); ctx.rotate(rot);
      ctx.beginPath(); ctx.ellipse(0,9,5,18,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,182,193,0.7)';
      ctx.beginPath(); ctx.ellipse(0,9,2.5,11,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  // 戦士：鎧ベルト（胴体の後ろにも）
  if(costumeType===2){
    ctx.fillStyle='rgba(110,110,130,0.85)';
    ctx.beginPath(); ctx.ellipse(0,7,13,2.5,0,0,Math.PI*2); ctx.fill();
    // マント（後ろからよく見える）
    ctx.fillStyle='rgba(180,0,0,0.8)';
    ctx.beginPath();
    ctx.moveTo(-8,2); ctx.quadraticCurveTo(-16,18,-4,24);
    ctx.lineTo(-4,10); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8,2); ctx.quadraticCurveTo(16,18,4,24);
    ctx.lineTo(4,10); ctx.closePath(); ctx.fill();
  }
  // 魔法少女：後ろリボン
  if(costumeType===1){
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(0,6,5,3,0,0,Math.PI*2); ctx.fill();
  }

  // 頭（後ろ側：顔なし）
  ctx.fillStyle=bodyCol;
  ctx.beginPath(); ctx.arc(0,-18,13,0,Math.PI*2); ctx.fill();

  // ── コスチューム別 後頭部アクセ ──
  if(costumeType===2){
    // 戦士：兜（後ろから）
    ctx.fillStyle='#778899';
    ctx.beginPath(); ctx.ellipse(0,-26,13,7,0,Math.PI,Math.PI*2); ctx.fill();
    ctx.fillStyle='#999'; ctx.fillRect(-1.5,-34,3,9);
    ctx.fillStyle='#CC2200'; ctx.fillRect(-1.5,-38,3,6);
  } else if(costumeType===1){
    // 魔法少女：星ヘアアクセ＋後ろ側の杖がちらり
    drawStar(8,-27,5,'#FFD700');
    drawStar(-8,-28,4,'#E8D5FF');
    // 杖が背中越しに見える
    ctx.save();
    ctx.translate(14,-4); ctx.rotate(-0.2);
    const wgb=ctx.createLinearGradient(0,0,0,20);
    wgb.addColorStop(0,'#CC88FF'); wgb.addColorStop(1,'#9B59B6');
    ctx.fillStyle=wgb;
    ctx.beginPath(); ctx.roundRect(-1.5,0,3,20,1); ctx.fill();
    ctx.save(); ctx.translate(0,-2); drawStar(0,0,6,'#FFD700'); ctx.restore();
    ctx.restore();
  } else {
    // デフォルト：星クリップ
    if(isPink) drawStar(9,-27,5,'#FFD700');
    else {
      ctx.fillStyle='#FFD700';
      ctx.beginPath(); ctx.arc(-9,-27,2,0,Math.PI*2); ctx.fill();
      for(let i=0;i<5;i++){
        const a=i/5*Math.PI*2;
        ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.arc(-9+Math.cos(a)*3,-27+Math.sin(a)*3,1.5,0,Math.PI*2); ctx.fill();
      }
    }
  }

  ctx.restore();
}

function drawS5Player(){
  if(P.invTimer>0&&Math.floor(P.invTimer/5)%2===0) return;
  const sx=P.x+P.w/2, sy=P.y+P.h-31; // 脚底offset=31で地面に揃える
  const kickProg = s5KickAnim/18;

  if(s5OnLadder5){
    drawS5BackChar(sx, sy, P.walkT);   // ハシゴ：後ろ向き
  } else {
    drawS5SideChar(sx, sy, P.facing, P.walkT, kickProg); // 通常：横向き
  }

}

function drawS5HUD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,46);
  ctx.fillStyle='#FFD700'; ctx.font='bold 17px Arial'; ctx.textAlign='left';
  ctx.fillText(`スコア: ${score}`,10,29);
  ctx.fillStyle='#87CEEB'; ctx.font='bold 13px Arial';
  ctx.fillText('STAGE 5 ドンキーコング！',10,43);
  ctx.fillStyle='#FF69B4'; ctx.textAlign='center'; ctx.font='bold 18px Arial';
  ctx.fillText('♥'.repeat(Math.max(0,lives)),W/2,29);
  ctx.textAlign='right'; ctx.fillStyle='#FF9900'; ctx.font='bold 13px Arial';
  ctx.fillText(`🛢 樽 ${s5Barrels.length}本`,W-10,29);
  // パディントンHPバー
  const barW=100, barH=10, barX=W-120, barY=50;
  ctx.fillStyle='#222'; ctx.fillRect(barX,barY,barW,barH);
  const ratio=s5PadHP/10;
  ctx.fillStyle=ratio>0.5?'#44DD44':ratio>0.25?'#FFB300':'#FF3333';
  if(s5PadHitCD>0&&Math.floor(s5PadHitCD/5)%2===1) ctx.fillStyle='#fff';
  ctx.fillRect(barX,barY,barW*ratio,barH);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1; ctx.strokeRect(barX,barY,barW,barH);
  ctx.fillStyle='#FF4400'; ctx.font='bold 10px Arial'; ctx.textAlign='right';
  const _padFloorLbl=s5PadHP<=3?'横移動中':s5PadHP<=5?`フロア${s5PadFloor+1}`:s5PadHP<=7?`フロア${s5PadFloor+1}`:`フロア${s5PadFloor+1}`;
  ctx.fillText(`パディントン HP ${s5PadHP}/10 [${_padFloorLbl}]`,W-10,barY+barH-1);
  // Show which floor player is on
  let floorTxt='';
  const px=P.x+P.w/2, pb=P.y+P.h;
  for(let i=S5_FL.length-1;i>=0;i--){
    if(pb>=S5_FL[i].y-4){floorTxt=`${i+1}F`; break;}
  }
  ctx.fillStyle='#aaa'; ctx.font='12px Arial'; ctx.textAlign='right';
  ctx.fillText(floorTxt,W-10,43);
  // 制限時間
  if(stageTimer>=0){
    const sec=Math.ceil(stageTimer/60);
    const urgent=sec<=10;
    ctx.textAlign='center'; ctx.font=`bold ${urgent?15:13}px Arial`;
    ctx.fillStyle=urgent?(Math.floor(stageTimer/15)%2===0?'#FF3333':'#FF9900'):'#fff';
    ctx.fillText(`⏱ ${sec}秒`,W/2,43);
  }
  ctx.restore();
}

function drawStage5Scene(){
  drawStage5BG();
  items.forEach(it=>{ if(it.k==='mic') drawS5Mic(it); });
  drawS5Paddington();
  s5Barrels.forEach(b=>{ if(b.on) drawS5Barrel(b); });
  // 魔法の星を描画
  for(const st of s5Stars){
    const alpha=Math.min(1, st.life/12);
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(st.x, st.y);
    ctx.rotate(s5GameT5*0.25);
    drawStar(0,0,9,'#FFD700');
    ctx.globalAlpha=alpha*0.6;
    ctx.fillStyle='#CC88FF';
    ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  drawS5Player();
  drawFX();
  drawS5HUD();
  drawTouchControls();
}
