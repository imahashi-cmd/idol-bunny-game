let s6Timer=0, s6Score=0, s6Combo=0, s6MaxCombo=0;
let s6Notes=[], s6Flash=new Array(8).fill(0), s6MissFlash=new Array(8).fill(0);
let s6Judges=[], s6SongEnd=0, s6Cleared=false, s6WalkT=0;
let s6Perfect=0, s6GoodCnt=0, s6Miss=0;
let s6SongIdx=0, s6SelectAnim=0;
let s6StartSong=0;       // 最初に選んだ曲インデックス
let s6SongClearTimer=0;  // 曲クリア中間画面タイマー
let s6BassChart=[], s6DrumChart=[], s6ChordChart=[];
let s6CurrentFPB=60, s6CurrentGood=42, s6CurrentPerf=20;

// ── ステージ6：キー長押し持続音システム ──
const s6OscNodes={};
function s6StartNote(lane, freqOverride){
  if(!audioCtx||s6OscNodes[lane]) return;
  const freq=freqOverride!==undefined ? freqOverride : S6_FREQS[Math.round(lane)];
  const t=audioCtx.currentTime;
  const mk=(type,f,vol,att)=>{
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(masterGain||audioCtx.destination);
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0.001,t);
    g.gain.linearRampToValueAtTime(vol, t+att);
    o.start(t);
    return {o,g};
  };
  s6OscNodes[lane]=[
    mk('sine',    freq,      0.66, 0.025), // メイン
    mk('triangle',freq*2,    0.15, 0.040), // オクターブ上（輝き）
    mk('sine',    freq*0.5,  0.12, 0.020), // サブ低音（温かみ）
  ];
}
function s6StopNote(lane){
  const nodes=s6OscNodes[lane];
  if(!nodes||!audioCtx) return;
  const t=audioCtx.currentTime;
  const rel=0.14;
  nodes.forEach(({o,g})=>{
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(Math.max(0.001, g.gain.value), t);
    g.gain.exponentialRampToValueAtTime(0.001, t+rel);
    o.stop(t+rel+0.02);
  });
  delete s6OscNodes[lane];
}
function s6StopAllNotes(){
  for(let i=0;i<8;i++) s6StopNote(i);
  // コードノート（小数レーン）も停止
  for(const k of Object.keys(s6OscNodes)) s6StopNote(Number(k));
}

function s6BuildChart(idx){
  const song=S6_SONGS[idx];
  const fpb=song.fpb||S6_FPB;
  s6CurrentFPB=fpb;
  // テンポに合わせてヒット判定窓をスケール
  s6CurrentPerf=Math.max(8,  Math.round(S6_PERF*fpb/60));
  s6CurrentGood=Math.max(18, Math.round(S6_GOOD*fpb/60));
  const lastBeat=Math.max(...song.beats.map(([b])=>b));
  // 次ノートまでの間隔から保持時間を自動計算し holdEnd を付与
  s6Notes=song.beats.map(([beat,laneOrPair],idx)=>{
    const isChord=Array.isArray(laneOrPair);
    const lane=isChord?(laneOrPair[0]+laneOrPair[1])/2:laneOrPair;
    const laneA=isChord?laneOrPair[0]:-1;
    const laneB=isChord?laneOrPair[1]:-1;
    // コード音の周波数：隣接レーンの幾何平均（例：ら440×し494≒Bb466Hz）
    const freq=isChord?Math.sqrt(S6_FREQS[laneA]*S6_FREQS[laneB]):null;
    const later=song.beats.slice(idx+1).find(([b])=>b>beat);
    const durB=later ? Math.min(1.8,(later[0]-beat)*0.80) : 0.55;
    const ht=S6_LEAD+Math.round(beat*fpb);
    return { lane, laneA, laneB, isChord, freq, hitTime:ht, holdEnd:ht+Math.round(durB*fpb), state:'active' };
  });
  // ベースチャート (dur_beats→秒換算)
  s6BassChart=(song.bass||[]).map(([beat,freq,durB=3.5])=>({
    t:S6_LEAD+Math.round(beat*fpb), freq, dur:durB*fpb/60, played:false
  }));
  // ドラムチャート
  s6DrumChart=[];
  const dr=song.drums||{};
  (dr.kick||[]).forEach(b=>s6DrumChart.push({t:S6_LEAD+Math.round(b*fpb),type:'kick',played:false}));
  (dr.snare||[]).forEach(b=>s6DrumChart.push({t:S6_LEAD+Math.round(b*fpb),type:'snare',played:false}));
  (dr.hat||[]).forEach(b=>s6DrumChart.push({t:S6_LEAD+Math.round(b*fpb),type:'hat',played:false}));
  // コードパッドチャート
  s6ChordChart=[];
  (song.chord||[]).forEach(([beat,freqs,durB=4.0])=>{
    s6ChordChart.push({t:S6_LEAD+Math.round(beat*fpb), freqs, dur:durB*fpb/60, played:false});
  });
  s6SongEnd=S6_LEAD+Math.round(lastBeat*fpb)+260;
}

function initStage6(){
  s6StopAllNotes();
  paused=false; pauseMenuIdx=0;
  s6Timer=0; s6Score=0; s6Combo=0; s6MaxCombo=0;
  s6Flash=new Array(8).fill(0); s6MissFlash=new Array(8).fill(0);
  s6Judges=[]; s6Cleared=false; s6WalkT=0;
  s6Perfect=0; s6GoodCnt=0; s6Miss=0;
  s6SelectAnim=0; goalReached=false;
  s6StartSong=0; s6SongClearTimer=0;
  state='song_select';
  document.getElementById('hint').textContent=
    '← → で曲を選ぶ | Enter / Space でスタート | Z X C V B N M , = ど れ み ふぁ そ ら し ど↑';
}

function updateStage6(){
  // 曲選択画面
  if(state==='song_select'){
    s6SelectAnim++;
    if(just['ArrowLeft']||just['KeyA'])  s6SongIdx=(s6SongIdx+5)%6;
    if(just['ArrowRight']||just['KeyD']) s6SongIdx=(s6SongIdx+1)%6;
    if(just['ArrowUp']||just['KeyW'])    s6SongIdx=s6SongIdx>=3?s6SongIdx-3:s6SongIdx+3;
    if(just['ArrowDown']||just['KeyS'])  s6SongIdx=s6SongIdx>=3?s6SongIdx-3:s6SongIdx+3;
    if(just['Space']||just['Enter']){
      s6StartSong=s6SongIdx;
      s6BuildChart(s6SongIdx);
      state='play';
    }
    return;
  }

  // ── 曲クリア中間画面 ──
  if(state==='song_clear'){
    s6SongClearTimer++;
    if(s6SongClearTimer>180||(just['Space']||just['Enter'])){
      // 次の曲へ
      s6SongIdx++;
      s6StopAllNotes();
      s6Timer=0; s6Score=0; s6Combo=0; s6MaxCombo=0;
      s6Flash=new Array(8).fill(0); s6MissFlash=new Array(8).fill(0);
      s6Judges=[]; s6Cleared=false; s6WalkT=0;
      s6Perfect=0; s6GoodCnt=0; s6Miss=0;
      s6BuildChart(s6SongIdx);
      state='play';
    }
    return;
  }

  if(s6Cleared) return;
  s6Timer++;
  s6WalkT+=0.07;
  for(let i=0;i<8;i++){
    if(s6Flash[i]>0)     s6Flash[i]--;
    if(s6MissFlash[i]>0) s6MissFlash[i]--;
  }
  for(let i=s6Judges.length-1;i>=0;i--){
    const j=s6Judges[i]; j.y-=1.0; j.life--;
    if(j.life<=0) s6Judges.splice(i,1);
  }

  // 自動メロディ：ヒットタイムに必ず演奏（早押しで state='hit' でも鳴らす）
  for(const n of s6Notes){
    if(n.hitTime===s6Timer){
      melodyNote(n.isChord ? n.freq : S6_FREQS[n.lane], 0.72, 0.16);
    }
  }

  // ベース自動演奏
  for(const b of s6BassChart){
    if(!b.played && s6Timer===b.t){ b.played=true; sfxBass(b.freq, b.dur); }
  }
  // ドラム自動演奏
  for(const d of s6DrumChart){
    if(!d.played && s6Timer===d.t){
      d.played=true;
      if(d.type==='kick') sfxKick();
      else if(d.type==='snare') sfxSnare();
      else sfxHihat();
    }
  }
  // コードパッド自動演奏
  for(const c of s6ChordChart){
    if(!c.played && s6Timer===c.t){ c.played=true; chordPad(c.freqs, c.dur, 0.042); }
  }

  // 自動ミス判定（GOOD窓を過ぎたら）
  for(const n of s6Notes){
    if(n.state!=='active') continue;
    if(s6Timer > n.hitTime+s6CurrentGood){
      n.state='miss';
      s6Combo=0; s6Miss++;
      if(n.isChord){ s6MissFlash[n.laneA]=14; s6MissFlash[n.laneB]=14; }
      else { s6MissFlash[n.lane]=14; }
      const lx=S6_X0+n.lane*S6_LANE_W+S6_LANE_W/2;
      s6Judges.push({text:'MISS',color:'#FF5555',x:lx,y:S6_HIT_Y-22,life:45});
    }
  }

  // キー入力判定
  // ── ① コード（同時押し）判定を先に処理 ──
  const s6ChordUsed=new Set();
  for(const n of s6Notes){
    if(!n.isChord||n.state!=='active') continue;
    const cA=S6_KEYS[n.laneA], cB=S6_KEYS[n.laneB];
    // 片方がjust、もう片方がkeys（押されている）= 同時押し判定
    const hit=(just[cA]&&keys[cB])||(just[cB]&&keys[cA]);
    if(!hit) continue;
    const d=Math.abs(s6Timer-n.hitTime);
    if(d>s6CurrentGood) continue;
    n.state='hit';
    s6ChordUsed.add(n.laneA); s6ChordUsed.add(n.laneB);
    s6Flash[n.laneA]=10; s6Flash[n.laneB]=10;
    s6Combo++; if(s6Combo>s6MaxCombo) s6MaxCombo=s6Combo;
    melodyNote(n.freq, 0.72, 0.16);
    const lx=S6_X0+n.lane*S6_LANE_W+S6_LANE_W/2;
    if(d<=s6CurrentPerf){
      s6Score+=300; s6Perfect++;
      s6Judges.push({text:'PERFECT!',color:'#FFD700',x:lx,y:S6_HIT_Y-44,life:55});
      spawnParticles(lx,S6_HIT_Y,'#CC44FF',12,'star');
    } else {
      s6Score+=100; s6GoodCnt++;
      s6Judges.push({text:'GOOD',color:'#44FF88',x:lx,y:S6_HIT_Y-44,life:44});
      spawnParticles(lx,S6_HIT_Y,'#CC44FF',6,'circle');
    }
    score=s6Score;
  }
  // ── ② 通常ノート判定 ──
  S6_KEYS.forEach((code,lane)=>{
    if(!just[code]) return;
    if(s6ChordUsed.has(lane)) return; // コードで使用済み
    s6Flash[lane]=10;
    let best=null, bestDist=Infinity;
    for(const n of s6Notes){
      if(n.state!=='active'||n.isChord||n.lane!==lane) continue;
      const d=Math.abs(s6Timer-n.hitTime);
      if(d<bestDist){ bestDist=d; best=n; }
    }
    if(best && bestDist<=s6CurrentGood){
      best.state='hit';
      s6Combo++; if(s6Combo>s6MaxCombo) s6MaxCombo=s6Combo;
      const lx=S6_X0+lane*S6_LANE_W+S6_LANE_W/2;
      if(bestDist<=s6CurrentPerf){
        s6Score+=300; s6Perfect++;
        s6Judges.push({text:'PERFECT!',color:'#FFD700',x:lx,y:S6_HIT_Y-44,life:55});
        spawnParticles(lx,S6_HIT_Y,S6_COL[lane],10,'star');
      } else {
        s6Score+=100; s6GoodCnt++;
        s6Judges.push({text:'GOOD',color:'#44FF88',x:lx,y:S6_HIT_Y-44,life:44});
        spawnParticles(lx,S6_HIT_Y,S6_COL[lane],5,'circle');
      }
      score=s6Score;
    }
  });
  updateFX();

  // 曲終了 → 合否判定
  if(s6Timer>=s6SongEnd){
    s6Cleared=true; goalReached=true;
    stopBGM(); s6StopAllNotes();
    if(s6Miss===0){
      if(s6SongIdx===5){
        // 最後の曲（No.6）クリア → ゲームクリア！
        state='win'; winTimer=0; winDance=0;
        sfxFanfare();
        setTimeout(()=>sfxWin6(), 600);
      } else {
        // 途中の曲クリア → 次の曲へ進む画面
        state='song_clear'; s6SongClearTimer=0;
        sfxFanfare();
      }
    } else {
      state='gameover'; gameoverTimer=0;
    }
  }
}

function drawS6SongSelect(){
  // 背景
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#04000e'); bg.addColorStop(0.6,'#0a0025'); bg.addColorStop(1,'#180040');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // 星
  for(let i=0;i<60;i++){
    const x=(i*137.5)%W, y=(i*91.3)%350;
    const sz=0.4+Math.abs(Math.sin(s6SelectAnim*0.04+i))*1.3;
    ctx.fillStyle=`rgba(255,255,255,${0.25+Math.abs(Math.sin(s6SelectAnim*0.025+i*0.8))*0.5})`;
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
  }

  // タイトル
  ctx.save();
  ctx.font='bold 25px Arial'; ctx.textAlign='center';
  ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=5;
  ctx.strokeText('♪ スタートする曲を選んでください ♪', W/2, 42);
  const tg=ctx.createLinearGradient(0,22,0,48);
  tg.addColorStop(0,'#FFD700'); tg.addColorStop(1,'#FF69B4');
  ctx.fillStyle=tg; ctx.fillText('♪ スタートする曲を選んでください ♪', W/2, 42);
  ctx.restore();

  // キャラがダンス
  const bop=Math.sin(s6SelectAnim*0.12)*7;
  ctx.save();
  ctx.translate(W/2, 120+bop);
  ctx.scale(1.15,1.15);
  const fn=charType==='pink'?drawPink:drawWhite;
  fn(0,0,1,s6SelectAnim*0.05,false,true,s6SelectAnim*0.05);
  ctx.restore();

  // 進行順ヒント（選択中の曲から6番まで）
  {
    const orderStr = s6SongIdx===5
      ? 'No.6 をクリアでゲームクリア！'
      : 'No.' + (s6SongIdx+1) + ' → ' + [...Array(5-s6SongIdx)].map((_,k)=>'No.'+(s6SongIdx+k+2)).join(' → ')
        + ' の順にクリア！';
    ctx.save(); ctx.font='bold 13px Arial'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,220,100,0.85)';
    ctx.fillText(orderStr, W/2, 200);
    ctx.restore();
  }

  // 2行 × 3列 パネル
  const pw=188, ph=96, pgap=13, rowGap=11;
  const totalPW=3*(pw+pgap)-pgap;
  const px0=W/2-totalPW/2;
  const rowY=[210, 210+ph+rowGap];

  for(let i=0;i<6;i++){
    const song=S6_SONGS[i];
    const col=i%3, row=Math.floor(i/3);
    const bx=px0+col*(pw+pgap);
    const by=rowY[row];
    const sel=(i===s6SongIdx);
    const pulse=sel?Math.sin(s6SelectAnim*0.11)*0.18+0.82:0.55;

    // パネル背景
    ctx.save();
    if(sel){
      const grd=ctx.createLinearGradient(bx,by,bx+pw,by+ph);
      grd.addColorStop(0,'rgba(255,105,180,0.38)');
      grd.addColorStop(1,'rgba(130,60,220,0.38)');
      ctx.fillStyle=grd;
      ctx.strokeStyle=`rgba(255,210,60,${pulse})`;
      ctx.lineWidth=2.5;
    } else {
      ctx.fillStyle='rgba(255,255,255,0.06)';
      ctx.strokeStyle='rgba(255,255,255,0.18)';
      ctx.lineWidth=1.2;
    }
    ctx.beginPath(); ctx.roundRect(bx,by,pw,ph,8); ctx.fill(); ctx.stroke();
    ctx.restore();

    // 曲番号
    ctx.save();
    ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillStyle=sel?'#FFD700':'rgba(255,255,255,0.45)';
    ctx.fillText(`No.${i+1}`, bx+pw/2, by+15);

    // 曲名（長ければ自動縮小）
    let nFs=sel?18:15;
    ctx.font=`bold ${nFs}px Arial`;
    if(ctx.measureText(song.name).width>pw-14){
      nFs=Math.floor(nFs*(pw-14)/ctx.measureText(song.name).width);
      ctx.font=`bold ${nFs}px Arial`;
    }
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=3;
    ctx.strokeText(song.name, bx+pw/2, by+37);
    ctx.fillStyle=sel?'#fff':'rgba(240,240,240,0.75)';
    ctx.fillText(song.name, bx+pw/2, by+37);

    // サブテキスト
    ctx.font='10px Arial';
    ctx.fillStyle=sel?'#FFD700':'rgba(190,190,190,0.6)';
    ctx.fillText(song.sub, bx+pw/2, by+54);

    // テンポ + ノート数
    const bpm=Math.round(60/(song.fpb/60));
    ctx.font='10px Arial';
    ctx.fillStyle='rgba(160,180,255,0.75)';
    ctx.fillText(`${bpm}BPM  ${song.beats.length}ノーツ`, bx+pw/2, by+69);

    // 難易度（星）
    const st=song.stars||1;
    const stStr='★'.repeat(st)+'☆'.repeat(3-st);
    ctx.font='13px Arial';
    ctx.fillStyle=sel?'#FFD700':'rgba(160,130,40,0.7)';
    ctx.fillText(stStr, bx+pw/2, by+86);
    ctx.restore();

    // 選択中カーソル（パネル下に▼）
    if(sel && row===0){
      const arr=Math.sin(s6SelectAnim*0.15)*3;
      ctx.save();
      ctx.fillStyle='rgba(255,220,60,0.9)';
      ctx.font='16px Arial'; ctx.textAlign='center';
      ctx.fillText('▼', bx+pw/2, by+ph+9+arr);
      ctx.restore();
    }
  }

  // 左右矢印
  const arrowY=rowY[0]+ph+rowGap/2;
  const la=Math.sin(s6SelectAnim*0.1)*3;
  ctx.save();
  ctx.font='bold 28px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillText('◀', px0-24+la, arrowY+10);
  ctx.fillText('▶', px0+totalPW+24-la, arrowY+10);
  ctx.restore();

  // 操作説明
  ctx.save();
  ctx.font='12px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,200,200,0.70)';
  ctx.fillText(isTouchDevice?'曲パネルをタップしてスタート！':'← →  で曲を選ぶ  ｜  ↑ ↓  で行を切り替え  ｜  Enter / Space でスタート', W/2, H-14);
  ctx.restore();
}

function drawS6SongClear(){
  // 背景（暗めのライブステージ）
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#04000e'); bg.addColorStop(0.6,'#0a0025'); bg.addColorStop(1,'#180040');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 星
  for(let i=0;i<60;i++){
    const x=(i*137.5)%W, y=(i*91.3)%350;
    const sz=0.4+Math.abs(Math.sin(s6SongClearTimer*0.04+i))*1.3;
    ctx.fillStyle=`rgba(255,255,255,${0.25+Math.abs(Math.sin(s6SongClearTimer*0.03+i*0.8))*0.5})`;
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
  }
  // キャラ
  const bop=Math.sin(s6SongClearTimer*0.14)*8;
  ctx.save(); ctx.translate(W/2, 160+bop); ctx.scale(1.2,1.2);
  const fn=charType==='pink'?drawPink:drawWhite;
  fn(0,0,1,s6SongClearTimer*0.07,false,true,s6SongClearTimer*0.07);
  ctx.restore();
  // CLEAR！テキスト
  const sc=1+Math.sin(s6SongClearTimer*0.08)*0.04;
  ctx.save(); ctx.translate(W/2,220); ctx.scale(sc,sc);
  ctx.font='bold 46px Arial'; ctx.textAlign='center';
  ctx.strokeStyle='#9900cc'; ctx.lineWidth=7; ctx.strokeText('CLEAR！',0,0);
  const tg=ctx.createLinearGradient(-100,-30,100,10);
  tg.addColorStop(0,'#FFD700'); tg.addColorStop(0.5,'#FF69B4'); tg.addColorStop(1,'#FFD700');
  ctx.fillStyle=tg; ctx.fillText('CLEAR！',0,0);
  ctx.restore();
  // クリアした曲名
  const doneSong=S6_SONGS[s6SongIdx];
  ctx.save(); ctx.font='bold 20px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,180,0.9)';
  ctx.fillText(`♪  ${doneSong.name}  ♪`, W/2, 260);
  ctx.restore();
  // スコア
  ctx.save(); ctx.font='18px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(200,220,255,0.85)';
  ctx.fillText(`スコア: ${s6Score}　PERFECT: ${s6Perfect}　MISS: ${s6Miss}`, W/2, 290);
  ctx.restore();
  // 次の曲
  const nextSong=S6_SONGS[s6SongIdx+1];
  ctx.save();
  ctx.font='bold 16px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,200,100,0.9)';
  ctx.fillText(`次の曲 → No.${s6SongIdx+2}  「${nextSong.name}」`, W/2, 335);
  ctx.restore();
  // プロンプト（点滅）
  if(s6SongClearTimer>60){
    const pl=Math.sin(s6SongClearTimer*0.12)>0;
    ctx.save(); ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillStyle=pl?'#FFD700':'#FF69B4';
    ctx.fillText(isTouchDevice?'タップして次の曲へ！':'Space / Enter で次の曲へ！', W/2, 375);
    ctx.restore();
  }
  // 残り曲数バー（どこまで来たか）
  const totalSongs=6-s6StartSong;
  const doneCount=s6SongIdx-s6StartSong+1;
  const barW=300, barH=12, barX=W/2-barW/2, barY=H-40;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,6); ctx.fill();
  const prog=doneCount/totalSongs;
  const grd=ctx.createLinearGradient(barX,barY,barX+barW,barY);
  grd.addColorStop(0,'#FF69B4'); grd.addColorStop(1,'#FFD700');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.roundRect(barX,barY,barW*prog,barH,6); ctx.fill();
  ctx.font='11px Arial'; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(`${doneCount} / ${totalSongs} 曲クリア`, W/2, barY-4);
  ctx.restore();
}

// ── グランドピアノシーン（横向きに座るキャラ＋ピアノ）──────────
function drawS6CharScene(){
  const t   = s6Timer;
  // ピアノ前面のX（鍵盤が手前に来る側）
  const pfX = W/2 - 8;   // 400-8=392
  const pdep = 132;       // ピアノの奥行き（左方向）
  const keyY = 228;       // 鍵盤面のY
  const bodyH = 52;       // 本体高さ

  // ── ピアノ（横から見た形） ───────────────────────────
  // 蓋（上に開いた状態：奥側へ傾く台形）
  ctx.save();
  const lidG=ctx.createLinearGradient(pfX-pdep-20,keyY-58,pfX+4,keyY);
  lidG.addColorStop(0,'#0a0a0a'); lidG.addColorStop(0.6,'#1c1c1c'); lidG.addColorStop(1,'#111');
  ctx.fillStyle=lidG;
  ctx.beginPath();
  ctx.moveTo(pfX-pdep-6, keyY-2);
  ctx.lineTo(pfX+4,       keyY-2);
  ctx.lineTo(pfX-14,      keyY-58);  // 右後上
  ctx.lineTo(pfX-pdep-28, keyY-58);  // 左後上
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.restore();

  // 本体（鍵盤の下の黒い箱）
  ctx.save();
  const bg=ctx.createLinearGradient(pfX-pdep,keyY,pfX-pdep,keyY+bodyH);
  bg.addColorStop(0,'#1a1a1a'); bg.addColorStop(1,'#030303');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.roundRect(pfX-pdep-8,keyY,pdep+12,bodyH,[0,0,8,8]); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  // 鍵盤（前面にわずかに見える白い帯）
  ctx.save();
  ctx.fillStyle='#eeeedc';
  ctx.beginPath(); ctx.roundRect(pfX-7,keyY,9,24,[0,3,3,0]); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  [3,9,16].forEach(dy=>{ // 黒鍵が少し見える
    ctx.beginPath(); ctx.roundRect(pfX-6,keyY+dy,6,4,1); ctx.fill();
  });
  ctx.restore();

  // 脚（2本）
  ctx.fillStyle='#060606';
  ctx.beginPath(); ctx.roundRect(pfX-pdep+2,keyY+bodyH,9,22,[0,0,3,3]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(pfX-18,    keyY+bodyH,9,22,[0,0,3,3]); ctx.fill();

  // ベンチ（キャラの右側）
  const bx=pfX+8, bw=84;
  ctx.save();
  ctx.fillStyle='#2c1600';
  ctx.beginPath(); ctx.roundRect(bx,keyY+bodyH-6,bw,12,4); ctx.fill();
  ctx.fillStyle='#180c00';
  [[bx+14,18],[bx+bw-23,18]].forEach(([lx,lh])=>{
    ctx.beginPath(); ctx.roundRect(lx,keyY+bodyH+6,8,lh,[0,0,3,3]); ctx.fill();
  });
  ctx.restore();

  // ── キャラクター（横向き・左向き・ベンチに座る姿勢） ─────
  const sc = 1.3;
  const charCX = pfX + 50;           // ベンチのほぼ中心
  const charCY = keyY - 18;          // 鍵盤面より少し上
  const charBop = Math.sin(t*0.10)*2; // ごく控えめな揺れ

  // キャラ本体（左向き・腕はステージ1と同じ通常描画）
  ctx.save();
  ctx.translate(charCX, charCY+charBop);
  ctx.scale(sc,sc);
  const fn=charType==='pink'?drawPink:drawWhite;
  fn(0,0,-1,0,false,false,0); // facing=-1（左向き）、腕は通常通り
  ctx.restore();
}

function drawStage6(){
  // 曲選択画面
  if(state==='song_select'){ drawS6SongSelect(); return; }
  // 曲クリア中間画面
  if(state==='song_clear'){ drawS6SongClear(); return; }

  // 背景：ライブステージ
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#04000e'); bg.addColorStop(0.7,'#0a0025'); bg.addColorStop(1,'#120030');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // 星
  for(let i=0;i<50;i++){
    const x=(i*137.5)%W, y=(i*91.3)%300;
    const sz=0.4+Math.abs(Math.sin(s6Timer*0.04+i))*1.2;
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.abs(Math.sin(s6Timer*0.03+i*0.7))*0.5})`;
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
  }

  // スポットライト（ゆっくり揺れる）
  const spotCols=[
    'rgba(255,105,180,0.07)','rgba(255,215,0,0.07)',
    'rgba(135,206,235,0.07)','rgba(152,251,152,0.07)','rgba(221,160,221,0.07)'
  ];
  for(let l=0;l<5;l++){
    const lx=W/2+(Math.sin(s6Timer*0.012+l*1.2))*280;
    const cg=ctx.createLinearGradient(lx,0,lx,H);
    cg.addColorStop(0,spotCols[l]); cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx-80,H); ctx.lineTo(lx+80,H); ctx.closePath();
    ctx.fill();
  }

  // グランドピアノシーン（キャラ＋ミニ鍵盤、ノートより奥）
  drawS6CharScene();

  // レーン背景
  for(let l=0;l<8;l++){
    const lx=S6_X0+l*S6_LANE_W;
    ctx.fillStyle=l%2===0?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.02)';
    ctx.fillRect(lx,0,S6_LANE_W,S6_HIT_Y+10);
    ctx.fillStyle=S6_COL[l]; ctx.globalAlpha=0.3;
    ctx.fillRect(lx,0,2,S6_HIT_Y); ctx.fillRect(lx+S6_LANE_W-2,0,2,S6_HIT_Y);
    ctx.globalAlpha=1;
  }

  // ヒットライン（ピアノ鍵盤で視覚的に代替するため非表示）

  // ノート描画（テール付き・押下後もテールが消えずに残る）
  for(const n of s6Notes){
    if(n.state==='miss') continue;
    const lx=S6_X0+n.lane*S6_LANE_W+S6_LANE_W/2;
    const headY=S6_HIT_Y-(n.hitTime-s6Timer)*S6_SPEED;
    const tailTopY=S6_HIT_Y-(n.holdEnd-s6Timer)*S6_SPEED;
    const hasTail=(n.holdEnd > n.hitTime+6);
    const bw=24;

    // テール描画ヘルパー
    const drawTail=(ty0, by0, alpha, pulse)=>{
      const ty=Math.max(-12, ty0), by=Math.min(by0, S6_HIT_Y);
      if(by <= ty) return;
      ctx.save();
      ctx.globalAlpha=alpha*(pulse??1);
      ctx.fillStyle=S6_COL[n.lane];
      ctx.beginPath(); ctx.roundRect(lx-bw/2, ty, bw, by-ty, 7); ctx.fill();
      const grad=ctx.createLinearGradient(lx-bw/2,0,lx+bw/2,0);
      grad.addColorStop(0,'rgba(255,255,255,0.24)');
      grad.addColorStop(0.5,'rgba(255,255,255,0.07)');
      grad.addColorStop(1,'rgba(255,255,255,0.20)');
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.roundRect(lx-bw/2, ty, bw, by-ty, 7); ctx.fill();
      ctx.globalAlpha=1;
      // 上端キャップ（「ここで離す」マーカー）
      if(ty0 > -12 && ty0 < by0-8){
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.beginPath(); ctx.arc(lx, ty0, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle=S6_COL[n.lane];
        ctx.beginPath(); ctx.arc(lx, ty0, 3, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    };

    if(n.state==='hit'){
      // ── 押下後：テールが判定ラインを通過するまで残す（明滅でHOLD中を示す）
      if(!hasTail || tailTopY >= S6_HIT_Y) continue;
      const pulse=0.55+Math.sin(s6Timer*0.28)*0.18;
      drawTail(tailTopY, S6_HIT_Y, 0.72, pulse);
      continue;
    }

    // ── アクティブノート（未押下）
    if(headY < -55 || headY > S6_HIT_Y+s6CurrentGood*S6_SPEED+8) continue;

    if(hasTail) drawTail(tailTopY, headY, 0.62, null);

    const proximity=Math.max(0, 1-(S6_HIT_Y-headY)/S6_HIT_Y);
    ctx.save();
    if(n.isChord){
      // ── コードノート：2レーンにまたがる幅広ノートヘッド ──
      const lxA=S6_X0+n.laneA*S6_LANE_W+S6_LANE_W/2;
      const lxB=S6_X0+n.laneB*S6_LANE_W+S6_LANE_W/2;
      const ew=(lxB-lxA)*0.65; // 半径（横）
      ctx.shadowColor='#CC44FF'; ctx.shadowBlur=8+proximity*16;
      // グラデーション
      const cg=ctx.createLinearGradient(lxA,0,lxB,0);
      cg.addColorStop(0,S6_COL[n.laneA]); cg.addColorStop(1,S6_COL[n.laneB]);
      ctx.fillStyle=cg;
      ctx.beginPath(); ctx.ellipse(lx,headY,ew,15,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.ellipse(lx-ew*0.25,headY-4,ew*0.3,5,0,0,Math.PI*2); ctx.fill();
      // ♭マーク
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.font='bold 15px serif'; ctx.textAlign='center';
      ctx.fillText('♭',lx,headY+5);
    } else {
      // ── 通常ノートヘッド（円）──
      ctx.shadowColor=S6_COL[n.lane]; ctx.shadowBlur=6+proximity*12;
      ctx.fillStyle=S6_COL[n.lane];
      ctx.beginPath(); ctx.arc(lx,headY,16,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.beginPath(); ctx.arc(lx-4,headY-4,6,0,Math.PI*2); ctx.fill();
      if(!hasTail){
        ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
        ctx.fillText('♪',lx,headY+5);
      }
    }
    ctx.restore(); // ← save() に対応する restore（shadowBlur等をリセット）
  }

  // ── ピアノ鍵盤 ─────────────────────────────────────────
  {
    const pkY=S6_HIT_Y, pkH=48, bkH=28, bkW=22;
    // ピアノフレーム（木製ケース）
    ctx.save();
    const pf=ctx.createLinearGradient(0,pkY-6,0,pkY+pkH+8);
    pf.addColorStop(0,'#4a2800'); pf.addColorStop(1,'#1c0e00');
    ctx.fillStyle=pf;
    ctx.beginPath(); ctx.roundRect(S6_X0-8,pkY-6,8*S6_LANE_W+16,pkH+14,6); ctx.fill();
    ctx.restore();
    // 白鍵（8本）
    for(let l=0;l<8;l++){
      const kx=S6_X0+l*S6_LANE_W+2, kw=S6_LANE_W-4;
      const lx=S6_X0+l*S6_LANE_W+S6_LANE_W/2;
      const fl=s6Flash[l], mfl=s6MissFlash[l], down=fl>0?3:0;
      ctx.save();
      if(fl>0){ctx.shadowColor=S6_COL[l];ctx.shadowBlur=24;}
      else if(mfl>0){ctx.shadowColor='#FF3333';ctx.shadowBlur=16;}
      const kg=ctx.createLinearGradient(kx,pkY,kx,pkY+pkH);
      if(fl>0){
        kg.addColorStop(0,'#fffce0');kg.addColorStop(0.6,'#ffe040');kg.addColorStop(1,'#ffb800');
      }else if(mfl>0){
        kg.addColorStop(0,'#ffe0e0');kg.addColorStop(1,'#ff8888');
      }else{
        kg.addColorStop(0,'#fafaf0');kg.addColorStop(0.7,'#e8e8d8');kg.addColorStop(1,'#c8c8b0');
      }
      ctx.fillStyle=kg;
      ctx.beginPath(); ctx.roundRect(kx,pkY,kw,pkH+down,[0,0,8,8]); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(kx+kw-1,pkY+12); ctx.lineTo(kx+kw-1,pkY+pkH-8); ctx.stroke();
      ctx.shadowBlur=0;
      // 音名
      ctx.fillStyle=fl>0?'#7a3800':mfl>0?'#aa0000':'rgba(0,0,0,0.45)';
      ctx.font=`bold ${fl>0?13:11}px Arial`; ctx.textAlign='center';
      ctx.fillText(S6_LABELS[l],lx,pkY+pkH-5+down);
      ctx.restore();
    }
    // 黒鍵（C#, D#, F#, G#, Bb）
    [[0,1],[1,2],[3,4],[4,5],[5,6]].forEach(([la])=>{
      const bx=S6_X0+la*S6_LANE_W+S6_LANE_W-bkW/2;
      const fl=(la===5)?(s6Flash[5]>0&&s6Flash[6]>0?1:0):0;
      const down=fl?2:0;
      ctx.save();
      if(fl){ctx.shadowColor='#CC44FF';ctx.shadowBlur=16;}
      const bkg=ctx.createLinearGradient(bx,pkY,bx,pkY+bkH);
      bkg.addColorStop(0,fl?'#778':'#333');bkg.addColorStop(1,fl?'#335':'#0a0a0a');
      ctx.fillStyle=bkg;
      ctx.beginPath(); ctx.roundRect(bx,pkY,bkW,bkH+down,[0,0,5,5]); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();
    });
    // キー文字 + ゲームパッドアイコン（鍵盤の下）
    for(let l=0;l<8;l++){
      const lx=S6_X0+l*S6_LANE_W+S6_LANE_W/2;
      ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.font='11px Arial'; ctx.textAlign='center';
      ctx.fillText(S6_KCHAR[l],lx,pkY+pkH+15);
      ctx.save();
      const gpY=pkY+pkH+30;
      if(l<4){
        const arrows=['←','↓','↑','→'];
        ctx.fillStyle='rgba(160,210,255,0.22)';
        ctx.beginPath(); ctx.roundRect(lx-13,gpY-13,26,22,5); ctx.fill();
        ctx.strokeStyle='rgba(160,210,255,0.55)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.roundRect(lx-13,gpY-13,26,22,5); ctx.stroke();
        ctx.fillStyle='rgba(180,230,255,0.90)'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
        ctx.fillText(arrows[l],lx,gpY+3);
      }else{
        const btnColors=['#BB8800','#CC2020','#207730','#1844BB'];
        const btnLabels=['Y','B','A','X'];
        ctx.fillStyle=btnColors[l-4];
        ctx.beginPath(); ctx.arc(lx,gpY-2,12,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(lx,gpY-2,12,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
        ctx.fillText(btnLabels[l-4],lx,gpY+2);
      }
      ctx.restore();
    }
    ctx.save(); ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.font='13px Arial'; ctx.textAlign='right';
    ctx.fillText('🎮',S6_X0-5,pkY+pkH+46); ctx.restore();
  }

  // 判定テキスト
  s6Judges.forEach(j=>{
    ctx.save();
    ctx.globalAlpha=Math.min(1,j.life/15);
    ctx.font='bold 20px Arial'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=4;
    ctx.strokeText(j.text,j.x,j.y);
    ctx.fillStyle=j.color; ctx.fillText(j.text,j.x,j.y);
    ctx.restore();
  });

  drawFX();

  // HUD: スコア
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(8,8,170,68,8); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText('SCORE',16,26);
  ctx.fillStyle='#fff'; ctx.font='bold 24px Arial';
  ctx.fillText(s6Score.toLocaleString(),16,52);
  ctx.restore();

  // コンボ
  if(s6Combo>=2){
    const csize=Math.min(34,14+s6Combo*0.4);
    ctx.save();
    ctx.font=`bold ${csize}px Arial`; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.lineWidth=5;
    ctx.strokeText(`${s6Combo} COMBO!`,W/2,38);
    ctx.fillStyle='#FFD700'; ctx.fillText(`${s6Combo} COMBO!`,W/2,38);
    ctx.restore();
  }

  // 進行バー
  const prog=Math.min(1,s6Timer/s6SongEnd);
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(0,H-6,W,6);
  const barG=ctx.createLinearGradient(0,0,W,0);
  barG.addColorStop(0,'#FF69B4'); barG.addColorStop(0.5,'#FFD700'); barG.addColorStop(1,'#87CEEB');
  ctx.fillStyle=barG; ctx.fillRect(0,H-6,W*prog,6);

  // 残り判定統計（右上）
  const total=s6Perfect+s6GoodCnt+s6Miss;
  if(total>0){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W-120,8,112,68,8); ctx.fill();
    ctx.textAlign='right'; ctx.font='11px Arial';
    ctx.fillStyle='#FFD700'; ctx.fillText(`PERFECT: ${s6Perfect}`,W-12,26);
    ctx.fillStyle='#44FF88'; ctx.fillText(`GOOD:    ${s6GoodCnt}`,W-12,42);
    ctx.fillStyle='#FF6666'; ctx.fillText(`MISS:    ${s6Miss}`,W-12,58);
    ctx.restore();
  }

  drawTouchControlsS6();
}

//  DRAWING HELPERS
// ════════════════════════════════════════════
function drawStar(cx,cy,r,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2;
    const rad=i%2===0?r:r*0.42;
    if(i===0) ctx.moveTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
    else ctx.lineTo(cx+rad*Math.cos(a),cy+rad*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawNote(cx,cy,sz,color){
  ctx.fillStyle=color; ctx.strokeStyle=color;
  ctx.beginPath();
  ctx.ellipse(cx,cy,sz*0.75,sz*0.55,-0.4,0,Math.PI*2);
  ctx.fill();
  ctx.lineWidth=sz*0.22;
  ctx.beginPath();
  ctx.moveTo(cx+sz*0.6,cy); ctx.lineTo(cx+sz*0.6,cy-sz*2);
  ctx.stroke();
  ctx.lineWidth=sz*0.18;
  ctx.beginPath();
  ctx.moveTo(cx+sz*0.6,cy-sz*2);
  ctx.quadraticCurveTo(cx+sz*1.5,cy-sz*1.5,cx+sz*0.6,cy-sz*0.9);
  ctx.stroke();
}

// ── Pink rabbit ───────────────────────────
function drawPink(cx,cy,facing,wt,jumping,dancing,dt,kick=0,hideArms=false){
  ctx.save();
  ctx.translate(cx,cy);
  if(facing<0) ctx.scale(-1,1);
  if(dancing) ctx.rotate(Math.sin(dt*8)*0.12);
  const ks = kick>0 ? Math.sin(kick*Math.PI*0.5) : 0; // kick swing (1→0 ease-out)
  if(ks>0) ctx.rotate(-0.18*ks); // 体ごと前傾き

  const bob = jumping?-5:Math.sin(wt*10)*1.8;
  const lp  = jumping?0:wt;

  // コスチューム色
  const pCC=[
    {leg:'#FF69B4',body:'#FFB6C1',d1:'#FF69B4',d2:'#FF1493'},  // デフォルト
    {leg:'#8E44AD',body:'#D7BDE2',d1:'#9B59B6',d2:'#6C3483'},  // 魔法少女
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},   // 戦士
  ][costumeType]||{leg:'#FF69B4',body:'#FFB6C1',d1:'#FF69B4',d2:'#FF1493'};

  // ── Legs
  ctx.fillStyle=pCC.leg;
  [[-9,1],[9,-1]].forEach(([dx,sign],i)=>{
    const isFront = i===1;
    const rise = isFront ? -ks*10 : ks*3;
    const legAng = ks>0
      ? (isFront ? -Math.PI*0.55*ks : Math.PI*0.2*ks)
      : (jumping?sign*0.35:Math.sin(lp*10+i*Math.PI)*0.32);
    ctx.save();
    ctx.translate(dx,18+bob+rise);
    ctx.rotate(legAng);
    ctx.beginPath(); ctx.ellipse(0,7,5,11,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── Body
  ctx.fillStyle=pCC.body;
  ctx.beginPath(); ctx.ellipse(0,4+bob,15,19,0,0,Math.PI*2); ctx.fill();

  // ── Idol dress
  ctx.fillStyle=pCC.d1;
  ctx.beginPath(); ctx.ellipse(0,10+bob,15,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pCC.d2;
  ctx.beginPath(); ctx.ellipse(0,17+bob,17,5,0,0,Math.PI*2); ctx.fill();

  // 戦士：鎧ベルト＋赤いマント
  if(costumeType===2){
    ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(0,9+bob,15,3,0,0,Math.PI*2); ctx.fill(); // ベルト
    ctx.fillStyle='rgba(180,0,0,0.7)';
    ctx.beginPath(); ctx.moveTo(-15,6+bob); ctx.lineTo(-20,22+bob); ctx.lineTo(-4,14+bob); ctx.closePath(); ctx.fill(); // マント
  }
  // 魔法少女：リボン
  if(costumeType===1){
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(0,8+bob,5,3,0,0,Math.PI*2); ctx.fill();
  }

  // ── Arms
  if(!hideArms){
    ctx.fillStyle='#FFB6C1';
    if(dancing){
      [[-15,0,-Math.PI/3],[15,0,Math.PI/3]].forEach(([tx,ty,base],i)=>{
        ctx.save();
        ctx.translate(tx,ty+bob);
        ctx.rotate(base+(i===0?1:-1)*Math.sin(dt*8)*0.3);
        ctx.beginPath(); ctx.ellipse(0,5,4,10,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    } else {
      [[-15,3,1],[15,3,-1]].forEach(([tx,ty,sign],i)=>{
        const isFront=i===1;
        const armAng = ks>0
          ? (isFront ? Math.PI*0.55*ks : -Math.PI*0.28*ks)
          : (jumping?sign*0.45:Math.sin(lp*10)*0.2*sign);
        ctx.save();
        ctx.translate(tx,ty+bob);
        ctx.rotate(armAng);
        ctx.beginPath(); ctx.ellipse(0,5,4,9,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
  } // end !hideArms

  // ── Upright ears
  [[-8,-0.18],[8,0.18]].forEach(([ex,tilt])=>{
    ctx.fillStyle='#FFB6C1';
    ctx.save();
    ctx.translate(ex,-20+bob);
    ctx.rotate(dancing?tilt*0.5+Math.sin(dt*8)*0.1:0);
    ctx.beginPath(); ctx.ellipse(0,-14,6,19,tilt,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF69B4';
    ctx.beginPath(); ctx.ellipse(0,-14,3,13,tilt,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── Head
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath(); ctx.arc(0,-17+bob,13,0,Math.PI*2); ctx.fill();

  // ── Eyes
  if(dancing){
    ctx.strokeStyle='#333'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-5,-16+bob,3,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(4,-16+bob,3,Math.PI,0); ctx.stroke();
    ctx.fillStyle='rgba(255,105,180,0.45)';
    ctx.beginPath(); ctx.arc(-8,-13+bob,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-13+bob,5,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(-5,-18+bob,2.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-18+bob,2.8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-4,-19+bob,1.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-19+bob,1.1,0,Math.PI*2); ctx.fill();
  }

  // ── Nose
  ctx.fillStyle='#FF69B4';
  ctx.beginPath(); ctx.arc(0,-15+bob,1.6,0,Math.PI*2); ctx.fill();

  // ── Mouth
  ctx.strokeStyle='#FF69B4'; ctx.lineWidth=1.3;
  ctx.beginPath();
  ctx.arc(0,(dancing?-12:-13)+bob,dancing?5:3,0.15,Math.PI-0.15);
  ctx.stroke();

  // ── Star hair clip / コスチューム別ヘアアクセ
  if(costumeType===0) drawStar(-10,-28+bob,5,'#FFD700');
  else if(costumeType===1){
    // 魔法少女：星の杖
    ctx.strokeStyle='#9B59B6'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(17,-5+bob); ctx.lineTo(26,-18+bob); ctx.stroke();
    drawStar(27,-22+bob,7,'#FFD700');
    // 魔法の星ヘア
    drawStar(-10,-28+bob,5,'#FFD700'); drawStar(10,-30+bob,4,'#E8D5FF');
  } else if(costumeType===2){
    // 戦士：ヘルメット＋剣
    ctx.fillStyle='#778899';
    ctx.beginPath(); ctx.ellipse(0,-23+bob,14,8,0,Math.PI,Math.PI*2); ctx.fill(); // ヘルメット
    ctx.fillStyle='#999';
    ctx.fillRect(-2,-34+bob,4,12); // 兜の飾り
    ctx.fillStyle='#CC2200';
    ctx.fillRect(-2,-38+bob,4,5); // 赤い羽根飾り
    // 剣（右腕の先）
    ctx.strokeStyle='#CCC'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(16,2+bob); ctx.lineTo(26,-12+bob); ctx.stroke();
    ctx.strokeStyle='#888'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(13,-2+bob); ctx.lineTo(19,2+bob); ctx.stroke(); // 鍔
  }

  ctx.restore();
}

// ── White lop rabbit ──────────────────────
function drawWhite(cx,cy,facing,wt,jumping,dancing,dt,kick=0,hideArms=false){
  ctx.save();
  ctx.translate(cx,cy);
  if(facing<0) ctx.scale(-1,1);
  if(dancing) ctx.rotate(Math.sin(dt*8)*0.12);
  const ks = kick>0 ? Math.sin(kick*Math.PI*0.5) : 0;
  if(ks>0) ctx.rotate(-0.18*ks);

  const bob = jumping?-5:Math.sin(wt*10)*1.8;
  const lp  = jumping?0:wt;

  // コスチューム色（うしゃい）
  const wCC=[
    {leg:'#ADD8E6',body:'#F5F5F5',d1:'#87CEEB',d2:'#4CA3D4'},  // デフォルト
    {leg:'#8E44AD',body:'#EDE0F5',d1:'#9B59B6',d2:'#6C3483'},  // 魔法少女
    {leg:'#3A3A4A',body:'#B8B8C8',d1:'#4A4A5A',d2:'#CC2200'},   // 戦士
  ][costumeType]||{leg:'#ADD8E6',body:'#F5F5F5',d1:'#87CEEB',d2:'#4CA3D4'};

  // ── Body

  // ── Idol dress (sky blue)
  ctx.fillStyle=wCC.d1;
  ctx.beginPath(); ctx.ellipse(0,10+bob,15,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=wCC.d2;
  ctx.beginPath(); ctx.ellipse(0,17+bob,17,5,0,0,Math.PI*2); ctx.fill();

  // 戦士：鎧ベルト＋赤いマント
  if(costumeType===2){
    ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(0,9+bob,15,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(180,0,0,0.7)';

  }
  // 魔法少女：リボン
  if(costumeType===1){
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(0,8+bob,5,3,0,0,Math.PI*2); ctx.fill();
  }

  // ── Arms
  if(!hideArms){
    ctx.fillStyle='#F5F5F5';
    if(dancing){
      [[-15,0,-Math.PI/3],[15,0,Math.PI/3]].forEach(([tx,ty,base],i)=>{
        ctx.save();
        ctx.translate(tx,ty+bob);
        ctx.rotate(base+(i===0?1:-1)*Math.sin(dt*8)*0.3);
        ctx.beginPath(); ctx.ellipse(0,5,4,10,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    } else {
      [[-15,3,1],[15,3,-1]].forEach(([tx,ty,sign],i)=>{
        const isFront=i===1;
        const armAng = ks>0
          ? (isFront ? Math.PI*0.55*ks : -Math.PI*0.28*ks)
          : (jumping?sign*0.45:Math.sin(lp*10)*0.2*sign);
        ctx.save();
        ctx.translate(tx,ty+bob);
        ctx.rotate(armAng);
        ctx.beginPath(); ctx.ellipse(0,5,4,9,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }
  } // end !hideArms

  // ── Lop ears (hang down)
  [[-11,-0.12],[11,0.12]].forEach(([ex,tilt],i)=>{
    const swing = dancing? tilt*0.5+Math.sin(dt*8)*(i===0?0.12:-0.12) : 0;
    ctx.save();
    ctx.translate(ex,-19+bob); ctx.rotate(swing);
    ctx.fillStyle='#F5F5F5';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(ex<0?-9:-9,3, ex<0?-14:14,15, ex<0?-8:8,32);
    ctx.bezierCurveTo(ex<0?-4:4,38, 0,32, 0,22);
    ctx.bezierCurveTo(0,12, 2,4, 0,0);
    ctx.fill();
    ctx.fillStyle='#FFB6C1';
    ctx.beginPath();
    ctx.moveTo(0,1);
    ctx.bezierCurveTo(ex<0?-5:-5,4, ex<0?-9:9,14, ex<0?-5:5,26);
    ctx.bezierCurveTo(ex<0?-2:2,30, 0,26, 0,18);
    ctx.bezierCurveTo(0,10, 1,5, 0,1);
    ctx.fill();
    ctx.restore();
  });

  // ── Head
  ctx.fillStyle='#F5F5F5';
  ctx.beginPath(); ctx.arc(0,-17+bob,13,0,Math.PI*2); ctx.fill();

  // ── Eyes (blue)
  if(dancing){
    ctx.strokeStyle='#1E90FF'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-5,-16+bob,3,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(4,-16+bob,3,Math.PI,0); ctx.stroke();
    ctx.fillStyle='rgba(135,206,235,0.4)';
    ctx.beginPath(); ctx.arc(-8,-13+bob,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-13+bob,5,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#1E90FF';
    ctx.beginPath(); ctx.arc(-5,-18+bob,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-18+bob,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(-5,-18+bob,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-18+bob,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-4,-19+bob,1.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-19+bob,1.1,0,Math.PI*2); ctx.fill();
  }

  // ── Nose
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath(); ctx.arc(0,-15+bob,1.6,0,Math.PI*2); ctx.fill();

  // ── Mouth
  ctx.strokeStyle='#87CEEB'; ctx.lineWidth=1.3;
  ctx.beginPath();
  ctx.arc(0,(dancing?-12:-13)+bob,dancing?5:3,0.15,Math.PI-0.15);
  ctx.stroke();

  // ── Flower hair clip / コスチューム別ヘアアクセ
  if(costumeType===0){
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(11,-27+bob,3.5,0,Math.PI*2); ctx.fill();
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2;
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(11+Math.cos(a)*5,-27+bob+Math.sin(a)*5,3,0,Math.PI*2); ctx.fill();
    }
  } else if(costumeType===1){
    // 魔法少女：星の杖
    ctx.strokeStyle='#9B59B6'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(17,-5+bob); ctx.lineTo(26,-18+bob); ctx.stroke();
    drawStar(27,-22+bob,7,'#FFD700');
    drawStar(11,-30+bob,5,'#E8D5FF'); drawStar(-11,-30+bob,4,'#FFD700');
  } else if(costumeType===2){
    // 戦士：ヘルメット＋剣
    ctx.fillStyle='#778899';
    ctx.beginPath(); ctx.ellipse(0,-23+bob,14,8,0,Math.PI,Math.PI*2); ctx.fill();
    ctx.fillStyle='#999'; ctx.fillRect(-2,-34+bob,4,12);
    ctx.fillStyle='#CC2200'; ctx.fillRect(-2,-38+bob,4,5);
    ctx.strokeStyle='#CCC'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(16,2+bob); ctx.lineTo(26,-12+bob); ctx.stroke();
    ctx.strokeStyle='#888'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(13,-2+bob); ctx.lineTo(19,2+bob); ctx.stroke();
  }

  ctx.restore();
}

function drawCharacter(cx,cy,facing,wt,jumping,dancing,dt,kick=0){

}

// ── 衣装部屋 ─────────────────────────────────
function drawCostumeRoom(){
  const t=selectAnim; // アニメ共用
  // 背景（豪華なドレッシングルーム）
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a0a2e'); bg.addColorStop(1,'#2d0a1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // 壁の電球装飾
  for(let i=0;i<10;i++){
    const bx=i*(W/9);
    const glow=0.5+Math.abs(Math.sin(t*2+i*0.7))*0.5;
    ctx.save(); ctx.globalAlpha=glow;
    ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(bx,18,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }

  // タイトル
  ctx.save();
  ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.strokeStyle='#9B59B6'; ctx.lineWidth=4;
  ctx.strokeText('👗 衣装部屋 👗',W/2,60);
  ctx.fillStyle='#FFD700'; ctx.fillText('👗 衣装部屋 👗',W/2,60);
  ctx.font='15px Arial'; ctx.fillStyle='#FFB6C1';
  ctx.fillText(isTouchDevice?'衣装をタップして選ぼう！':'← → で選択　Spaceで決定！',W/2,88);
  ctx.restore();

  const costumes=[
    {name:'アイドル衣装',sub:'デフォルト♪',type:0,col:'#FF69B4'},
    {name:'魔法少女コス',sub:'★マジカル★',type:1,col:'#9B59B6'},
    {name:'戦士コスチューム',sub:'⚔ 剣と盾！',type:2,col:'#778899'},
  ];
  const cw=180, ch=220, gap=30;
  const totalW=costumes.length*(cw+gap)-gap;
  const ox=W/2-totalW/2;

  costumes.forEach((cs,i)=>{
    const cx2=ox+i*(cw+gap)+cw/2;
    const cy2=160;
    const sel=costumeSelectIdx===i;

    ctx.save();
    if(sel){
      ctx.shadowColor=cs.col; ctx.shadowBlur=25;
      const scale=1+Math.sin(t*3)*0.03;
      ctx.translate(cx2,cy2+ch/2); ctx.scale(scale,scale); ctx.translate(-cx2,-(cy2+ch/2));
    }
    // パネル背景
    ctx.fillStyle=sel?`rgba(${cs.col==='#FF69B4'?'255,105,180':cs.col==='#9B59B6'?'155,89,182':'136,136,136'},0.22)`:'rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.roundRect(ox+i*(cw+gap),cy2,cw,ch,16); ctx.fill();
    ctx.strokeStyle=sel?cs.col:'#555'; ctx.lineWidth=sel?3:1.5;
    ctx.beginPath(); ctx.roundRect(ox+i*(cw+gap),cy2,cw,ch,16); ctx.stroke();
    ctx.shadowBlur=0;

    // キャラクタープレビュー（衣装付き）
    const prevCostume=costumeType;
    costumeType=cs.type;
    ctx.save();
    ctx.translate(cx2,cy2+155);
    ctx.scale(0.95,0.95);
    if(charType==='pink') drawPink(0,0,1,t,false,false,t);
    else drawWhite(0,0,1,t,false,false,t);
    ctx.restore();
    costumeType=prevCostume;

    // 衣装名
    ctx.fillStyle=sel?cs.col:'#ccc'; ctx.font=`bold ${sel?16:14}px Arial`; ctx.textAlign='center';
    ctx.shadowColor=sel?cs.col:'transparent'; ctx.shadowBlur=sel?8:0;
    ctx.fillText(cs.name,cx2,cy2+ch-28);
    ctx.fillStyle=sel?'#FFD700':'#999'; ctx.font='12px Arial'; ctx.shadowBlur=0;
    ctx.fillText(cs.sub,cx2,cy2+ch-12);
    if(sel){ ctx.fillStyle='#FFD700'; ctx.font='bold 13px Arial'; ctx.fillText('▼ これを選択 ▼',cx2,cy2+ch+20); }
    ctx.restore();
  });

  // 矢印ヒント
  ctx.fillStyle='#FFD700'; ctx.font='28px Arial'; ctx.textAlign='center';
  ctx.fillText('◄',ox-20,160+220/2+10);
  ctx.fillText('►',ox+totalW+20,160+220/2+10);

  // 戻るボタン（タッチ対応）
  ctx.save();
  ctx.fillStyle='rgba(255,100,160,0.25)';
  ctx.strokeStyle='rgba(255,150,200,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(W/2-70,H-60,140,36,18); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#FFB6C1'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText(isTouchDevice?'✕ 出る':'ESC で戻る',W/2,H-36);
  ctx.restore();
}

// ── Enemy ─────────────────────────────────
function drawEnemy(e){
  const sx=e.x-cam.x, sy=e.y;
  if(sx<-60||sx>W+60) return;
  ctx.save();
  ctx.translate(sx+e.w/2,sy+e.h*0.5);
  e.t+=0.05;
  if(e.type==='bug'){
    // Ladybug
    ctx.fillStyle='#CC2020';
    ctx.beginPath(); ctx.ellipse(0,2,13,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.ellipse(-4,0,3.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,0,3.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(0,-11,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-2,-12,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2,-12,1.5,0,Math.PI*2); ctx.fill();
    // Dividing line
    ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(0,10); ctx.stroke();
  } else {
    // Caterpillar
    for(let i=0;i<3;i++){
      ctx.fillStyle=i%2===0?'#44AA44':'#55BB55';
      ctx.beginPath();
      ctx.arc(-9+i*9,Math.sin(e.t*2+i)*2.5,8,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#55BB55';
    ctx.beginPath(); ctx.arc(16,0,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(18,-2,2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(19,-2.5,1,0,Math.PI*2); ctx.fill();
    // Antennae
    ctx.strokeStyle='#333'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(14,-8); ctx.lineTo(10,-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(18,-8); ctx.lineTo(22,-18); ctx.stroke();
  }
  ctx.restore();
}

// ── Background ────────────────────────────
function drawTree(tx,th,type,layer){
  const pf=[0.18,0.45,0.72][layer];
  const x = tx - cam.x*pf;
  if(x<-220||x>W+220) return;
  const al=[0.28,0.52,0.78][layer];
  const dark=layer===0;
  ctx.save(); ctx.globalAlpha=al;

  const tw=10+layer*4;
  ctx.fillStyle=dark?'#3a2010':'#5a3018';
  ctx.fillRect(x-tw/2,GROUND_TOP+42-th,tw,th);

  if(type===0){
    ctx.fillStyle=dark?'#1a4010':'#2a6018';
    ctx.beginPath(); ctx.arc(x,GROUND_TOP+42-th-28,38+layer*10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=dark?'#1e5012':'#369020';
    ctx.beginPath(); ctx.arc(x-12,GROUND_TOP+42-th-46,28+layer*7,0,Math.PI*2); ctx.fill();
  } else if(type===1){
    ctx.fillStyle=dark?'#194008':'#288018';
    ctx.beginPath();
    ctx.moveTo(x,GROUND_TOP+42-th-90-layer*15);
    ctx.lineTo(x-42-layer*10,GROUND_TOP+42-th);
    ctx.lineTo(x+42+layer*10,GROUND_TOP+42-th);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=dark?'#225010':'#369820';
    ctx.beginPath();
    ctx.moveTo(x,GROUND_TOP+42-th-115-layer*15);
    ctx.lineTo(x-32-layer*8,GROUND_TOP+42-th-35);
    ctx.lineTo(x+32+layer*8,GROUND_TOP+42-th-35);
    ctx.closePath(); ctx.fill();
  } else {
    // Mushroom tree (fantasy)
    ctx.fillStyle=dark?'#702020':'#c03030';
    ctx.beginPath(); ctx.arc(x,GROUND_TOP+42-th-18,32+layer*8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    [[-12,-8],[10,-14],[6,8],[-4,12],[14,2]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.arc(x+dx,GROUND_TOP+42-th-18+dy,5,0,Math.PI*2); ctx.fill();
    });
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawBackground(){
  if(currentStage===1&&cam.x>5000){ drawBG2(); return; }
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#5ab8e8'); sky.addColorStop(0.55,'#9adaef'); sky.addColorStop(1,'#c8f0c0');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Clouds
  const co=cam.x*0.08;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  [[120,52],[300,38],[480,68],[680,44],[860,60],[1050,36]].forEach(([cx,cy])=>{
    const x=((cx-co)%(W+220)+W+220)%(W+220)-110;
    ctx.beginPath();
    ctx.arc(x,cy,28,0,Math.PI*2);
    ctx.arc(x+22,cy-9,20,0,Math.PI*2);
    ctx.arc(x+42,cy,23,0,Math.PI*2);
    ctx.fill();
  });

  bgTrees.filter(o=>o.layer===0).forEach(o=>drawTree(o.x,o.h,o.type,0));
  bgTrees.filter(o=>o.layer===1).forEach(o=>drawTree(o.x,o.h*0.8,o.type,1));
  bgTrees.filter(o=>o.layer===2).forEach(o=>drawTree(o.x,o.h*0.65,o.type,2));
}

// ── ダンスホール背景 ──────────────────────
let bgTime = 0;
function drawBG2(){
  bgTime += 0.025;
  // ① 暗いグラデ背景
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0020'); bg.addColorStop(0.5,'#150040'); bg.addColorStop(1,'#1a0a30');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // ② ネオンサイン (奥)
  const neonX = ((1200 - cam.x * 0.12) % (W+400) + W+400) % (W+400) - 200;
  ctx.save();
  ctx.font='bold 38px Arial'; ctx.textAlign='center';
  ctx.shadowColor='#FF69B4'; ctx.shadowBlur=18;
  ctx.fillStyle=`rgba(255,105,180,${0.3+Math.abs(Math.sin(bgTime*1.5))*0.3})`;
  ctx.fillText('ダンスホールデビュー！', neonX, 80);
  ctx.shadowColor='#87CEEB'; ctx.shadowBlur=14;
  const neonX2 = ((2800 - cam.x * 0.12) % (W+400) + W+400) % (W+400) - 200;
  ctx.fillStyle=`rgba(135,206,235,${0.25+Math.abs(Math.sin(bgTime*1.2+1))*0.3})`;
  ctx.fillText('★ IDOL ★', neonX2, 80);
  ctx.shadowBlur=0; ctx.restore();

  // ③ ディスコボール
  const dbx = W/2 + Math.sin(bgTime*0.3)*40;
  const dby = 45;
  const dbr = 22;
  // ボール本体
  const dbg=ctx.createRadialGradient(dbx-6,dby-6,2,dbx,dby,dbr);
  dbg.addColorStop(0,'#fff'); dbg.addColorStop(0.4,'#ccc'); dbg.addColorStop(1,'#888');
  ctx.fillStyle=dbg; ctx.beginPath(); ctx.arc(dbx,dby,dbr,0,Math.PI*2); ctx.fill();
  // タイル格子
  ctx.strokeStyle='rgba(150,150,150,0.6)'; ctx.lineWidth=0.8;
  for(let i=0;i<8;i++){
    ctx.save(); ctx.translate(dbx,dby); ctx.rotate(i*Math.PI/4);
    ctx.beginPath(); ctx.moveTo(0,-dbr); ctx.lineTo(0,dbr); ctx.stroke();
    ctx.restore();
  }
  for(let i=0;i<5;i++){
    const ry=dby-dbr+i*(dbr*2/4);
    const hw=Math.sqrt(Math.max(0,dbr*dbr-(ry-dby)*(ry-dby)));
    ctx.beginPath(); ctx.moveTo(dbx-hw,ry); ctx.lineTo(dbx+hw,ry); ctx.stroke();
  }
  // 吊り紐
  ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(dbx,dby-dbr); ctx.lineTo(dbx,0); ctx.stroke();

  // ④ 光ビーム (ディスコボールから放射)
  const beamCols=['rgba(255,105,180,','rgba(255,215,0,','rgba(135,206,235,','rgba(255,100,50,','rgba(150,255,150,'];
  for(let i=0;i<10;i++){
    const a = i/10*Math.PI*2 + bgTime*0.8;
    const bx2=dbx+Math.cos(a)*500;
    const by2=dby+Math.sin(a)*500;
    const alpha=(0.04+Math.abs(Math.sin(bgTime+i))*0.05).toFixed(3);
    ctx.save();
    ctx.globalAlpha=1;
    const lg=ctx.createLinearGradient(dbx,dby,bx2,by2);
    lg.addColorStop(0,beamCols[i%5]+alpha+')');
    lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=14+Math.sin(bgTime+i)*4;
    ctx.beginPath(); ctx.moveTo(dbx,dby); ctx.lineTo(bx2,by2); ctx.stroke();
    ctx.restore();
  }

  // ⑤ 床パターン (市松模様、背景用)
  const tileW=60, tileH=30;
  const offX=(cam.x*0.5)%tileW;
  for(let tx=-tileW;tx<W+tileW;tx+=tileW){
    for(let ty=GROUND_TOP+6;ty<H;ty+=tileH){
      const col=Math.floor((tx+offX)/tileW+ty/tileH)%2;
      ctx.fillStyle=col?'rgba(80,0,120,0.35)':'rgba(0,40,100,0.35)';
      ctx.fillRect(tx-offX,ty,tileW,tileH);
    }
  }
}

// ── Platform ──────────────────────────────
function drawPlatform(p){
  const sx=p.x-cam.x;
  if(sx+p.w<-10||sx>W+10) return;
  if(p.t==='g'){
    const g=ctx.createLinearGradient(sx,p.y,sx,p.y+p.h);
    g.addColorStop(0,'#5D8A3C'); g.addColorStop(0.14,'#4A7A2C'); g.addColorStop(1,'#3a5520');
    ctx.fillStyle=g; ctx.fillRect(sx,p.y,p.w,p.h);
    ctx.fillStyle='#72A84A';
    for(let gx=sx+4;gx<sx+p.w-4;gx+=13){
      ctx.beginPath();
      ctx.moveTo(gx,p.y); ctx.lineTo(gx-5,p.y-9);
      ctx.lineTo(gx,p.y-5); ctx.lineTo(gx+5,p.y-9);
      ctx.lineTo(gx+10,p.y); ctx.fill();
    }
    // Flowers
    const fc=['#FF69B4','#FFD700','#FF6040','#AA66CC','#FF8C00'];
    for(let fx=sx+30;fx<sx+p.w-20;fx+=75){
      const ci=Math.floor((fx+100)/75)%fc.length;
      ctx.fillStyle=fc[ci];
      ctx.beginPath(); ctx.arc(fx,p.y-13,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FFD700';
      ctx.beginPath(); ctx.arc(fx,p.y-13,2,0,Math.PI*2); ctx.fill();
    }
  } else if(p.t==='p'){
    ctx.fillStyle='#7B5E1A';
    ctx.beginPath(); ctx.roundRect(sx,p.y,p.w,p.h,5); ctx.fill();
    ctx.strokeStyle='#5a4010'; ctx.lineWidth=1;
    for(let gx=sx+10;gx<sx+p.w-10;gx+=18){
      ctx.beginPath(); ctx.moveTo(gx,p.y+3); ctx.lineTo(gx,p.y+p.h-3); ctx.stroke();
    }
    ctx.fillStyle='#5D8A3C'; ctx.fillRect(sx,p.y,p.w,5);
    ctx.fillStyle='#4A7A2C';
    ctx.beginPath(); ctx.arc(sx+p.w/2,p.y,7,Math.PI,0); ctx.fill();
  } else if(p.t==='stage'){
    // Concert stage
    const g=ctx.createLinearGradient(sx,p.y,sx,p.y+p.h);
    g.addColorStop(0,'#FFD700'); g.addColorStop(0.5,'#FFA500'); g.addColorStop(1,'#FF6030');
    ctx.fillStyle=g; ctx.fillRect(sx,p.y,p.w,p.h);
    for(let i=0;i<5;i++) drawStar(sx+22+i*36,p.y+p.h*0.55,7,'rgba(255,255,255,0.9)');
    ctx.fillStyle='#FF1493'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillText('GOAL ★',sx+p.w/2,p.y-6);
  } else if(p.t==='dance'){
    // ダンスフロア (市松模様)
    const tileW=40;
    const danceCols=['#1a0040','#00004a','#2a0050','#001060','#180038'];
    const highlight=['#6600ff','#0044ff','#9900cc','#0077cc','#4400aa'];
    const t2=performance.now()/1000;
    for(let tx=sx;tx<sx+p.w;tx+=tileW){
      const ci=Math.floor((tx-sx)/tileW+p.y/40)%danceCols.length;
      const pulse=0.7+0.3*Math.abs(Math.sin(t2*2+(tx/40)));
      ctx.fillStyle=danceCols[ci]; ctx.fillRect(tx,p.y,Math.min(tileW,sx+p.w-tx),p.h);
      ctx.strokeStyle=highlight[ci]; ctx.lineWidth=1;
      ctx.globalAlpha=pulse*0.7;
      ctx.strokeRect(tx+1,p.y+1,Math.min(tileW,sx+p.w-tx)-2,p.h-2);
      ctx.globalAlpha=1;
    }
    // ネオン上縁
    const ng=ctx.createLinearGradient(sx,p.y,sx+p.w,p.y);
    ['#FF69B4','#87CEEB','#FFD700','#FF69B4'].forEach((c,i,a)=>ng.addColorStop(i/(a.length-1),c));
    ctx.fillStyle=ng; ctx.fillRect(sx,p.y,p.w,3);
  } else if(p.t==='neon'){
    // ネオンプラットフォーム
    const t3=performance.now()/1000;
    const neonIdx=Math.floor(p.x/130)%5;
    const neonPalette=[['#ff00aa','#220022'],['#00ccff','#002233'],['#ffdd00','#222200'],
                       ['#44ff44','#002200'],['#ff6600','#221100']];
    const [nc,nb]=neonPalette[neonIdx];
    ctx.fillStyle=nb;
    ctx.beginPath(); ctx.roundRect(sx,p.y,p.w,p.h,4); ctx.fill();
    ctx.shadowColor=nc; ctx.shadowBlur=10+Math.sin(t3*3+p.x*0.01)*4;
    ctx.strokeStyle=nc; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(sx,p.y,p.w,p.h,4); ctx.stroke();
    ctx.shadowBlur=0;
  }
}

// ── Items ─────────────────────────────────
function drawItems(){
  const t=performance.now()/1000;
  items.forEach(it=>{
    if(!it.on) return;
    const sx=it.x-cam.x;
    if(sx<-40||sx>W+40) return;
    if(it.k==='note'){
      const bob=Math.sin(t*3+it.t)*4;
      ctx.save(); ctx.translate(sx,it.y+bob);
      drawNote(0,0,8,'#FFD700');
      ctx.fillStyle='rgba(255,215,0,0.18)';
      ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else if(it.k==='star'){
      const bob=Math.sin(t*2+it.t)*3;
      ctx.save(); ctx.translate(sx,it.y+bob); ctx.rotate(t*2);
      drawStar(0,0,11,'#FFD700');
      ctx.restore();
    } else if(it.k==='goal'){
      // Flag pole
      ctx.fillStyle='#999';
      ctx.fillRect(sx-2,it.y,4,it.h);
      ctx.fillStyle='#FF69B4';
      ctx.beginPath();
      ctx.moveTo(sx+2,it.y); ctx.lineTo(sx+34,it.y+16); ctx.lineTo(sx+2,it.y+32);
      ctx.closePath(); ctx.fill();
      drawStar(sx,it.y-6,9,'#FFD700');
    } else if(it.k==='door'){
      // 隠し扉（衣装部屋）
      const glow=0.6+Math.sin(t*2)*0.4;
      ctx.save();
      ctx.fillStyle='#5C3A10';
      ctx.fillRect(sx,it.y,it.w,it.h);
      const dg=ctx.createLinearGradient(sx+4,it.y+4,sx+it.w-4,it.y+it.h-4);
      dg.addColorStop(0,'#9B59B6'); dg.addColorStop(1,'#FF69B4');
      ctx.fillStyle=dg;
      ctx.fillRect(sx+4,it.y+4,it.w-8,it.h-8);
      ctx.globalAlpha=glow*0.5;
      ctx.fillStyle='#FFD700';
      ctx.fillRect(sx+4,it.y+4,it.w-8,it.h-8);
      ctx.globalAlpha=1;
      ctx.fillStyle='#FFD700';
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(sx+it.w-10,it.y+it.h/2,4,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
      ctx.shadowColor='#9B59B6'; ctx.shadowBlur=6;
      ctx.fillText('👗',sx+it.w/2,it.y+it.h/2-4);
      ctx.font='8px Arial'; ctx.fillText('衣装',sx+it.w/2,it.y+it.h/2+10);
      ctx.shadowBlur=0;
      const pdx=Math.abs((P.x+P.w/2)-(it.x+cam.x+it.w/2));
      if(pdx<80){
        ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial';
        ctx.fillText('↑ で入る',sx+it.w/2,it.y-10);
      }
      ctx.restore();
    } else if(it.k==='hallgate'){
      // ダンスホール入り口
      ctx.save();
      const gw=it.w, gh=it.h, gy=it.y;
      // 建物外壁
      const bg2=ctx.createLinearGradient(sx,gy,sx,gy+gh);
      bg2.addColorStop(0,'#1a006a'); bg2.addColorStop(1,'#0a0030');
      ctx.fillStyle=bg2; ctx.fillRect(sx,gy,gw,gh);
      // ネオン枠
      ctx.strokeStyle='#FF69B4'; ctx.lineWidth=3;
      ctx.shadowColor='#FF69B4'; ctx.shadowBlur=12;
      ctx.strokeRect(sx+2,gy+2,gw-4,gh-4);
      ctx.shadowBlur=0;
      // アーチ型入り口
      const ax=sx+gw/2-40, aw=80, adh=110;
      const archY=gy+gh-adh;
      const archg=ctx.createLinearGradient(ax,archY,ax+aw,archY+adh);
      archg.addColorStop(0,'#0a0020'); archg.addColorStop(1,'#150040');
      ctx.fillStyle=archg;
      ctx.beginPath();
      ctx.moveTo(ax,gy+gh);
      ctx.lineTo(ax,archY+40);
      ctx.arc(ax+aw/2,archY+40,aw/2,Math.PI,0);
      ctx.lineTo(ax+aw,gy+gh);
      ctx.closePath(); ctx.fill();
      // アーチ枠ネオン
      ctx.strokeStyle='#87CEEB'; ctx.lineWidth=2;
      ctx.shadowColor='#87CEEB'; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.moveTo(ax,archY+40);
      ctx.arc(ax+aw/2,archY+40,aw/2,Math.PI,0);
      ctx.lineTo(ax+aw,archY+40);
      ctx.stroke();
      ctx.shadowBlur=0;
      // ネオンサイン
      const pulse=0.7+Math.sin(t*2.5)*0.3;
      ctx.globalAlpha=pulse;
      ctx.fillStyle='#FF69B4'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
      ctx.shadowColor='#FF69B4'; ctx.shadowBlur=14;
      ctx.fillText('DANCE',sx+gw/2,gy+30);
      ctx.fillText('HALL',sx+gw/2,gy+50);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
      // 星飾り
      drawStar(sx+20,gy+20,8,'#FFD700');
      drawStar(sx+gw-20,gy+20,8,'#FFD700');
      // 近づいたらヒント表示
      const pdxH=Math.abs((P.x+P.w/2)-(it.x+it.w/2));
      if(pdxH<160 && !s1HallEntered && s1HallTransition===0){
        const hintA=Math.max(0,(160-pdxH)/160);
        ctx.globalAlpha=hintA*(0.7+Math.sin(t*4)*0.3);
        ctx.fillStyle='#FFD700'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
        ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
        ctx.fillText('→ ダンスホールへ！',sx+gw/2,gy-16);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
      }
      ctx.restore();
    } else if(it.k==='goal_mic'){
      // センターマイク（ゴール）
      ctx.save();
      const mx=sx+it.w/2, my=it.y;
      const pulse2=0.8+Math.sin(t*3)*0.2;
      // スポットライト
      ctx.globalAlpha=0.18*pulse2;
      const slg=ctx.createRadialGradient(mx,my,0,mx,my+it.h,80);
      slg.addColorStop(0,'#FFD700'); slg.addColorStop(1,'transparent');
      ctx.fillStyle=slg;
      ctx.beginPath(); ctx.arc(mx,my+it.h/2,80,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // マイクスタンド（支柱）
      ctx.fillStyle='#888';
      ctx.fillRect(mx-3,my+40,6,it.h-40);
      // ベース
      ctx.fillStyle='#aaa';
      ctx.beginPath(); ctx.ellipse(mx,my+it.h,18,6,0,0,Math.PI*2); ctx.fill();
      // マイク本体
      const mg=ctx.createLinearGradient(mx-10,my,mx+10,my+30);
      mg.addColorStop(0,'#ddd'); mg.addColorStop(1,'#888');
      ctx.fillStyle=mg;
      ctx.beginPath(); ctx.roundRect(mx-10,my,20,30,10); ctx.fill();
      // グリル（メッシュ格子）
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
      for(let i=0;i<3;i++){
        ctx.beginPath(); ctx.moveTo(mx-9,my+8+i*6); ctx.lineTo(mx+9,my+8+i*6); ctx.stroke();
      }
      // 光る星
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=16*pulse2;
      drawStar(mx,my-10,10,'#FFD700');
      ctx.shadowBlur=0;
      // テキスト
      ctx.fillStyle='#FFD700'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
      ctx.fillText('GOAL',mx,my-24);
      ctx.shadowBlur=0;
      ctx.restore();
    }
  });
}

// ── HUD ───────────────────────────────────
function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fillRect(0,0,W,40);
  ctx.fillStyle='#FFD700'; ctx.font='bold 17px Arial'; ctx.textAlign='left';
  ctx.fillText(`スコア: ${score}`,10,26);
  ctx.fillStyle=(currentStage===1&&cam.x>5000)?'#87CEEB':'#98FB98'; ctx.font='bold 13px Arial';
  ctx.fillText(`STAGE ${currentStage}`,10,40);
  ctx.fillStyle='#FF69B4'; ctx.textAlign='center';
  ctx.fillText('♥'.repeat(lives),W/2,26);
  ctx.fillStyle='#ddd'; ctx.font='13px Arial'; ctx.textAlign='right';
  ctx.fillText(`♪ ${noteCount}/5`,W-120,26);
  ctx.fillStyle='#333'; ctx.fillRect(W-115,13,100,13);
  ctx.fillStyle='#FFD700'; ctx.fillRect(W-115,13,noteCount/5*100,13);
  ctx.strokeStyle='#777'; ctx.lineWidth=1; ctx.strokeRect(W-115,13,100,13);
  // 制限時間
  if(stageTimer>=0){
    const sec=Math.ceil(stageTimer/60);
    const urgent=sec<=10;
    ctx.textAlign='center'; ctx.font=`bold ${urgent?15:13}px Arial`;
    ctx.fillStyle=urgent?(Math.floor(stageTimer/15)%2===0?'#FF3333':'#FF9900'):'#fff';
    ctx.fillText(`⏱ ${sec}秒`,W/2+120,26);
  }
  ctx.restore();
}

// ── Touch control overlay ─────────────────
function drawTouchControls(){
  if(!isTouchDevice) return;
  if(state==='select'||state==='win'||state==='gameover'||state==='stage_clear') return;
  ctx.save();

  const drawBtn = (x, y, r, pressed, label, labelSize) => {
    ctx.globalAlpha = pressed ? 0.88 : 0.65;
    ctx.fillStyle = pressed ? '#fff' : 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = pressed ? 1 : 0.80;
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = pressed ? 3 : 2.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#222';
    ctx.font = `bold ${labelSize}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
    ctx.textBaseline = 'alphabetic';
  };

  drawBtn(TB.left.x,  TB.left.y,  TB.left.r,  !!keys['ArrowLeft'],  '◀', 22);
  drawBtn(TB.right.x, TB.right.y, TB.right.r, !!keys['ArrowRight'], '▶', 22);
  // S3/S4/S5: 上下ボタン（D-pad）
  if(currentStage===2||currentStage===3||currentStage===4){
    drawBtn(TB3.up.x,   TB3.up.y,   TB3.up.r,   !!keys['ArrowUp'],   '▲', 20);
    drawBtn(TB3.down.x, TB3.down.y, TB3.down.r, !!keys['ArrowDown'],  '▼', 20);
  }
  // S6では右ジャンプボタン不要（レーンボタン使用）
  if(currentStage!==6){
    const jumpLabel = currentStage===3?'💣':currentStage===4?(costumeType===2?'斬':costumeType===1?'★':'蹴'):'▲';
    drawBtn(TB.jump.x, TB.jump.y, TB.jump.r, !!keys['Space'], jumpLabel, currentStage===3?20:26);
  }
  // S2ドアボタン（ドア付近のみ表示）
  if(currentStage===1 && s2NearDoor){
    ctx.globalAlpha=0.85;
    ctx.fillStyle='#AA44FF';
    ctx.beginPath(); ctx.arc(TB_DOOR.x, TB_DOOR.y, TB_DOOR.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(TB_DOOR.x, TB_DOOR.y, TB_DOOR.r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 16px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🚪 入る', TB_DOOR.x, TB_DOOR.y);
    ctx.textBaseline='alphabetic';
  }

  ctx.restore();
}

function drawTouchControlsS6(){
  if(!isTouchDevice) return;
  ctx.save();
  const activeLanes = new Set([...s6TouchLaneMap.values()]);
  const btnH=56, btnY=H-btnH;
  for(let lane=0;lane<8;lane++){
    const bx=S6_X0+lane*S6_LANE_W+2, bw=S6_LANE_W-4;
    const active=activeLanes.has(lane);
    ctx.globalAlpha=active?0.80:0.30;
    ctx.fillStyle=S6_COL[lane];
    ctx.beginPath(); ctx.roundRect(bx,btnY,bw,btnH,6); ctx.fill();
    ctx.globalAlpha=active?1:0.55;
    ctx.strokeStyle=active?'#FFD700':'rgba(255,255,255,0.5)';
    ctx.lineWidth=active?3:1.5;
    ctx.beginPath(); ctx.roundRect(bx,btnY,bw,btnH,6); ctx.stroke();
    ctx.globalAlpha=active?1:0.85;
    ctx.fillStyle='#fff';
    ctx.font=`bold ${active?16:14}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(S6_LABELS[lane], bx+bw/2, btnY+btnH/2);
    ctx.textBaseline='alphabetic';
  }
  ctx.restore();
}

// ── ステージ2 魔法弾・剣描画 ────────────────
function drawS2Combat(){
  if(currentStage!==1) return;

  // 魔法弾（星）
  s2Bullets.forEach(b=>{
    const sx=b.x-cam.x, sy=b.y;
    ctx.save();
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=16;
    ctx.globalAlpha=0.85+Math.sin(b.t*0.5)*0.15;
    drawStar(sx,sy,9,'#FFD700');
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // 剣の振りエフェクト（戦士のみ）
  if(costumeType===2 && s2SwordTimer>0){
    const prog=(20-s2SwordTimer)/20; // 0→1
    const sx=P.x-cam.x+P.w/2+P.facing*8;
    const sy=P.y+P.h-36-18; // キャラ腕あたり
    const startAng=P.facing>0?-Math.PI*0.75:-Math.PI*0.25;
    const endAng  =P.facing>0?Math.PI*0.15 :-Math.PI*1.15;
    const ang=startAng+(endAng-startAng)*prog;
    const len=46;
    ctx.save();
    ctx.translate(sx, sy);
    // 残像スラッシュ弧
    ctx.globalAlpha=0.35*(1-prog);
    ctx.strokeStyle='#88CCFF'; ctx.lineWidth=18; ctx.lineCap='round';
    ctx.shadowColor='#88CCFF'; ctx.shadowBlur=18;
    ctx.beginPath();
    ctx.arc(0,0,len*0.6, startAng, ang, P.facing<0);
    ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    // 剣本体
    const g=ctx.createLinearGradient(0,0,Math.cos(ang)*len,Math.sin(ang)*len);
    g.addColorStop(0,'#AAA'); g.addColorStop(0.4,'#FFF'); g.addColorStop(1,'#88CCFF');
    ctx.strokeStyle=g; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.shadowColor='#AADDFF'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); ctx.stroke();
    ctx.restore();
  }
}

// ── Particles & floating texts ────────────
function spawnParticles(wx,wy,color,n,kind){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({
      x:wx-cam.x,y:wy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2.5,
      life:1,dec:0.022+Math.random()*0.028,color,sz:3+Math.random()*6,kind
    });
    if(particles.length>300) particles.shift();
  }
}

function spawnText(wx,wy,txt,color){
  floatTxts.push({x:wx-cam.x,y:wy,vy:-1.6,life:1,txt,color});
}

function updateFX(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=p.dec;
    if(p.rot!==undefined) p.rot+=p.rotv||0.1;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floatTxts.length-1;i>=0;i--){
    const t=floatTxts[i]; t.y+=t.vy; t.life-=0.018;
    if(t.life<=0) floatTxts.splice(i,1);
  }
}

function drawFX(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    if(p.kind==='star') drawStar(p.x,p.y,p.sz,p.color);
    else if(p.kind==='note') drawNote(p.x,p.y,p.sz*0.8,p.color);
    else if(p.kind==='rect'){
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot||0);
      ctx.fillStyle=p.color; ctx.fillRect(-p.sz,-p.sz*0.4,p.sz*2,p.sz*0.8);
      ctx.restore();
    }
    else { ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  floatTxts.forEach(t=>{
    ctx.save(); ctx.globalAlpha=Math.max(0,t.life);
    ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=3;
    ctx.strokeText(t.txt,t.x,t.y);
    ctx.fillStyle=t.color; ctx.fillText(t.txt,t.x,t.y);
    ctx.restore();
  });
}

// ════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════
function collide(ent,plats){
  ent.onGround=false;
  for(const p of plats){
    if(ent.x+ent.w<=p.x||ent.x>=p.x+p.w) continue;
    if(ent.y+ent.h<=p.y||ent.y>=p.y+p.h) continue;
    const oT=(ent.y+ent.h)-p.y;
    const oB=(p.y+p.h)-ent.y;
    const oL=(ent.x+ent.w)-p.x;
    const oR=(p.x+p.w)-ent.x;
    const m=Math.min(oT,oB,oL,oR);
    if(m===oT&&ent.vy>=0){ ent.y=p.y-ent.h; ent.vy=0; ent.onGround=true; }
    else if(m===oB&&ent.vy<0){ ent.y=p.y+p.h; ent.vy=0; }
    else if(m===oL&&ent.vx>0){ ent.x=p.x-ent.w; ent.vx=0; }
    else if(m===oR&&ent.vx<0){ ent.x=p.x+p.w; ent.vx=0; }
  }
}

//  STAGE CLEAR SCREEN
// ════════════════════════════════════════════
function drawStageClear(){
  // 背景フラッシュ
  const flash=Math.sin(stageClearTimer*0.15)*0.15+0.1;
  ctx.fillStyle=`rgba(255,215,0,${flash})`; ctx.fillRect(0,0,W,H);

  // 紙吹雪
  if(stageClearTimer%3===0){
    const cc=['#FF69B4','#FFD700','#87CEEB','#FF1493','#98FB98','#FF8C00'];
    for(let i=0;i<5;i++){
      particles.push({x:Math.random()*W,y:-10,vx:(Math.random()-0.5)*3,vy:1.5+Math.random()*2.5,
        life:1,dec:0.005,color:cc[Math.floor(Math.random()*6)],sz:4+Math.random()*5,kind:'circle'});
    }
  }
  updateFX(); drawFX();

  // キャラ踊り
  const px=W/2, py=H/2+20;
  const sc2=1+Math.sin(stageClearTimer*0.12)*0.06;
  ctx.save(); ctx.translate(px,py); ctx.scale(sc2,sc2);
  drawCharacter(0,0,1,stageClearTimer*0.05,false,true,stageClearTimer*0.07);
  ctx.restore();

  // テキスト
  const ts3=1+Math.sin(stageClearTimer*0.1)*0.04;
  const clearLabel = currentStage===1?'STAGE 1 CLEAR！':currentStage===2?'STAGE 2 CLEAR！':currentStage===6?'FOREST CLEAR！':currentStage===3?'STAGE 3 CLEAR！':'STAGE 4 CLEAR！';
  const nextLabel  = currentStage===1?'♪ スターシューターへ！ ♪':currentStage===2?'♪ 地球帰還！ 森へ突入！ ♪':currentStage===6?'♪ 爆弾迷路へ！ ♪':currentStage===3?'♪ ドンキーコングへ！ ♪':'♪ 音ゲーへ！ ♪';
  const nextBtn    = currentStage===1?'Space でステージ２へ！':currentStage===2?'Space で森へ！':currentStage===6?'Space でステージ３へ！':currentStage===3?'Space でステージ４へ！':'Space でステージ５へ！';
  ctx.save(); ctx.translate(W/2,72); ctx.scale(ts3,ts3);
  ctx.font='bold 54px Arial'; ctx.textAlign='center';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=18;
  ctx.strokeStyle='#FF8C00'; ctx.lineWidth=6;
  ctx.strokeText(clearLabel,0,0);
  ctx.fillStyle='#FFD700'; ctx.fillText(clearLabel,0,0);
  ctx.shadowBlur=0;
  ctx.font='bold 22px Arial'; ctx.fillStyle='#FFB6C1';
  ctx.fillText(nextLabel,0,46);
  ctx.restore();

  if(stageClearTimer>80){
    ctx.font='bold 16px Arial'; ctx.textAlign='center';
    const pl2=Math.sin(stageClearTimer*0.15)>0;
    ctx.fillStyle=pl2?'#FFD700':'#FF69B4';
    ctx.fillText(nextBtn,W/2,H-55);
  }
  ctx.font='bold 20px Arial'; ctx.textAlign='center';
  ctx.fillStyle='white';
  ctx.fillText(`スコア: ${score}`,W/2,H-90);
}
